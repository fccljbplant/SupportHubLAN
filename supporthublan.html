      { label: 'Wake on LAN', icon: 'Wifi', onClick: () => {
        const targetIds = hosts.filter(h => h.onlineStatus === 'offline' && h.macAddress).map(h => h.id);
        if (targetIds.length === 0) { toast.info('No offline hosts with MAC addresses found.'); return; }
        executePowerAction({ action: 'wol', targetIds });
        toast.success(`Sent WoL packets to ${targetIds.length} offline hosts.`);
      } },
    ];

    // Build a unified timeline from seed + stateful audit events (newest first)
    const auditTimeline = auditEvents.slice(0, 20).map(e => ({
      id: e.id,
      actor: e.userName,
      action: e.action.split('.').pop().replace(/([A-Z])/g, ' $1').trim(),
      targets: e.parameters?.hostnames ? e.parameters.hostnames.slice(0,3).join(', ') + (e.parameters.hostnames.length > 3 ? ` +${e.parameters.hostnames.length - 3}` : '') : `${e.targetIds.length} target(s)`,
      result: e.result,
      timestamp: e.timestamp,
      category: e.actionCategory.toLowerCase().includes('update') ? 'updates' :
                e.actionCategory.toLowerCase().includes('deploy') ? 'deployments' :
                e.actionCategory.toLowerCase().includes('power') ? 'reboots' :
                e.actionCategory.toLowerCase().includes('queue') ? 'updates' :
                e.actionCategory.toLowerCase().includes('inventory') ? 'updates' : 'errors',
    }));
    const allTimeline = [...auditTimeline, ...ACTIVITY_TIMELINE].slice(0, 25);
    const filteredTimeline = timelineFilter === 'all' ? allTimeline : allTimeline.filter(a => a.category === timelineFilter);

    const warnings = [];
    if (offline > 0) warnings.push({ text: `${offline} host${offline === 1 ? '' : 's'} offline > 24h`, severity: 'warning', icon: 'CircleOff' });
    if (critical > 0) warnings.push({ text: `${critical} host${critical === 1 ? '' : 's'} with critical updates unpatched > 72h`, severity: 'danger', icon: 'ShieldX' });
    if (failedJobs24h > 0) warnings.push({ text: `${failedJobs24h} failed job${failedJobs24h === 1 ? '' : 's'} in last 24h unacknowledged`, severity: 'warning', icon: 'XCircle' });

    return (
      <div className="space-y-4">
        <PageHeader
          breadcrumb={['supporthublan']}
          title="Operations Dashboard"
          subtitle="Live fleet overview · Last refresh: just now"
          actions={<>
            <ActionButton variant="primary" icon="RefreshCw" onClick={() => { updateHosts(prev => prev.map(h => ({...h, lastSeen: new Date().toISOString()}))); toast.success('Fleet data refreshed'); }}><span className="hidden sm:inline">Refresh</span></ActionButton>
          </>}
        />

        {/* Warning Banner Strip */}
        {warnings.filter(w => !dismissedWarnings.has(w.text)).length > 0 && (
          <div className="space-y-1.5">
            {warnings.filter(w => !dismissedWarnings.has(w.text)).map((w, i) => (
              <div key={i} className={`flex items-center gap-2 p-2.5 rounded-lg border text-xs ${w.severity === 'danger' ? 'bg-danger/10 border-danger/30 text-danger' : 'bg-warning/10 border-warning/30 text-warning'}`}>
                <Icon name={w.icon} size={14} />
                <span className="flex-1">{w.text}</span>
                <button onClick={() => { setDismissedWarnings(s => new Set([...s, w.text])); toast.success('Warning acknowledged'); }} className="text-meta underline opacity-80 hover:opacity-100">Acknowledge</button>
                <IconButton icon="X" size="sm" onClick={() => setDismissedWarnings(s => new Set([...s, w.text]))} title="Dismiss" />
              </div>
            ))}
          </div>
        )}

        {/* Stat Cards Row */}
        <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3">
          <StatCard icon="Server" label="Total Hosts" value={total} color="primary" subtitle="across 5 sites" onClick={() => navigate('inventory')} />
          <StatCard icon="CircleCheck" label="Online Now" value={online} color="success" subtitle={`${Math.round(online/total*100)}% available`} onClick={() => navigate('inventory', { filter: 'online' })} />
          <StatCard icon="CircleOff" label="Offline" value={offline} color="danger" subtitle="requires attention" onClick={() => navigate('inventory', { filter: 'offline' })} />
          <StatCard icon="RefreshCw" label="Pending Reboot" value={pendingReboot} color="warning" subtitle="awaiting restart" onClick={() => navigate('updates')} />
          <StatCard icon="ShieldAlert" label="Updates Available" value={updatesAvailable} color="warning" subtitle={`${critical} critical`} onClick={() => navigate('updates')} />
          <StatCard icon="XCircle" label="Failed Jobs (24h)" value={failedJobs24h} color="danger" subtitle="needs review" onClick={() => navigate('reports')} />
        </div>

        {/* Two-column middle */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          {/* Compliance Donut */}
          <SectionCard title="Fleet Patch Compliance" description="Distribution of patch state across all hosts" actions={<ActionButton variant="ghost" size="xs" icon="ExternalLink" onClick={() => navigate('updates')}>View</ActionButton>}>
            <div className="flex items-center gap-4">
              <DonutChart segments={donutSegments} centerLabel={`${Math.round(compliant/total*100)}%`} centerSub="Compliant" />
              <div className="flex-1 space-y-2">
                {donutSegments.map((seg, i) => (
                  <button key={i} onClick={() => navigate('updates', { filter: seg.label.toLowerCase().replace(' ', '-') })} className="flex items-center gap-2 w-full text-left hover:bg-surface-raised p-1.5 rounded">
                    <span className="w-2.5 h-2.5 rounded-sm" style={{ background: { success: '#22c55e', warning: '#f59e0b', danger: '#ef4444', muted: '#6b7280' }[seg.color] }} />
                    <span className="text-xs text-text flex-1">{seg.label}</span>
                    <span className="text-xs font-semibold text-text tnum">{seg.value}</span>
                    <span className="text-meta text-text-dim tnum w-10 text-right">{Math.round(seg.value/total*100)}%</span>
                  </button>
                ))}
              </div>
            </div>
          </SectionCard>

          {/* Active Jobs Panel */}
          <SectionCard title="Active Jobs" description={`${activeJobs.filter(j => j.status === 'running').length} running · ${activeJobs.filter(j => j.status === 'queued').length} queued`} className="lg:col-span-2" actions={<ActionButton variant="ghost" size="xs" icon="ExternalLink" onClick={() => navigate('queue')}>View All</ActionButton>}>
            <div className="space-y-1.5">
              {activeJobs.length === 0 && <EmptyState icon="CheckCircle2" title="No active jobs" description="All quiet. Start a job from the Job Queue or trigger an action." />}
              {activeJobs.map(job => (
                <div key={job.id} className="flex items-center gap-3 p-2 bg-surface-raised rounded border border-border hover:border-primary/40 cursor-pointer" onClick={() => openJob(job)}>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs font-medium text-text truncate">{job.name}</span>
                      <StatusBadge variant={job.status} size="xs" />
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-[10px] text-text-dim">{job.targets.length} hosts · {job.step}</span>
                    </div>
                    <ProgressBar value={job.progress} color={job.status === 'running' ? 'info' : 'muted'} className="mt-1.5" />
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="text-[10px] text-text-dim">Started</div>
                    <div className="text-[11px] text-text tnum">{fmtRel(job.startedAt)}</div>
                  </div>
                  <div className="flex gap-0.5">
                    <IconButton icon="Pause" size="sm" title="Pause" onClick={(e) => { e.stopPropagation(); updateJob(job.id, { status: 'queued' }); toast.info(`Paused ${job.name}`); }} />
                    <IconButton icon="X" size="sm" variant="danger" title="Cancel" onClick={(e) => { e.stopPropagation(); removeJob(job.id); toast.warning(`Cancelled ${job.name}`); }} />
                  </div>
                </div>
              ))}
            </div>
          </SectionCard>
        </div>

        {/* Quick Actions Bar */}
        <SectionCard title="Quick Actions" description="Most common bulk operations — acts on selected hosts">
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2">
            {quickActions.map((a, i) => (
              <button key={i} onClick={a.onClick} className="flex flex-col items-center gap-2 p-3 bg-surface-raised border border-border rounded-lg hover:border-primary/50 hover:bg-primary/5 transition-colors text-center">
                <span className="inline-flex items-center justify-center w-9 h-9 rounded-md bg-primary/10 text-primary">
                  <Icon name={a.icon} size={18} />
                </span>
                <span className="text-[11px] font-medium text-text">{a.label}</span>
              </button>
            ))}
          </div>
        </SectionCard>

        {/* Bottom row: timeline + queued tasks */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <SectionCard
            title="Recent Activity"
            description="Last 20 events across the fleet"
            actions={
              <select value={timelineFilter} onChange={(e) => setTimelineFilter(e.target.value)} className="px-2 py-1 text-xs bg-surface-raised border border-border rounded text-text">
                <option value="all">All</option>
                <option value="updates">Updates</option>
                <option value="deployments">Deployments</option>
                <option value="reboots">Reboots</option>
                <option value="errors">Errors</option>
              </select>
            }
            bodyClassName="max-h-96 overflow-y-auto"
          >
            <Timeline items={filteredTimeline} />
          </SectionCard>

          <SectionCard title="Queued Tasks" description="Next 10 upcoming scheduled tasks" actions={<ActionButton variant="ghost" size="xs" icon="ExternalLink" onClick={() => navigate('scheduler')}>View All</ActionButton>} bodyClassName="max-h-96 overflow-y-auto">
            <div className="space-y-1.5">
              {scheduledTasks.map(t => (
                <div key={t.id} className="flex items-center gap-3 p-2 bg-surface-raised rounded border border-border">
                  <Icon name="CalendarClock" size={14} className="text-info flex-shrink-0" />
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-medium text-text truncate">{t.name}</div>
                    <div className="text-[10px] text-text-dim">{t.hostIds.length} targets · {t.taskType}</div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="text-[10px] text-text-dim">Next run</div>
                    <div className="text-[11px] text-text tnum">{fmtRel(t.nextRun)}</div>
                  </div>
                  <IconButton icon="X" size="sm" variant="danger" title="Cancel" />
                </div>
              ))}
            </div>
          </SectionCard>
        </div>
      </div>
    );
  };

  /* __SCREEN_DASHBOARD_END__ */
  /* ========================================================================
     SCREEN 02 — INVENTORY
     ====================================================================== */

  // ============================================================
  // INVENTORY TABS BAR — Shows multiple inventories as tabs above the grid
  // ============================================================
  const InventoryTabsBar = () => {
    const toast = useToast();
    const { navigate } = useApp();
    const [inventories, setInventories] = useState([]);
    const [activeHostId, setActiveHostId] = useState(() => { try { return parseInt(localStorage.getItem('supporthublan:active-inventory') || '0', 10); } catch { return 0; } });

    const load = async () => {
      try {
        const resp = await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories`);
        const json = await resp.json();
        if (json.success && json.data.length > 0) {
          setInventories(json.data);
          const active = json.data.find(i => i.is_active === 1) || json.data[0];
          setActiveHostId(active.id);
        }
      } catch (e) {
        // Backend not connected — show only "Local" tab
        setInventories([{ id: 0, name: 'Local (demo)', description: 'localStorage only', is_active: 1 }]);
      }
    };

    useEffect(() => { load(); }, []);

    const activate = async (id) => {
      setActiveHostId(id);
      try { localStorage.setItem('supporthublan:active-inventory', String(id)); } catch {}
      if (id > 0) {
        try {
          await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories/${id}/activate`, { method: 'POST' });
        } catch {}
      }
      // Reload hosts from the selected inventory
      window.dispatchEvent(new CustomEvent('supporthublan:inventory-changed', { detail: { id } }));
    };

    return (
      <div className="flex items-center gap-1 border-b border-border overflow-x-auto">
        {inventories.map(inv => (
          <button key={inv.id} onClick={() => activate(inv.id)}
            className={`flex items-center gap-2 px-3 py-2 text-xs font-medium border-b-2 -mb-px whitespace-nowrap ${activeHostId === inv.id ? 'border-primary text-primary' : 'border-transparent text-text-dim hover:text-text'}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${inv.is_active ? 'bg-success' : 'bg-text-dim'}`} />
            {inv.name}
          </button>
        ))}
        <button onClick={() => navigate('settings')}
          className="px-2 py-2 text-text-dim hover:text-primary" title="Manage inventories in Settings">
          <Icon name="Plus" size={14} />
        </button>
      </div>
    );
  };

  const InventoryScreen = () => {
    const { route, openHost, openDrawer, hosts, addHosts, addJob, appendAudit } = useApp();
    const toast = useToast();
    const [activeTab, setActiveTab] = useState('all');
    const [search, setSearch] = useState('');
    const [filters, setFilters] = useState({});
    const [selectedIds, setSelectedIds] = useState([]);
    const [density, setDensity] = useState('default');
    const [showAddModal, setShowAddModal] = useState(false);
    const [addModalMethod, setAddModalMethod] = useState(null); // null | 'single' | 'csv' | 'scan' | 'ad'
    const [showDeployModal, setShowDeployModal] = useState(false);
    const [showCommandModal, setShowCommandModal] = useState(false);
    const [logHost, setLogHost] = useState(null); // host object for PC Log modal

    // Open the bottom terminal panel and run a PsExec command on the given host.
    // Dispatches a global event the TerminalPanel listens for.
    const openTerminalForHost = (host) => {
      // 1. Make sure terminal is expanded
      try { localStorage.setItem('supporthublan:terminal-collapsed', '0'); } catch {}
      // 2. Tell the terminal panel to expand + switch to Terminal tab + run command
      window.dispatchEvent(new CustomEvent('supporthublan:terminal-open', {
        detail: { command: `psexec \\\\${host.hostname} cmd`, host: host.hostname }
      }));
      toast.info(`Opening remote shell on ${host.hostname}…`);
    };
    const [showColumnChooser, setShowColumnChooser] = useState(false);
    const [hiddenCols, setHiddenCols] = useState(new Set(['fqdn','macAddress','cpuModel','lastBootTime','department','owner','notes','diskFreeGb','osInstallDate','credentials']));
    const [confirmReboot, setConfirmReboot] = useState(false);
    const [contextMenu, setContextMenu] = useState(null);
    const [remoteDesktopProtocol, setRemoteDesktopProtocol] = useState(() => { try { return localStorage.getItem('supporthublan:rdp-protocol') || 'VNC'; } catch(e) { return 'VNC'; } });

    // Launch VNC or RDP to a remote host — awaits real backend response
    const launchRemoteDesktop = async (host) => {
      const protocol = remoteDesktopProtocol;
      const port = protocol === 'VNC' ? 5900 : 3389;
      toast.info(`Requesting ${protocol} session to ${host.hostname}…`);
      if (window.SupportHubLANAPI) {
        try {
          const result = await window.SupportHubLANAPI.launchRemote(host.hostname, host.ipAddress, protocol, port);
          if (result && result.success && !result.demo) {
            appendAudit({ action: 'remote.connect', actionCategory: 'Inventory', targetType: 'Host', targetIds: [host.id], parameters: { protocol, hostname: host.hostname, ip: host.ipAddress }, result: 'success' });
            toast.success(`${protocol} session launched to ${host.hostname} (${host.ipAddress}:${port})`, { detail: protocol === 'VNC' ? 'VNC Viewer opened externally' : 'RDP opened externally', duration: 5000 });
          } else if (result && result.demo) {
            appendAudit({ action: 'remote.connect', actionCategory: 'Inventory', targetType: 'Host', targetIds: [host.id], parameters: { protocol, hostname: host.hostname, ip: host.ipAddress }, result: 'skipped' });
            toast.warning(`Cannot launch ${protocol} — backend not connected (demo mode). Run the SupportHubLAN server on a Windows admin PC to enable remote desktop.`, { duration: 8000 });
          } else {
            appendAudit({ action: 'remote.connect', actionCategory: 'Inventory', targetType: 'Host', targetIds: [host.id], parameters: { protocol, hostname: host.hostname, ip: host.ipAddress }, result: 'failed' });
            toast.error(`Failed to launch ${protocol} to ${host.hostname}`, { detail: result?.error || 'Unknown error', duration: 8000 });
          }
        } catch (e) {
          appendAudit({ action: 'remote.connect', actionCategory: 'Inventory', targetType: 'Host', targetIds: [host.id], parameters: { protocol, hostname: host.hostname, ip: host.ipAddress }, result: 'failed' });
          toast.error(`Failed to launch ${protocol} to ${host.hostname}`, { detail: e.message, duration: 8000 });
        }
      } else {
        toast.error('Backend API client not loaded.');
      }
    };

    // ============================================================
    // REAL PsTools execution — calls backend /api/pstools/* endpoints
    // Replaces the demo theater that wrote 'success' to audit log
    // without actually calling the backend.
    // ============================================================
    const runPsToolOnHost = async (tool, hostname, hostId, opts) => {
      const jobId = 'job-' + Date.now();
      const label = opts?.label || tool;
      addJob({ id: jobId, name: `${label} — ${hostname}`, targets: [hostId], step: 'Querying (1/1)', progress: 10, startedAt: new Date().toISOString(), status: 'running' });
      toast.info(`Running ${label} on ${hostname}…`);

      if (!window.SupportHubLANAPI) {
        updateJob(jobId, { status: 'failed', progress: 100, step: 'Failed (no API client)' });
        appendAudit({ action: `pstools.${tool}`, actionCategory: 'Scripts', targetType: 'Host', targetIds: [hostId], parameters: { hostname }, result: 'failed' });
        toast.error('API client not loaded');
        return;
      }

      try {
        let result;
        switch (tool) {
          case 'psinfo':       result = await window.SupportHubLANAPI.pstoolsPsInfo(hostname); break;
          case 'pslist':       result = await window.SupportHubLANAPI.pstoolsPsList(hostname); break;
          case 'psloggedon':   result = await window.SupportHubLANAPI.pstoolsPsLoggedOn(hostname); break;
          case 'psservice':    result = await window.SupportHubLANAPI.pstoolsPsService(hostname, opts?.action || 'query', opts?.serviceName); break;
          case 'psfile':       result = await window.SupportHubLANAPI.pstoolsPsFile(hostname); break;
          case 'psgetsid':     result = await window.SupportHubLANAPI.pstoolsPsGetSid(hostname); break;
          case 'psexec':       result = await window.SupportHubLANAPI.pstoolsExecute('psexec', hostname, opts?.args || ''); break;
          default:
            updateJob(jobId, { status: 'failed', progress: 100, step: 'Failed (unknown tool)' });
            appendAudit({ action: `pstools.${tool}`, actionCategory: 'Scripts', targetType: 'Host', targetIds: [hostId], parameters: { hostname }, result: 'failed' });
            toast.error(`Unknown PsTool: ${tool}`);
            return;
        }

        if (result && result.success && !result.demo) {
          updateJob(jobId, { status: 'completed', progress: 100, step: 'Done', completedAt: new Date().toISOString(), output: result.data || result.stdout || '' });
          appendAudit({ action: `pstools.${tool}`, actionCategory: 'Scripts', targetType: 'Host', targetIds: [hostId], parameters: { hostname, ...(opts || {}) }, result: 'success', output: (result.data || '').slice(0, 2000) });
          toast.success(`${label} completed on ${hostname}`, { detail: 'See Job Queue for output', duration: 4000 });
        } else if (result && result.demo) {
          updateJob(jobId, { status: 'failed', progress: 100, step: 'Demo mode — backend not connected' });
          appendAudit({ action: `pstools.${tool}`, actionCategory: 'Scripts', targetType: 'Host', targetIds: [hostId], parameters: { hostname }, result: 'skipped' });
          toast.warning(`${label} skipped — backend not connected. Run the SupportHubLAN server on a Windows admin PC to execute PsTools for real.`, { duration: 8000 });
        } else {
          updateJob(jobId, { status: 'failed', progress: 100, step: 'Failed', completedAt: new Date().toISOString(), output: result?.error || '' });
          appendAudit({ action: `pstools.${tool}`, actionCategory: 'Scripts', targetType: 'Host', targetIds: [hostId], parameters: { hostname }, result: 'failed', error: result?.error });
          toast.error(`${label} failed on ${hostname}`, { detail: result?.error || 'Unknown error', duration: 8000 });
        }
      } catch (e) {
        updateJob(jobId, { status: 'failed', progress: 100, step: 'Failed', completedAt: new Date().toISOString(), output: e.message });
        appendAudit({ action: `pstools.${tool}`, actionCategory: 'Scripts', targetType: 'Host', targetIds: [hostId], parameters: { hostname }, result: 'failed', error: e.message });
        toast.error(`${label} failed on ${hostname}`, { detail: e.message, duration: 8000 });
      }
    };

    // Bulk PsTools runner — for the toolbar PsInfo/PsLoggedOn/PsList/PsService buttons
    const runPsToolBulk = async (tool, label) => {
      if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; }
      const targets = hosts.filter(h => selectedIds.includes(h.id));
      for (const h of targets) {
        await runPsToolOnHost(tool, h.hostname, h.id, { label });
      }
    };

    // Apply initial filter from route (e.g., from dashboard click)
    useEffect(() => {
      if (route.params?.filter === 'online') { setActiveTab('all'); setFilters(f => ({...f, status: 'online'})); }
      else if (route.params?.filter === 'offline') { setActiveTab('offline'); }
      else if (route.params?.hostId) {
        const h = hosts.find(h => h.id === route.params.hostId);
        if (h) openHost(h);
      }
    }, [route.params, hosts]);

    // Filter hosts by tab + search + filters
    const filteredHosts = useMemo(() => {
      let list = [...hosts];
      if (activeTab === 'servers') list = list.filter(h => h.tags.includes('server'));
      else if (activeTab === 'workstations') list = list.filter(h => h.tags.includes('workstation'));
      else if (activeTab === 'offline') list = list.filter(h => h.onlineStatus === 'offline');

      if (search) {
        const q = search.toLowerCase();
        list = list.filter(h => h.hostname.toLowerCase().includes(q) || h.ipAddress.includes(q) || h.fqdn.toLowerCase().includes(q) || h.tags.some(t => t.toLowerCase().includes(q)) || h.site.toLowerCase().includes(q) || h.owner.toLowerCase().includes(q));
      }
      if (filters.status) list = list.filter(h => h.onlineStatus === filters.status);
      if (filters.patchState) list = list.filter(h => h.patchState === filters.patchState);
      if (filters.site) list = list.filter(h => h.site === filters.site);
      if (filters.os) list = list.filter(h => h.osName.includes(filters.os));
      return list;
    }, [hosts, activeTab, search, filters]);

    const allColumns = [
      { key: 'led', label: 'LED', sortable: false, headerRender: () => (
        <span className="inline-flex items-center gap-1 cursor-pointer" title="Click: start/stop all · Middle-click: reset all" onClick={() => { updateHosts(prev => prev.map(h => ({...h, _ledStopped: !h._ledStopped }))); toast.info('LED monitoring toggled.'); }} onContextMenu={(e) => { e.preventDefault(); updateHosts(prev => prev.map(h => ({...h, _ledOverride: undefined, _ledBlue: undefined, _ledStopped: undefined }))); toast.info('All LEDs reset.'); }}>
          <Icon name="Activity" size={11} className="text-success" />
        </span>
      ), render: (h) => {
        let ledColor = h.onlineStatus === 'online' ? (h.patchState === 'compliant' ? '#22c55e' : '#f59e0b') : h.onlineStatus === 'offline' ? '#ef4444' : '#6b7280';
        if (h._ledOverride === 'off') ledColor = 'transparent';
        if (h._ledBlue) ledColor = '#38bdf8';
        if (h._ledStopped) ledColor = '#3d425a';
        return <span className="inline-block w-3 h-3 rounded-full cursor-pointer border border-border" style={{ background: ledColor, boxShadow: ledColor !== 'transparent' ? `0 0 4px ${ledColor}` : 'none' }} title={`${h.onlineStatus} · ${h.patchState}\nClick: toggle off\nShift+Click: mark complete (blue)`} onClick={(e) => { e.stopPropagation(); if (e.shiftKey) { updateHosts(prev => prev.map(x => x.id === h.id ? { ...x, _ledBlue: !x._ledBlue } : x)); } else { updateHosts(prev => prev.map(x => x.id === h.id ? { ...x, _ledOverride: x._ledOverride === 'off' ? undefined : 'off' } : x)); } }} />;
      } },
      { key: 'status', label: 'Status', render: (h) => <StatusBadge variant={h.onlineStatus} size="xs" /> },

    const visibleColumns = allColumns.filter(c => !hiddenCols.has(c.key));

        toast.info(`Scanning ${selectedIds.length} hosts for updates…`);

      { label: 'Refresh', icon: 'RefreshCw', onClick: () => {

        URL.revokeObjectURL(url);
        toast.success(`Exported ${selectedHosts.length} host(s) to CSV`);

    ];

    return (
      <div className="space-y-3">
        <PageHeader
          breadcrumb={['supporthublan', 'Inventory']}
          title="Computer Inventory"
          subtitle={`${hosts.length} hosts · ${hosts.filter(h=>h.onlineStatus==='online').length} online`}
          actions={
            <>
              <ActionButton variant="secondary" icon="Download" onClick={() => {
                const csv = ['hostname,ipAddress,osName,patchState,onlineStatus,site,owner'].concat(hosts.map(h => [h.hostname, h.ipAddress, h.osName, h.patchState, h.onlineStatus, h.site, h.owner].join(','))).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'inventory-full.csv'; a.click();
                URL.revokeObjectURL(url);

              }}>Export</ActionButton>
              <ActionButton variant="primary" icon="Plus" onClick={() => { setAddModalMethod(null); setShowAddModal(true); }}>Add Hosts</ActionButton>
            </>

        />

        <TabGroup
          tabs={[
            { id: 'all', label: 'All Hosts', icon: 'Server', badge: hosts.length },
            { id: 'servers', label: 'Servers', icon: 'HardDrive', badge: hosts.filter(h => h.tags.includes('server')).length },
            { id: 'workstations', label: 'Workstations', icon: 'Monitor', badge: hosts.filter(h => h.tags.includes('workstation')).length },
            { id: 'offline', label: 'Offline', icon: 'CircleOff', badge: hosts.filter(h => h.onlineStatus === 'offline').length },

            { id: 'groups', label: 'Groups' },

        {activeTab === 'tags' ? (
          <SectionCard title="Host Tags" description="Click a tag to filter the host list">
            <div className="flex flex-wrap gap-2">
              {HOST_TAGS.map(t => {
                const count = hosts.filter(h => h.tags.includes(t.name)).length;
                return (
                  <button key={t.id} onClick={() => { setSearch(t.name); setActiveTab('all'); toast.info(`Filtered by tag: ${t.name} (${count} hosts)`); }} className="flex items-center gap-2 p-2 bg-surface-raised rounded border border-border hover:border-primary/50 hover:bg-primary/5 transition-colors cursor-pointer">
                    <span className="w-3 h-3 rounded-sm" style={{ background: t.color }} />
                    <span className="text-xs text-text font-medium">{t.name}</span>
                    <Badge>{count}</Badge>
                  </button>
                );
              })}
            </div>
          </SectionCard>
        ) : activeTab === 'groups' ? (
          <SectionCard title="Host Groups" description="Logical groupings for batch operations">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {[
                { id: 'g-servers', name: 'All Servers', count: hosts.filter(h => h.tags.includes('server')).length },
                { id: 'g-workstations', name: 'All Workstations', count: hosts.filter(h => h.tags.includes('workstation')).length },
                { id: 'g-dc', name: 'Domain Controllers', count: hosts.filter(h => h.tags.includes('domain-controller')).length },
                { id: 'g-sql', name: 'SQL Servers', count: hosts.filter(h => h.tags.includes('sql')).length },
              ].map(g => (
                <div key={g.id} className="flex items-center gap-3 p-3 bg-surface-raised rounded border border-border">
                  <Icon name="Folder" size={16} className="text-primary" />
                  <div className="flex-1">
                    <div className="text-sm font-medium text-text">{g.name}</div>
                    <div className="text-[11px] text-text-dim">{g.count} hosts</div>
                  </div>
                  <IconButton icon="Settings" size="sm" title="Manage" />
                </div>
              ))}
            </div>
          </SectionCard>
        ) : activeTab === 'import' ? (
          <SectionCard title="Import / Export Hosts" description="Bulk import from CSV/TXT or export current inventory">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">

                <Icon name="Upload" size={24} className="text-primary mb-2" />
                <h4 className="text-sm font-semibold text-text mb-1">Import Hosts</h4>
                <p className="text-xs text-text-dim mb-3">Upload a CSV or TXT file with one host per line. Required columns: hostname, ipAddress.</p>
                <ActionButton variant="primary" size="sm" icon="FileUp" onClick={() => { setShowAddModal(true); toast.info('Opening Add Hosts wizard — choose CSV method to paste your data.'); }}>Choose File</ActionButton>
              </div>
              <div className="p-4 border border-border rounded-lg bg-surface-raised">
                <Icon name="Download" size={24} className="text-success mb-2" />

                    const csv = ['hostname,ipAddress,osName,patchState,onlineStatus,site,owner'].concat(hosts.map(h => [h.hostname, h.ipAddress, h.osName, h.patchState, h.onlineStatus, h.site, h.owner].join(','))).join('\n');
                    const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'inventory.csv'; a.click(); URL.revokeObjectURL(url);
                    toast.success(`Exported ${hosts.length} hosts to CSV`);
                  }}>CSV</ActionButton>
                  <ActionButton variant="secondary" size="sm" icon="FileSpreadsheet" onClick={() => {
                    const csv = ['hostname,ipAddress,osName,patchState,onlineStatus,site,owner'].concat(hosts.map(h => [h.hostname, h.ipAddress, h.osName, h.patchState, h.onlineStatus, h.site, h.owner].join(','))).join('\n');
                    const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'inventory.xlsx'; a.click(); URL.revokeObjectURL(url);
                    toast.success(`Exported ${hosts.length} hosts to XLSX (CSV format)`);
                  }}>XLSX</ActionButton>
                  <ActionButton variant="secondary" size="sm" icon="Braces" onClick={() => {
                    const json = JSON.stringify(hosts, null, 2);
                    const blob = new Blob([json], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'inventory.json'; a.click(); URL.revokeObjectURL(url);
                    toast.success(`Exported ${hosts.length} hosts to JSON`);
                  }}>JSON</ActionButton>
                </div>
              </div>
              <div className="p-4 border border-border rounded-lg bg-surface-raised">
                <Icon name="Upload" size={24} className="text-warning mb-2" />
              </div>
            </div>
          </SectionCard>
        ) : (
          <>
            <FilterBar
              search={search}
              onSearchChange={setSearch}
              searchPlaceholder="Search by hostname, IP, FQDN, tag, site, owner…"
              filters={[
                { key: 'status', label: 'All Status', options: [{value:'online',label:'Online'},{value:'offline',label:'Offline'}] },
                { key: 'patchState', label: 'All Patch States', options: [{value:'compliant',label:'Compliant'},{value:'updates-available',label:'Updates Available'},{value:'critical',label:'Critical'},{value:'unknown',label:'Unknown'}] },
                { key: 'site', label: 'All Sites', options: SITES.map(s => ({value:s,label:s})) },
                { key: 'os', label: 'All OS', options: [{value:'Server 2022',label:'Windows Server 2022'},{value:'Server 2019',label:'Windows Server 2019'},{value:'11 Pro',label:'Windows 11 Pro'}] },
              ]}
              activeFilters={filters}
              onFilterChange={(k,v) => setFilters(f => ({...f, [k]: v}))}
              right={
                <div className="flex items-center gap-1">
                  <button onClick={() => setDensity(d => d === 'compact' ? 'default' : d === 'default' ? 'comfortable' : 'compact')} title="Toggle density" className="px-2 py-1.5 text-xs bg-surface-raised border border-border rounded text-text-dim hover:text-text">
                    <Icon name={density === 'compact' ? 'Rows3' : density === 'comfortable' ? 'Rows2' : 'Table'} size={13} />
                  </button>
                  <button onClick={() => setShowColumnChooser(s => !s)} title="Column chooser" className="px-2 py-1.5 text-xs bg-surface-raised border border-border rounded text-text-dim hover:text-text flex items-center gap-1">
                    <Icon name="Columns3" size={13} /> Columns
                  </button>
                </div>
              }
            />

            {showColumnChooser && (
              <>
              <div className="fixed inset-0 z-20" onClick={() => setShowColumnChooser(false)} />
              <div className="absolute right-4 z-30 w-72 p-3 bg-surface border border-border rounded-lg shadow-raised">
                <div className="flex items-center justify-between mb-2 pb-2 border-b border-border">
                  <div className="text-meta text-text-dim uppercase">Toggle Columns</div>
                  <div className="flex gap-1">
                    <button onClick={() => setHiddenCols(new Set())} className="text-[10px] px-1.5 py-0.5 text-text-dim hover:text-primary" title="Show all">All</button>
                    <span className="text-text-dim text-[10px]">·</span>
                    <button onClick={() => setHiddenCols(new Set(allColumns.map(c => c.key).filter(k => k !== 'hostname' && k !== 'actions')))} className="text-[10px] px-1.5 py-0.5 text-text-dim hover:text-primary" title="Hide all except Hostname & Actions">None</button>
                    <span className="text-text-dim text-[10px]">·</span>
                    <button onClick={() => setHiddenCols(new Set(['fqdn','macAddress','cpuModel','lastBootTime','department','owner','notes','diskFreeGb','osInstallDate','credentials']))} className="text-[10px] px-1.5 py-0.5 text-text-dim hover:text-primary" title="Restore defaults">Reset</button>
                  </div>
                </div>
                <div className="max-h-72 overflow-y-auto space-y-0.5">
                  {allColumns.map(c => {
                    const isVisible = !hiddenCols.has(c.key);
                    const isLocked = c.key === 'hostname' || c.key === 'actions'; // these stay visible
                    return (
                      <button
                        key={c.key}
                        onClick={() => !isLocked && setHiddenCols(s => { const ns = new Set(s); if (ns.has(c.key)) ns.delete(c.key); else ns.add(c.key); return ns; })}
                        disabled={isLocked}
                        className={`w-full flex items-center justify-between gap-2 px-2 py-1.5 text-xs rounded border transition-colors ${
                          isLocked
                            ? 'border-border bg-surface-raised text-text-dim cursor-not-allowed opacity-60'
                            : isVisible
                              ? 'border-primary/40 bg-primary/5 text-text hover:bg-primary/10'
                              : 'border-border bg-surface text-text-dim hover:bg-surface-raised'
                        }`}
                        title={isLocked ? 'This column is always visible' : (isVisible ? 'Click to hide' : 'Click to show')}
                      >
                        <span className="flex items-center gap-2">
                          <span className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 ${
                            isLocked ? 'border-border bg-surface' :
                            isVisible ? 'border-primary bg-primary text-white' : 'border-border bg-surface'
                          }`}>
                            {isVisible && <Icon name="Check" size={10} />}
                          </span>
                          {c.label}
                        </span>
                        <span className="text-[9px] uppercase tracking-wider">
                          {isLocked ? <span className="text-text-dim">Locked</span> :
                           isVisible ? <span className="text-success">On</span> : <span className="text-text-dim">Off</span>}
                        </span>
                      </button>
                    );
                  })}
                </div>
                <div className="mt-2 pt-2 border-t border-border text-[10px] text-text-dim flex items-center justify-between">
                  <span>{allColumns.length - hiddenCols.size} of {allColumns.length} visible</span>
                  <button onClick={() => setShowColumnChooser(false)} className="text-text-dim hover:text-text">Done</button>
                </div>
              </div>
              </>
            )}

            <BulkActionBar selectedCount={selectedIds.length} actions={bulkActions} onClear={() => setSelectedIds([])} />

            {/* BatchPatch-style Action Toolbar */}
            <ActionToolbar groups={[
              { label: 'Hosts', items: [
                { icon: 'Plus', label: 'Add', onClick: () => { setAddModalMethod(null); setShowAddModal(true); } },
                { icon: 'RefreshCw', label: 'Refresh', onClick: async () => { if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; } const targets = hosts.filter(h => selectedIds.includes(h.id)); toast.info(`Pinging ${selectedIds.length} host(s)…`); if (window.SupportHubLANAPI) { for (const h of targets) { try { const result = await window.SupportHubLANAPI.pingHost(h.hostname); if (result && result.success && !result.demo) { updateHosts(prev => prev.map(x => x.id === h.id ? { ...x, onlineStatus: result.data?.online ? 'online' : 'offline', pingStatus: result.data?.status || 'unknown', lastSeen: new Date().toISOString() } : x)); } } catch (e) {} } toast.success(`Refreshed ${selectedIds.length} host(s)`); } else { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, lastSeen: new Date().toISOString() } : h)); toast.success(`Refreshed ${selectedIds.length} host(s) (local only)`); } }, disabled: selectedIds.length === 0 },
              ]},
              { label: 'Updates', items: [
                { icon: 'Search', label: 'Check', onClick: async () => { if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; } const targetHosts = hosts.filter(h => selectedIds.includes(h.id)); const targetNames = targetHosts.map(h => h.hostname); toast.info(`Scanning ${selectedIds.length} host(s)…`); if (window.SupportHubLANAPI) { const result = await window.SupportHubLANAPI.scanUpdates(targetNames, null); if (result && result.success && !result.demo) { toast.success(`Scan complete on ${selectedIds.length} host(s)`); } else if (result && result.demo) { toast.warning('Backend not connected.', { duration: 8000 }); } else { toast.error('Scan failed', { detail: result?.error, duration: 8000 }); } } }, disabled: selectedIds.length === 0 },
                { icon: 'ShieldCheck', label: 'Install', variant: 'success', onClick: async () => {
                  if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; }
                  const targetHosts = hosts.filter(h => selectedIds.includes(h.id));
                  const targetNames = targetHosts.map(h => h.hostname);
                  const jobId = 'job-' + Date.now();
                  addJob({ id: jobId, name: `Install Updates — ${selectedIds.length} hosts`, targets: [...selectedIds], step: 'Installing (1/1)', progress: 30, startedAt: new Date().toISOString(), status: 'running' });
                  toast.info(`Installing updates on ${selectedIds.length} host(s)…`);
                  if (window.SupportHubLANAPI) {
                    try {
                      const result = await window.SupportHubLANAPI.installUpdates(targetNames, null, { rebootBehavior: 'if-required' });
                      if (result && result.success && !result.demo) {
                        updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, patchState: 'compliant' } : h));
                        updateJob(jobId, { status: 'completed', progress: 100, step: 'Done', completedAt: new Date().toISOString(), output: result.data || '' });
                        appendAudit({ action: 'updates.install', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: { hostnames: targetNames }, result: 'success' });
                        toast.success(`Updates installed on ${selectedIds.length} host(s)`, { duration: 5000 });
                      } else if (result && result.demo) {
                        updateJob(jobId, { status: 'failed', progress: 100, step: 'Demo mode — backend not connected' });
                        toast.warning('Install skipped — backend not connected.', { duration: 8000 });
                      } else {
                        updateJob(jobId, { status: 'failed', progress: 100, step: 'Failed', completedAt: new Date().toISOString(), output: result?.error || '' });
                        toast.error('Install failed', { detail: result?.error, duration: 8000 });
                      }
                    } catch (e) {
                      updateJob(jobId, { status: 'failed', progress: 100, step: 'Failed', output: e.message });
                      toast.error('Install failed', { detail: e.message, duration: 8000 });

  // ============================================================
  // PC LOG MODAL — View Windows Event Logs from a single host
  // ============================================================
  const PCLogModal = ({ open, onClose, host }) => {
    const toast = useToast();
    const { appendAudit } = useApp();
    const [logName, setLogName] = useState('System');
    const [severity, setSeverity] = useState('All');
    const [maxEvents, setMaxEvents] = useState(50);
    const [events, setEvents] = useState([]);
    const [loading, setLoading] = useState(false);
    const [selectedEvent, setSelectedEvent] = useState(null);

    const load = async () => {
      if (!host) return;
      setLoading(true);
      setSelectedEvent(null);
      try {
        if (window.SupportHubLANAPI) {
          const result = await window.SupportHubLANAPI.getEventLog(host.hostname, logName, maxEvents, severity, null);
          if (result && result.success && !result.demo) {
            let parsed;
            try { parsed = JSON.parse(result.data); } catch { parsed = result.data; }
            const arr = Array.isArray(parsed) ? parsed : (parsed && parsed.events ? parsed.events : [parsed]);
            setEvents(arr.filter(e => e && (e.TimeCreated || e.error)));
            appendAudit({ action: 'hosts.eventlog', actionCategory: 'Inventory', targetType: 'Host', targetIds: [host.id], parameters: { hostname: host.hostname, logName, severity, count: arr.length }, result: 'success' });
            toast.success(`Loaded ${arr.length} event(s) from ${host.hostname}`);
          } else if (result && result.demo) {
            setEvents([]);
            toast.warning(`Event log skipped — backend not connected`, { duration: 8000 });
          } else {
            setEvents([]);
            toast.error('Failed to load event log', { detail: result?.error, duration: 8000 });
          }
        } else {
          toast.error('API client not loaded');
        }
      } catch (e) {
        setEvents([]);
        toast.error('Failed to load event log', { detail: e.message, duration: 8000 });
      }
      setLoading(false);
    };

    useEffect(() => { if (open && host) { load(); } }, [open, host, logName, severity]);

    if (!open || !host) return null;

    return (
      <Modal open={open} onClose={onClose} title={`PC Log — ${host.hostname}`} subtitle={`${host.ipAddress || '—'} · Windows Event Log`} size="xl"
        footer={<>
          <ActionButton variant="secondary" onClick={load} icon="RefreshCw" disabled={loading}>{loading ? 'Loading…' : 'Refresh'}</ActionButton>
          <ActionButton variant="primary" onClick={onClose}>Close</ActionButton>
        </>}>
        <div className="space-y-3">
          <div className="grid grid-cols-3 gap-2">
            <FormField label="Log Name">
              <Select value={logName} onChange={e => setLogName(e.target.value)}>
                <option value="System">System</option>
                <option value="Application">Application</option>
                <option value="Security">Security</option>
                <option value="Setup">Setup</option>
                <option value="HardwareEvents">Hardware Events</option>
                <option value="Windows PowerShell">PowerShell</option>
              </Select>
            </FormField>
            <FormField label="Severity">
              <Select value={severity} onChange={e => setSeverity(e.target.value)}>
                <option value="All">All Levels</option>
                <option value="Error">Error Only</option>
                <option value="Warning">Warning Only</option>
                <option value="Information">Information Only</option>
              </Select>
            </FormField>
            <FormField label="Max Events">
              <Select value={maxEvents} onChange={e => setMaxEvents(parseInt(e.target.value))}>
                <option value={50}>Last 50</option>
                <option value={100}>Last 100</option>
                <option value={250}>Last 250</option>
                <option value={500}>Last 500</option>
              </Select>
            </FormField>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-3" style={{ minHeight: '320px' }}>
            <div className="border border-border rounded overflow-y-auto" style={{ maxHeight: '380px' }}>
              <table className="w-full text-xs">
                <thead className="sticky top-0 bg-surface-raised border-b border-border">
                  <tr>
                    <th className="px-2 py-1.5 text-left text-meta text-text-dim uppercase">Time</th>
                    <th className="px-2 py-1.5 text-left text-meta text-text-dim uppercase">Level</th>
                    <th className="px-2 py-1.5 text-left text-meta text-text-dim uppercase">Source</th>
                    <th className="px-2 py-1.5 text-left text-meta text-text-dim uppercase">ID</th>
                  </tr>
                </thead>
                <tbody>
                  {loading && (
                    <tr><td colSpan="4" className="p-4 text-center text-text-dim">Loading…</td></tr>
                  )}
                  {!loading && events.length === 0 && (
                    <tr><td colSpan="4" className="p-4 text-center text-text-dim">No events found.</td></tr>
                  )}
                  {!loading && events.map((e, i) => (
                    <tr key={i} onClick={() => setSelectedEvent(e)} className={`border-b border-border/50 cursor-pointer hover:bg-surface-raised ${selectedEvent === e ? 'bg-primary/10' : ''}`}>
                      <td className="px-2 py-1 text-text-dim text-[10px] whitespace-nowrap font-mono">{e.TimeCreated ? new Date(e.TimeCreated).toLocaleString() : '—'}</td>
                      <td className="px-2 py-1">
                        <span className={`px-1.5 py-0.5 text-[10px] rounded font-medium ${
                          e.LevelDisplayName === 'Error' ? 'bg-danger/15 text-danger' :
                          e.LevelDisplayName === 'Warning' ? 'bg-warning/15 text-warning' :
                          e.LevelDisplayName === 'Information' ? 'bg-info/15 text-info' :
                          'bg-surface-raised text-text-dim'
                        }`}>{e.LevelDisplayName || '—'}</span>
                      </td>
                      <td className="px-2 py-1 text-text truncate max-w-[180px]" title={e.ProviderName}>{e.ProviderName || '—'}</td>
                      <td className="px-2 py-1 text-text-dim font-mono text-[10px]">{e.Id || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="border border-border rounded p-3 overflow-y-auto bg-surface-raised" style={{ maxHeight: '380px' }}>
              {selectedEvent ? (
                <div className="space-y-2 text-xs">
                  <div><span className="text-text-dim">Time:</span> <span className="font-mono text-text">{selectedEvent.TimeCreated ? new Date(selectedEvent.TimeCreated).toLocaleString() : '—'}</span></div>
                  <div><span className="text-text-dim">Level:</span> <span className="text-text">{selectedEvent.LevelDisplayName || '—'}</span></div>
                  <div><span className="text-text-dim">Source:</span> <span className="text-text">{selectedEvent.ProviderName || '—'}</span></div>
                  <div><span className="text-text-dim">Event ID:</span> <span className="font-mono text-text">{selectedEvent.Id || '—'}</span></div>
                  <div className="pt-2 border-t border-border">
                    <div className="text-text-dim mb-1">Message:</div>
                    <pre className="text-text whitespace-pre-wrap font-mono text-[11px]">{selectedEvent.Message || '(no message)'}</pre>
                  </div>
                </div>
              ) : (
                <div className="text-text-dim text-xs italic flex items-center justify-center h-full">Select an event from the list to view its details</div>
              )}
            </div>
          </div>
        </div>
      </Modal>
    );
  };

  // ============================================================
  // DEPLOY PACKAGE MODAL — Install MSI/EXE/PS1 on selected hosts
  // ============================================================
  const DeployPackageModal = ({ open, onClose, targetIds, hosts }) => {
    const toast = useToast();
    const { addJob, updateJob, appendAudit } = useApp();
    const [packagePath, setPackagePath] = useState('');
    const [args, setArgs] = useState('');
    const [rebootBehavior, setRebootBehavior] = useState('never');
    const [deploying, setDeploying] = useState(false);
    const [savedPackages, setSavedPackages] = useState(() => { try { return JSON.parse(localStorage.getItem('supporthublan:saved-packages') || '[]'); } catch { return []; } });
    const [pkgName, setPkgName] = useState('');

    const targetHosts = hosts.filter(h => targetIds.includes(h.id));
    const targetNames = targetHosts.map(h => h.hostname);

    const deploy = async () => {
      if (!packagePath.trim()) { toast.warning('Package path required (e.g. C:\\Packages\\chrome.msi)'); return; }
      if (targetNames.length === 0) { toast.warning('No hosts selected'); return; }
      setDeploying(true);
      const jobId = 'job-' + Date.now();
      addJob({ id: jobId, name: `Deploy ${pkgName || packagePath.split('\\').pop()} → ${targetNames.length} hosts`, targets: [...targetIds], step: 'Copying (1/3)', progress: 10, startedAt: new Date().toISOString(), status: 'running' });
      toast.info(`Deploying to ${targetNames.length} host(s)…`);

      // Save to package library
      if (pkgName.trim()) {
        const newPkg = { name: pkgName, path: packagePath, args, rebootBehavior, savedAt: new Date().toISOString() };
        const updated = [...savedPackages.filter(p => p.name !== pkgName), newPkg];
        setSavedPackages(updated);
        try { localStorage.setItem('supporthublan:saved-packages', JSON.stringify(updated)); } catch {}
      }

      if (!window.SupportHubLANAPI) {
        updateJob(jobId, { status: 'failed', step: 'No API client', progress: 100 });
        toast.error('API client not loaded');
        setDeploying(false);
        return;
      }

      try {
        const result = await window.SupportHubLANAPI.apiCall('/api/deploy/package', { hostnames: targetNames, packagePath, arguments: args, rebootBehavior });
        if (result && result.success && !result.demo) {
          updateJob(jobId, { status: 'completed', step: 'Done', progress: 100, completedAt: new Date().toISOString(), output: result.data || '' });
          appendAudit({ action: 'deploy.package', actionCategory: 'Deployments', targetType: 'Host', targetIds: [...targetIds], parameters: { packagePath, args, hostnames: targetNames }, result: 'success' });
          toast.success(`Deployment complete on ${targetNames.length} host(s)`, { duration: 5000 });
          onClose();
        } else if (result && result.demo) {
          updateJob(jobId, { status: 'failed', step: 'Demo mode — backend not connected', progress: 100 });
          appendAudit({ action: 'deploy.package', actionCategory: 'Deployments', targetType: 'Host', targetIds: [...targetIds], parameters: { packagePath }, result: 'skipped' });
          toast.warning('Deployment skipped — backend not connected. Run the SupportHubLAN server to deploy for real.', { duration: 8000 });
        } else {
          updateJob(jobId, { status: 'failed', step: 'Failed', progress: 100, completedAt: new Date().toISOString(), output: result?.error || '' });
          appendAudit({ action: 'deploy.package', actionCategory: 'Deployments', targetType: 'Host', targetIds: [...targetIds], parameters: { packagePath }, result: 'failed', error: result?.error });
          toast.error('Deployment failed', { detail: result?.error, duration: 8000 });
        }
      } catch (e) {
        updateJob(jobId, { status: 'failed', step: 'Failed', progress: 100, output: e.message });
        toast.error('Deployment failed', { detail: e.message, duration: 8000 });
      }
      setDeploying(false);
    };

    if (!open) return null;

    return (
      <Modal open={open} onClose={onClose} title="Install Package on Selected Workstations" subtitle={`${targetNames.length} host(s) selected`} size="lg"
        footer={<>
          <ActionButton variant="secondary" onClick={onClose} disabled={deploying}>Cancel</ActionButton>
          <ActionButton variant="primary" icon="Package" onClick={deploy} disabled={deploying}>{deploying ? 'Deploying…' : 'Install Now'}</ActionButton>
        </>}>
        <div className="space-y-3">
          <div className="p-2 bg-info/10 border border-info/30 rounded text-xs text-info">
            <Icon name="Server" size={12} className="inline mr-1.5" />
            Targets: {targetNames.slice(0, 5).join(', ')}{targetNames.length > 5 ? ` + ${targetNames.length - 5} more` : ''}
          </div>

          {savedPackages.length > 0 && (
            <FormField label="Saved Packages (click to load)">

          <FormField label="Package Path (UNC or local on backend)" hint="MSI, EXE, or PS1 file. Backend copies it to \\host\C$\Temp\ then executes remotely.">
            <Input value={packagePath} onChange={e => setPackagePath(e.target.value)} placeholder="C:\\Packages\\chrome.msi  or  \\\\fileserver\\share\\chrome.msi" className="font-mono text-[11px]" />
          </FormField>
