  };

  /* ========================================================================
     APP ROOT — wires routing, drawer, toasts, renders AppShell + active screen
     ====================================================================== */

  // ============================================================
  // LOGIN SCREEN — Single username/password, no invites
  // ============================================================
  const LoginScreen = ({ onLogin }) => {
    const [username, setUsername] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
      e.preventDefault();
      if (!username.trim() || !password.trim()) { setError('Enter username and password'); return; }
      setLoading(true);
      setError('');
      const result = await onLogin(username.trim(), password);
      if (!result.success) { setError(result.error || 'Login failed'); }
      setLoading(false);
    };

    return (
      <div className="flex items-center justify-center min-h-screen bg-bg p-4">
        <div className="w-full max-w-sm">
          {/* Logo */}
          <div className="flex flex-col items-center mb-6">
            <div className="w-14 h-14 rounded-xl bg-primary flex items-center justify-center mb-3">
              <Icon name="Grid3x3" size={28} className="text-white" />
            </div>
            <h1 className="text-xl font-bold text-text">SupportHubLAN</h1>
            <p className="text-xs text-text-dim mt-1">Windows Endpoint Administration</p>
          </div>

          {/* Login form */}
          <form onSubmit={handleSubmit} className="bg-surface border border-border rounded-lg p-6 space-y-4">
            <div>
              <label className="block text-xs font-medium text-text-dim mb-1.5">Username</label>
              <input
                type="text"
                value={username}
                onChange={(e) => setUsername(e.target.value)}
                autoFocus
                disabled={loading}
                className="w-full px-3 py-2 text-sm bg-surface-raised border border-border rounded text-text focus:border-primary focus:outline-none"
                placeholder="admin"
              />
            </div>
            <div>
              <label className="block text-xs font-medium text-text-dim mb-1.5">Password</label>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                disabled={loading}
                className="w-full px-3 py-2 text-sm bg-surface-raised border border-border rounded text-text focus:border-primary focus:outline-none"
                placeholder="••••••••"
              />
            </div>
            {error && (
              <div className="p-2 bg-danger/10 border border-danger/30 rounded text-xs text-danger flex items-center gap-1.5">
                <Icon name="AlertCircle" size={12} /> {error}
              </div>
            )}
            <button
              type="submit"
              disabled={loading}
              className="w-full py-2 text-sm font-medium text-white bg-primary hover:bg-primary-hover rounded transition-colors disabled:opacity-50 flex items-center justify-center gap-2"
            >
              {loading ? (<><Icon name="Loader2" size={14} className="animate-spin" /> Signing in…</>) : 'Sign In'}
            </button>
          </form>

          {/* Footer */}
          <p className="text-center text-[10px] text-text-dim mt-4">
            Configure credentials in <code className="font-mono text-text-dim">.env</code> (APP_USER, APP_PASS)
          </p>
        </div>
      </div>
    );
  };

  const App = () => {
    // ---- Load persisted state from localStorage (if available) ----
    const loadPersisted = (key, fallback) => {
      try {
        const raw = localStorage.getItem('supporthublan:' + key);
        if (raw) return JSON.parse(raw);
      } catch (e) { /* ignore */ }
      return fallback;
    };

    const [route, setRoute] = useState({ page: 'dashboard', params: {} });
    const [search, setSearch] = useState('');
    const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
    const [drawer, setDrawer] = useState({ open: false, kind: null, data: null });
    const [mobileNavOpen, setMobileNavOpen] = useState(false);
    const [lastRefresh, setLastRefresh] = useState(new Date().toISOString());
    const [theme, setTheme] = useState(() => loadPersisted('theme', 'system'));
    const [showShortcuts, setShowShortcuts] = useState(false);

    // ---- Auth state (single username/password login) ----
    const [authToken, setAuthToken] = useState(() => { try { return localStorage.getItem('supporthublan:auth-token') || ''; } catch { return ''; } });
    const [currentUser, setCurrentUser] = useState(null);
    const [authChecking, setAuthChecking] = useState(true);

    // Check auth on mount
    // LOGIN_DISABLED = true during development — auto-login as admin, no login screen.
    // Set to false when ready to enforce login in production.
    const LOGIN_DISABLED = true;
    useEffect(() => {
      (async () => {
        if (LOGIN_DISABLED) {
          setCurrentUser({ username: 'admin', role: 'Admin' });
          setAuthChecking(false);
          return;
        }
        try {
          const resp = await fetch((window.SUPPORTHUBLAN_API_URL || '') + '/api/auth/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
          });
          const json = await resp.json();
          if (json.success && json.authenticated) {
            setCurrentUser(json.user);
          } else if (json.success && !json.authenticated && window._supporthublanBackendStatus === 'connected') {
            // Backend requires auth but we're not logged in
            setCurrentUser(null);
          } else {
            // No backend or no auth required — allow access
            setCurrentUser({ username: 'admin', role: 'Admin' });
          }
        } catch (e) {
          // No backend — allow access (demo mode)
          setCurrentUser({ username: 'demo', role: 'Demo' });
        }
        setAuthChecking(false);
      })();
    }, [authToken]);

    const login = async (username, password) => {
      try {
        const resp = await fetch((window.SUPPORTHUBLAN_API_URL || '') + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const json = await resp.json();
        if (json.success && json.token) {
          setAuthToken(json.token);
          setCurrentUser(json.user);
          try { localStorage.setItem('supporthublan:auth-token', json.token); } catch {}
          return { success: true };
        }
        return { success: false, error: json.error || 'Login failed' };
      } catch (e) {
        return { success: false, error: e.message };
      }
    };

    const logout = async () => {
      try { await fetch((window.SUPPORTHUBLAN_API_URL || '') + '/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + authToken } }); } catch {}
      setAuthToken('');
      setCurrentUser(null);
      try { localStorage.removeItem('supporthublan:auth-token'); } catch {}
    };

    // ---- Stateful data (initialized from localStorage or seed consts; mutable) ----
    const [hosts, setHosts] = useState(() => loadPersisted('hosts', HOSTS));
    const [activeJobs, setActiveJobs] = useState(() => loadPersisted('activeJobs', ACTIVE_JOBS));
    const [savedQueues, setSavedQueues] = useState(() => loadPersisted('savedQueues', SAVED_QUEUES));
    const [auditEvents, setAuditEvents] = useState(() => loadPersisted('auditEvents', AUDIT_EVENTS));
    const [users, setUsers] = useState(() => loadPersisted('users', USERS));
    const [patchHistory, setPatchHistory] = useState(() => loadPersisted('patchHistory', PATCH_HISTORY));
    const [deploymentHistory, setDeploymentHistory] = useState(() => loadPersisted('deploymentHistory', DEPLOYMENT_HISTORY));
    const [jobLogs, setJobLogs] = useState(() => loadPersisted('jobLogs', JOB_LOGS));
    const [apiKeys, setApiKeys] = useState(() => loadPersisted('apiKeys', API_KEYS));
    const [savedCommands, setSavedCommands] = useState(() => loadPersisted('savedCommands', SAVED_COMMANDS));
    const [scheduledTasks, setScheduledTasks] = useState(() => loadPersisted('scheduledTasks', SCHEDULED_TASKS));
    const [maintenanceWindows, setMaintenanceWindows] = useState(() => loadPersisted('maintenanceWindows', MAINTENANCE_WINDOWS));
    const [notificationRules, setNotificationRules] = useState(() => loadPersisted('notificationRules', [
      { id: 'nr1', event: 'Job failed', frequency: 'Immediate', recipients: 'All admins', enabled: true },
      { id: 'nr2', event: 'Host went offline', frequency: 'Immediate', recipients: 'All admins', enabled: true },
      { id: 'nr3', event: 'Critical update pending > 72h', frequency: 'Hourly digest', recipients: 'Operators', enabled: true },
      { id: 'nr4', event: 'Deployment failed', frequency: 'Immediate', recipients: 'All admins', enabled: true },
      { id: 'nr5', event: 'Compliance below threshold', frequency: 'Daily digest', recipients: 'All admins', enabled: false },
      { id: 'nr6', event: 'Scheduled task missed', frequency: 'Immediate', recipients: 'Operators', enabled: true },
      { id: 'nr7', event: 'Job completed', frequency: 'Daily digest', recipients: 'All admins', enabled: false },
      { id: 'nr8', event: 'Host status audio alert', frequency: 'Immediate', recipients: 'Console', enabled: true },
      { id: 'nr9', event: 'Host status email (online)', frequency: 'Immediate', recipients: 'All admins', enabled: false },
      { id: 'nr10', event: 'Host status email (offline)', frequency: 'Immediate', recipients: 'All admins', enabled: true },
    ]));
    const [queueDraft, setQueueDraft] = useState(() => loadPersisted('queueDraft', {
      name: 'New Queue',
      description: '',
      mode: 'standard',
      errorHandling: 'stop',
      retryCount: 0,
      retryDelay: 30,
      notifyOn: ['failure'],
      steps: [],
      selectedTargets: [],
    }));

    // ---- Mutators ----
    const addHosts = useCallback((newHosts) => {
      setHosts(prev => [...prev, ...newHosts]);
      // Persist to backend when LIVE
      if (window.SupportHubLANAPI && window._supporthublanBackendStatus === 'connected') {
        (async () => {
          try {
            // Get active inventory
            const invResp = await fetch(window.SUPPORTHUBLAN_API_URL + '/api/inventories');
            const invJson = await invResp.json();
            if (!invJson.success || !invJson.data || invJson.data.length === 0) return;
            const active = invJson.data.find(i => i.is_active === 1) || invJson.data[0];
            // Bulk upsert hosts
            await fetch(window.SUPPORTHUBLAN_API_URL + '/api/inventories/' + active.id + '/hosts/bulk', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ hosts: newHosts }),
            });
          } catch (e) {
            console.log('[addHosts] Failed to persist to backend:', e.message);
          }
        })();
      }
    }, []);
    const updateHost = useCallback((id, patch) => {
      setHosts(prev => prev.map(h => h.id === id ? { ...h, ...patch } : h));
    }, []);
    const updateHosts = useCallback((updater) => {
      setHosts(prev => updater(prev));
    }, []);
    const addJob = useCallback((job) => {
      setActiveJobs(prev => [...prev, job]);
    }, []);
    const updateJob = useCallback((id, patch) => {
      setActiveJobs(prev => prev.map(j => j.id === id ? { ...j, ...patch } : j));
    }, []);
    const removeJob = useCallback((id) => {
      setActiveJobs(prev => prev.filter(j => j.id !== id));
    }, []);
    const addSavedQueue = useCallback((queue) => {
      setSavedQueues(prev => [...prev, queue]);
    }, []);
    const appendAudit = useCallback((event) => {
      const fullEvent = {
        id: 'ev-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
        timestamp: new Date().toISOString(),
        userId: CURRENT_USER.id,
        userName: CURRENT_USER.username,
        userRole: CURRENT_USER.role,
        sourceIp: '10.10.1.50',
        sessionId: 's01',
        ...event,
      };
      setAuditEvents(prev => [fullEvent, ...prev].slice(0, 500)); // cap at 500 events
    }, []);
    // ---- Mutators for users, patch history, deployment history, job logs ----
    const addUser = useCallback((user) => {
      setUsers(prev => [...prev, user]);
    }, []);
    const updateUser = useCallback((id, patch) => {
      setUsers(prev => prev.map(u => u.id === id ? { ...u, ...patch } : u));
    }, []);
    const removeUser = useCallback((id) => {
      setUsers(prev => prev.filter(u => u.id !== id));
    }, []);
    const addPatchHistory = useCallback((entry) => {
      setPatchHistory(prev => [entry, ...prev].slice(0, 200));
    }, []);
    const addDeploymentHistory = useCallback((entry) => {
      setDeploymentHistory(prev => [entry, ...prev].slice(0, 200));
    }, []);
    const addJobLog = useCallback((entry) => {
      setJobLogs(prev => [entry, ...prev].slice(0, 200));
    }, []);

    // ---- API Keys mutators ----
    const addApiKey = useCallback((key) => {
      setApiKeys(prev => [key, ...prev]);
    }, []);
    const removeApiKey = useCallback((id) => {
      setApiKeys(prev => prev.filter(k => k.id !== id));
    }, []);
    const addSavedCommand = useCallback((cmd) => {
      setSavedCommands(prev => [cmd, ...prev]);
    }, []);
    const addScheduledTask = useCallback((task) => {
      setScheduledTasks(prev => [...prev, task]);
    }, []);

    // ---- Maintenance Windows mutators ----
    const addMaintenanceWindow = useCallback((mw) => {
      setMaintenanceWindows(prev => [...prev, mw]);
    }, []);
    const removeMaintenanceWindow = useCallback((id) => {
      setMaintenanceWindows(prev => prev.filter(m => m.id !== id));
    }, []);

    // ---- Notification Rules mutators ----
    const updateNotificationRule = useCallback((id, patch) => {
      setNotificationRules(prev => prev.map(r => r.id === id ? { ...r, ...patch } : r));
    }, []);

    // ---- Notification firing effect ----
    // Watches new audit events and fires toasts for matching enabled rules with "Immediate" frequency.
    // Uses a ref to track which events we've already processed.
    const lastAuditIdRef = useRef(null);
    useEffect(() => {
      if (auditEvents.length === 0) return;
      const latest = auditEvents[0];
      if (latest.id === lastAuditIdRef.current) return; // already processed
      lastAuditIdRef.current = latest.id;
      // Match rules against the new event
      const matchingRules = notificationRules.filter(r => r.enabled && r.frequency === 'Immediate');
      matchingRules.forEach(rule => {
        let match = false;
        let toastType = 'info';
        const action = latest.action.toLowerCase();
        const category = latest.actionCategory.toLowerCase();
        if (rule.event === 'Job failed' && (action.includes('fail') || latest.result === 'error')) { match = true; toastType = 'error'; }
        else if (rule.event === 'Host went offline' && (action.includes('offline') || action.includes('shutdown') || action.includes('reboot'))) { match = true; toastType = 'warning'; }
        else if (rule.event === 'Critical update pending > 72h' && category.includes('updates')) { match = true; toastType = 'warning'; }
        else if (rule.event === 'Deployment failed' && (action.includes('deploy') && latest.result === 'error')) { match = true; toastType = 'error'; }
        else if (rule.event === 'Scheduled task missed' && action.includes('schedule')) { match = true; toastType = 'warning'; }
        else if (rule.event === 'Job completed' && (action.includes('complete') || action.includes('execute') || action.includes('install') || action.includes('deploy') || action.includes('reboot'))) { match = true; toastType = 'success'; }
        if (match) {
          // We can't call toast() here directly because we're in App, not inside ToastProvider.
          // Instead, dispatch a custom event that ToastProvider listens for.
          window.dispatchEvent(new CustomEvent('supporthublan:notify', { detail: { type: toastType, message: `[${rule.event}] ${latest.action} — by ${latest.userName}`, detail: `Targets: ${latest.targetIds.length} · Category: ${latest.actionCategory}` } }));
        }
      });
    }, [auditEvents, notificationRules]);

    // ---- Power action: flip host.onlineStatus with realistic timing ----
    // When backend is connected, calls real Restart-Computer/Stop-Computer/WoL.
    // When in demo mode, simulates the power action with timers.
    const executePowerAction = useCallback(async ({ action, targetIds, mode = 'standard' }) => {
      const jobId = 'job-' + Date.now();
      const targetHosts = hosts.filter(h => targetIds.includes(h.id));
      const targetNames = targetHosts.map(h => h.hostname);
      const actionLabel = action === 'reboot' ? 'Reboot' : action === 'shutdown' ? 'Shutdown' : action === 'wol' ? 'Wake on LAN' : action;

      addJob({
        id: jobId,
        name: `${actionLabel} — ${targetIds.length} hosts`,
        targets: [...targetIds],
        step: action === 'wol' ? 'Sending magic packets (1/2)' : 'Sending power signal (1/2)',
        progress: 30,
        startedAt: new Date().toISOString(),
        status: 'running',
      });
      toast.info(`${actionLabel} on ${targetIds.length} host(s)…`);

      if (!window.SupportHubLANAPI) {
        updateJob(jobId, { progress: 100, step: 'Failed (no API client)', status: 'failed', completedAt: new Date().toISOString() });
        appendAudit({ action: `power.${action}`, actionCategory: 'Power', targetType: 'Host', targetIds: [...targetIds], parameters: { mode, hostnames: targetNames }, result: 'failed' });
        toast.error('API client not loaded');
        return jobId;
      }

      try {
        let successCount = 0, failCount = 0, demoMode = false;
        for (const host of targetHosts) {
          let result;
          if (action === 'wol') {
            if (!host.macAddress) { failCount++; continue; }
            result = await window.SupportHubLANAPI.wakeOnLan(host.macAddress);
          } else {
            result = await window.SupportHubLANAPI.powerAction(host.hostname, action === 'reboot' ? 'reboot' : 'shutdown');
          }
          if (result && result.success && !result.demo) successCount++;
          else if (result && result.demo) { demoMode = true; failCount++; }
          else failCount++;
        }

        if (successCount > 0 && !demoMode) {
          updateJob(jobId, { progress: 100, step: `Done — ${successCount}/${targetHosts.length} succeeded`, status: 'completed', completedAt: new Date().toISOString() });
          appendAudit({ action: `power.${action}`, actionCategory: 'Power', targetType: 'Host', targetIds: [...targetIds], parameters: { mode, hostnames: targetNames }, result: 'success' });
          toast.success(`${actionLabel} sent to ${successCount}/${targetHosts.length} host(s)`, { duration: 5000 });
          // Optimistically update host status
          if (action === 'wol') {
            updateHosts(prev => prev.map(h => targetIds.includes(h.id) ? { ...h, onlineStatus: 'online', pingStatus: 'up' } : h));
          } else if (action === 'shutdown') {
            updateHosts(prev => prev.map(h => targetIds.includes(h.id) ? { ...h, onlineStatus: 'offline', pingStatus: 'down' } : h));
          } else if (action === 'reboot') {
            updateHosts(prev => prev.map(h => targetIds.includes(h.id) ? { ...h, onlineStatus: 'offline', pendingReboot: false } : h));
          }
        } else if (demoMode) {
          updateJob(jobId, { progress: 100, step: 'Demo mode — backend not connected', status: 'failed', completedAt: new Date().toISOString() });
          appendAudit({ action: `power.${action}`, actionCategory: 'Power', targetType: 'Host', targetIds: [...targetIds], parameters: { mode, hostnames: targetNames }, result: 'skipped' });
          toast.warning(`${actionLabel} skipped — backend not connected. Run the SupportHubLAN server on a Windows admin PC to send real power commands.`, { duration: 8000 });
        } else {
          updateJob(jobId, { progress: 100, step: `Failed — ${failCount}/${targetHosts.length} failed`, status: 'failed', completedAt: new Date().toISOString() });
          appendAudit({ action: `power.${action}`, actionCategory: 'Power', targetType: 'Host', targetIds: [...targetIds], parameters: { mode, hostnames: targetNames }, result: 'failed' });
          toast.error(`${actionLabel} failed on ${failCount} host(s)`, { duration: 8000 });
        }
      } catch (e) {
        updateJob(jobId, { progress: 100, step: 'Failed', status: 'failed', completedAt: new Date().toISOString() });
        appendAudit({ action: `power.${action}`, actionCategory: 'Power', targetType: 'Host', targetIds: [...targetIds], parameters: { mode, hostnames: targetNames }, result: 'failed', error: e.message });
        toast.error(`${actionLabel} failed`, { detail: e.message, duration: 8000 });
      }
      return jobId;
    }, [hosts, addJob, appendAudit, updateHosts, updateJob, addJobLog]);

    // ---- Execute deployment: create a job that progresses through Copying → Extracting → Installing → Verifying ----
    const executeDeployment = useCallback(async ({ profile, targetIds }) => {
      const jobId = 'job-' + Date.now();
      const targetNames = hosts.filter(h => targetIds.includes(h.id)).map(h => h.hostname);
      addJob({
        id: jobId,
        name: `Deploy ${profile.name} — ${targetIds.length} hosts`,
        targets: [...targetIds],
        step: 'Deploying (1/1)',
        progress: 30,
        startedAt: new Date().toISOString(),
        status: 'running',
      });
      // Call REAL backend endpoint
      if (window.SupportHubLANAPI) {
        try {
          const result = await window.SupportHubLANAPI.deployPackage(targetNames, profile.packagePath, profile.arguments, null, profile.rebootBehavior);
          if (result && result.success && !result.demo) {
            updateJob(jobId, { progress: 100, step: 'Complete', status: 'completed', completedAt: new Date().toISOString(), output: result.data || '' });
            appendAudit({ action: 'deployments.run', actionCategory: 'Deployments', targetType: 'Host', targetIds, parameters: { jobId, profileName: profile.name, hostnames: targetNames }, result: 'success' });
            toast.success(`Deployment of ${profile.name} completed on ${targetIds.length} host(s)`);
          } else if (result && result.demo) {
            updateJob(jobId, { progress: 100, step: 'Demo mode — backend not connected', status: 'failed', completedAt: new Date().toISOString() });
            toast.warning('Backend not connected. Run the server to deploy packages.', { duration: 8000 });
          } else {
            updateJob(jobId, { progress: 100, step: 'Failed', status: 'failed', completedAt: new Date().toISOString(), output: result?.error || '' });
            toast.error('Deployment failed', { detail: result?.error, duration: 8000 });
          }
        } catch (e) {
          updateJob(jobId, { progress: 100, step: 'Failed', status: 'failed', completedAt: new Date().toISOString(), output: e.message });
          toast.error('Deployment failed', { detail: e.message, duration: 8000 });
        }
      }
      return jobId;
    }, [hosts, addJob, appendAudit, updateJob]);

    // generateDemoOutput was REMOVED — no more fake script output.
    // When the backend is not connected, executeScript returns an honest error.

    // ---- Execute script: generate per-host output ----
    // When backend is connected, executes real PowerShell via Invoke-Command.
    // When in demo mode, generates plausible simulated output.
    const executeScript = useCallback(({ language, code, targetIds, timeout = 60 }) => {
      const execId = 'ex-' + Date.now();
      const targetNames = hosts.filter(h => targetIds.includes(h.id)).map(h => h.hostname);
      appendAudit({
        action: 'scripts.execute', actionCategory: 'Scripts',
        targetType: 'Host', targetIds: [...targetIds],
        parameters: { execId, language, codePreview: code.slice(0, 200), hostnames: targetNames },
        result: 'success',
      });

      // Try real API call
      if (window.SupportHubLANAPI) {
        return window.SupportHubLANAPI.executeScript(targetNames, code, null, language, timeout).then(result => {
          if (result.success && !result.demo) {
            // Parse real output from backend
            try {
              const realResults = JSON.parse(result.data);
              const outputs = (Array.isArray(realResults) ? realResults : [realResults]).map(r => ({
                hostId: targetIds[targetNames.indexOf(r.hostname)] || targetIds[0],
                hostname: r.hostname,
                status: r.status === 'complete' ? 'complete' : 'failed',
                exitCode: r.exitCode || 0,
                duration: '—',
                output: r.output || r.error || '(no output)',
              }));
              return { execId, outputs, real: true };
            } catch (e) {
              return { execId, outputs: [], real: false, error: 'Failed to parse backend response' };
            }
          }
          // Fall through to demo mode
          return { id: execId, targetIds, language, startedAt: new Date().toISOString(), perHost: hosts.filter(h => targetIds.includes(h.id)).map(h => ({ hostname: h.hostname, success: false, output: 'Backend not connected' })), output: 'Backend not connected' };
        });
      }
      // Demo mode
      return Promise.resolve({ id: execId, targetIds, language, startedAt: new Date().toISOString(), perHost: hosts.filter(h => targetIds.includes(h.id)).map(h => ({ hostname: h.hostname, success: false, output: 'Backend not connected' })), output: 'Backend not connected' });
    }, [hosts, appendAudit]);

    const clearPersistedState = useCallback(() => {
      try {
        Object.keys(localStorage).filter(k => k.startsWith('supporthublan:')).forEach(k => localStorage.removeItem(k));
      } catch (e) {}
      setHosts(HOSTS);
      setActiveJobs(ACTIVE_JOBS);
      setSavedQueues(SAVED_QUEUES);
      setAuditEvents(AUDIT_EVENTS);
      setUsers(USERS);
      setPatchHistory(PATCH_HISTORY);
      setDeploymentHistory([]);
      setJobLogs(JOB_LOGS);
      setApiKeys(API_KEYS);
      setMaintenanceWindows(MAINTENANCE_WINDOWS);
      setSavedCommands(SAVED_COMMANDS);
      setScheduledTasks(SCHEDULED_TASKS);
      setQueueDraft({ name: 'New Queue', description: '', mode: 'standard', errorHandling: 'stop', retryCount: 0, retryDelay: 30, notifyOn: ['failure'], steps: [], selectedTargets: [] });
      setTheme('dark');
    }, []);

    const navigate = useCallback((page, params = {}) => {
      setRoute({ page, params });
      setMobileNavOpen(false);
      // scroll workspace to top
      const ws = document.getElementById('workspace');
      if (ws) ws.scrollTop = 0;
    }, []);

    const openHost = useCallback((host) => setDrawer({ open: true, kind: 'host', data: host }), []);
    const openJob = useCallback((job) => setDrawer({ open: true, kind: 'job', data: job }), []);
    const closeDrawer = useCallback(() => setDrawer(d => ({ ...d, open: false })), []);

    // Auto-refresh lastRefresh every 60s
    useEffect(() => {
      const i = setInterval(() => setLastRefresh(new Date().toISOString()), 60000);
      return () => clearInterval(i);
    }, []);

    // ---- Sync hosts from backend when LIVE ----
    // When the backend is connected, load real hosts from the encrypted store
    // instead of the hardcoded demo seed data. Polls every 30s to pick up changes
    // made from other tabs or via the API. When backend goes offline, keeps the
    // last-known hosts (doesn't blow them away).
    const [liveHostsLoaded, setLiveHostsLoaded] = useState(false);
    useEffect(() => {
      let cancelled = false;
      async function loadHostsFromBackend() {
        if (!window.SupportHubLANAPI) return;
        try {
          const available = await window.SupportHubLANAPI.isBackendAvailable();
          if (!available || cancelled) return;
          // Fetch the active inventory's hosts
          const invResp = await fetch(window.SUPPORTHUBLAN_API_URL + '/api/inventories');
          const invJson = await invResp.json();
          if (!invJson.success || !invJson.data || invJson.data.length === 0 || cancelled) return;
          const active = invJson.data.find(i => i.is_active === 1) || invJson.data[0];
          const hostsResp = await fetch(window.SUPPORTHUBLAN_API_URL + '/api/inventories/' + active.id + '/hosts');
          const hostsJson = await hostsResp.json();
          if (!hostsJson.success || cancelled) return;
          // Convert backend host format (snake_case) to frontend format (camelCase)
          const backendHosts = (hostsJson.data || []).map(h => ({
            id: 'db-' + h.id,
            hostname: h.hostname,
            ipAddress: h.ip_address || '',
            macAddress: h.mac_address || '',
            fqdn: h.fqdn || '',
            osName: h.os || 'Windows',
            osVersion: '',
            osBuild: '',
            onlineStatus: h.online_status || 'unknown',
            pingStatus: h.online_status === 'online' ? 'up' : h.online_status === 'offline' ? 'down' : 'unknown',
            patchState: h.patch_state || 'unknown',
            pendingReboot: h.pending_reboot === 1,
            lastSeen: h.last_seen,
            site: h.site || '',
            owner: h.owner || '',
            department: h.department || '',
            tags: h.tags ? (typeof h.tags === 'string' ? h.tags.split(',').filter(Boolean) : h.tags) : [],
            notes: h.notes || '',
            _fromBackend: true,
            _inventoryId: h.inventory_id,
          }));
          if (!cancelled && backendHosts.length > 0) {
            // Replace the demo seed data with real backend hosts
            setHosts(backendHosts);
            setLiveHostsLoaded(true);
          } else if (!cancelled && !liveHostsLoaded) {
            // First load with empty backend — clear the demo seed data so the user
            // sees an empty inventory (not fake hosts) when LIVE
            setHosts([]);
            setLiveHostsLoaded(true);
          }
        } catch (e) {
          // Silently fail — keep current hosts
        }
      }
      loadHostsFromBackend();
      const interval = setInterval(loadHostsFromBackend, 30000);
      return () => { cancelled = true; clearInterval(interval); };
    }, [liveHostsLoaded]);

    // ---- Online/offline status polling — ping all hosts every 10 min ----
    // Only runs when the Dashboard is open. Uses /api/hosts/status-check
    // to batch-ping all hosts. Updates online/offline status in real time.
    const checkHostStatuses = useCallback(async () => {
      if (!window.SupportHubLANAPI) return;
      const available = await window.SupportHubLANAPI.isBackendAvailable();
      if (!available) return;
      const hostnames = hosts.filter(h => h.hostname).map(h => h.hostname);
      if (hostnames.length === 0) return;
      try {
        const result = await window.SupportHubLANAPI.checkHostStatus(hostnames);
        if (result && result.success && !result.demo) {
          let parsed;
          try { parsed = JSON.parse(result.data); } catch { parsed = []; }
          const arr = Array.isArray(parsed) ? parsed : [parsed];
          const statusMap = {};
          arr.forEach(r => { if (r.hostname) statusMap[r.hostname] = r.online ? 'online' : 'offline'; });
          setHosts(prev => prev.map(h => {
            const newStatus = statusMap[h.hostname];
            if (newStatus && newStatus !== h.onlineStatus) {
              return { ...h, onlineStatus: newStatus, pingStatus: newStatus === 'online' ? 'up' : 'down', lastSeen: newStatus === 'online' ? new Date().toISOString() : h.lastSeen };
            }
            return h;
          }));
        }
      } catch (e) {}
    }, [hosts]);

    // Run status check on mount and every 10 minutes when on Dashboard
    useEffect(() => {
      if (route.page !== 'dashboard') return;
      checkHostStatuses();
      const interval = setInterval(checkHostStatuses, 600000); // 10 minutes
      return () => clearInterval(interval);
    }, [route.page, checkHostStatuses]);

    // ---- Hardware info collection — when a host is added, fetch its hardware ----
    // Called after addHosts() to populate hardware details via PsInfo
    const fetchHardwareForHost = useCallback(async (hostname) => {
      if (!window.SupportHubLANAPI) return;
      try {
        const result = await window.SupportHubLANAPI.getHardwareInfo(hostname);
        if (result && result.success && !result.demo && result.data) {
          const hw = result.data;
          // Map the new comprehensive hardware data to host fields
          setHosts(prev => prev.map(h => {
            if (h.hostname !== hostname) return h;
            return {
              ...h,
              osName: hw.os?.name || h.osName,
              osVersion: hw.os?.version || h.osVersion,
              osBuild: hw.os?.build || h.osBuild,
              cpuModel: hw.processors?.[0]?.name || h.cpuModel,
              ramGb: hw.system?.totalRamMB ? Math.round(hw.system.totalRamMB / 1024) : h.ramGb,
              ipAddress: hw.network?.[0]?.ipAddress?.split(',')[0]?.trim() || h.ipAddress,
              macAddress: hw.network?.[0]?.macAddress || h.macAddress,
              fqdn: hw.system?.domain ? h.hostname + '.' + hw.system.domain : h.fqdn,
              _hardwareInfo: hw,
            };
          }));
          if (result.changes && result.changes.length > 0) {
            result.changes.forEach(c => {
              toast.warning(`Hardware change on ${hostname}: ${c.field}`, {
                detail: `${c.oldValue} → ${c.newValue}`,
                duration: 10000
              });
            });
          }
        }
      } catch (e) {}
    }, []);

    // ---- Scheduled hardware check (every 24h) ----
    // Runs automatically when the app is open. Can also be triggered manually.
    const runHardwareCheck = useCallback(async () => {
      if (!window.SupportHubLANAPI) return;
      const available = await window.SupportHubLANAPI.isBackendAvailable();
      if (!available) { toast.warning('Backend not connected.'); return; }
      const hostnames = hosts.filter(h => h.hostname).map(h => h.hostname);
      if (hostnames.length === 0) { toast.warning('No hosts to check.'); return; }
      toast.info(`Checking hardware on ${hostnames.length} host(s)…`);
      try {
        const result = await window.SupportHubLANAPI.checkHardwareChanges(hostnames);
        if (result && result.success && !result.demo) {
          let parsed;
          try { parsed = JSON.parse(result.data); } catch { parsed = []; }
          const arr = Array.isArray(parsed) ? parsed : [parsed];
          const changed = arr.filter(r => r.changes && r.changes.length > 0);
          if (changed.length > 0) {
            changed.forEach(r => {
              toast.warning(`Hardware changed on ${r.hostname}!`, {
                detail: r.changes.map(c => `${c.field}: ${c.oldValue} → ${c.newValue}`).join(', '),
                duration: 10000
              });
            });
            appendAudit({ action: 'hardware.check', actionCategory: 'Inventory', targetType: 'Host', targetIds: [], parameters: { hostsChecked: hostnames.length, hostsChanged: changed.length }, result: 'success' });
          } else {
            toast.success(`Hardware check complete — no changes detected on ${hostnames.length} host(s).`);
            appendAudit({ action: 'hardware.check', actionCategory: 'Inventory', targetType: 'Host', targetIds: [], parameters: { hostsChecked: hostnames.length, changesDetected: 0 }, result: 'success' });
          }
        }
      } catch (e) {
        toast.error('Hardware check failed', { detail: e.message });
      }
    }, [hosts, appendAudit]);

    // Auto-run hardware check every 24 hours when app is open
    useEffect(() => {
      const HW_CHECK_KEY = 'supporthublan:last-hw-check';
      const lastCheck = (() => { try { return parseInt(localStorage.getItem(HW_CHECK_KEY) || '0', 10); } catch { return 0; } })();
      const now = Date.now();
      const twentyFourHours = 24 * 60 * 60 * 1000;
      if (now - lastCheck > twentyFourHours) {
        // Run check on mount if >24h since last check
        setTimeout(() => { runHardwareCheck(); try { localStorage.setItem(HW_CHECK_KEY, String(now)); } catch {} }, 5000);
      }
      const interval = setInterval(() => {
        runHardwareCheck();
        try { localStorage.setItem(HW_CHECK_KEY, String(Date.now())); } catch {}
      }, twentyFourHours);
      return () => clearInterval(interval);
    }, [runHardwareCheck]);

    // ---- Apply theme class to <html> + persist ----
    useEffect(() => {
      const html = document.documentElement;
      html.classList.remove('dark', 'light');
      html.classList.add(theme);
      try { localStorage.setItem('supporthublan:theme', JSON.stringify(theme)); } catch (e) {}
    }, [theme]);

    const toggleTheme = useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);

    // ---- applyTheme: actually applies the theme to <html> class + persists ----
    // (This was missing — theme toggle was updating state but never changing the DOM)
    const applyTheme = useCallback((mode) => {
      const html = document.documentElement;
      const effective = mode === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      if (effective === 'dark') {
        html.classList.add('dark');
        html.classList.remove('light');
      } else {
        html.classList.add('light');
        html.classList.remove('dark');
      }
      try { localStorage.setItem('supporthublan:theme', mode); } catch {}
    }, []);

    // Apply theme on mount + whenever theme changes
    useEffect(() => { applyTheme(theme); }, [theme, applyTheme]);

    // Listen to system theme changes when in 'system' mode
    useEffect(() => {
      if (theme !== 'system') return;
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      const handler = () => applyTheme('system');
      mq.addEventListener('change', handler);
      return () => mq.removeEventListener('change', handler);
    }, [theme, applyTheme]);

    // ---- Keyboard shortcuts ----
    // ? → show shortcuts overlay, g d/i/u/q/s/r/p/e → navigate, Esc → close drawer/overlay
    useEffect(() => {
      const handler = (e) => {
        const tag = document.activeElement?.tagName;
        const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
        // Esc always works
        if (e.key === 'Escape') {
          if (showShortcuts) { setShowShortcuts(false); return; }
          if (drawer.open) { closeDrawer(); return; }
          return;
        }
        if (isInput) return; // don't trigger shortcuts while typing
        // ? shows help
        if (e.key === '?' || (e.shiftKey && e.key === '/')) { e.preventDefault(); setShowShortcuts(s => !s); return; }
        // g + letter → navigate
        if (e.key === 'g') {
          const navMap = { d: 'dashboard', i: 'inventory', u: 'updates', q: 'queue', s: 'scheduler', r: 'reports', p: 'power', e: 'deployments', c: 'scripts', v: 'services', m: 'remote', t: 'settings' };
          const onKey = (ev) => {
            if (ev.key in navMap) { navigate(navMap[ev.key]); }
            window.removeEventListener('keydown', onKey);
          };
          window.addEventListener('keydown', onKey);
          setTimeout(() => window.removeEventListener('keydown', onKey), 1500);
          return;
        }
        // t → toggle theme
        if (e.key === 't' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleTheme(); return; }
        // Ctrl+B → toggle grid border style (BatchPatch feature)
        if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); document.documentElement.classList.toggle('grid-borderless'); toast.info(`Grid border style: ${document.documentElement.classList.contains('grid-borderless') ? 'borderless' : 'default'}`); return; }
        // / → focus search (already handled in TopHeader, but also handle here as fallback)
        if (e.key === '/' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); document.querySelector('input[placeholder*="Search hosts"]')?.focus(); return; }
      };
      window.addEventListener('keydown', handler);
      return () => window.removeEventListener('keydown', handler);
    }, [showShortcuts, drawer.open, navigate, closeDrawer, toggleTheme]);

    // ---- Job progression effect: advance running jobs every 1.5s ----
    useEffect(() => {
      const tick = setInterval(() => {
        setActiveJobs(prev => {
          let mutated = false;
          const next = prev.map(job => {
            if (job.status !== 'running') return job;
            mutated = true;
            const newProgress = Math.min(100, job.progress + Math.random() * 12 + 5);
            // Parse step label formats:
            //   "Installing (3/6)"  → name="Installing", curIdx=3, total=6
            //   "Step 1/6: Some label" → name="Some label", curIdx=1, total=6
            //   "Queued (0/2)"       → name="Queued", curIdx=0, total=2
            const stepMatch = job.step.match(/(\d+)\s*\/\s*(\d+)/);
            let stepLabel = job.step;
            if (stepMatch) {
              const total = parseInt(stepMatch[2]);
              const newIdx = Math.min(total, Math.max(1, Math.floor(newProgress / 100 * total) + 1));
              let stepName = '';
              if (job.step.includes(':')) {
                stepName = job.step.split(':').slice(1).join(':').trim();
              } else {
                // Format like "Installing (3/6)" — extract the word before the parens
                stepName = job.step.replace(/\s*\([^)]*\)\s*$/, '').trim();
              }
              stepLabel = stepName ? `${stepName} (${newIdx}/${total})` : `Step ${newIdx}/${total}`;
            }
            if (newProgress >= 100) {
              return { ...job, progress: 100, step: 'Complete', status: 'complete' };
            }
            return { ...job, progress: newProgress, step: stepLabel };
          });
          // Remove completed jobs after 5s (mark with a _completedAt timestamp)
          const now = Date.now();
          const filtered = next.filter(j => j.status !== 'complete' || !j._completedAt || now - j._completedAt < 5000).map(j => {
            if (j.status === 'complete' && !j._completedAt) return { ...j, _completedAt: now };
            return j;
          });
          return mutated ? filtered : prev;
        });
      }, 1500);
      return () => clearInterval(tick);
    }, []);

    // ---- Persist state to localStorage on every change ----
    useEffect(() => {
      try { localStorage.setItem('supporthublan:hosts', JSON.stringify(hosts)); } catch (e) {}
    }, [hosts]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:activeJobs', JSON.stringify(activeJobs)); } catch (e) {}
    }, [activeJobs]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:savedQueues', JSON.stringify(savedQueues)); } catch (e) {}
    }, [savedQueues]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:auditEvents', JSON.stringify(auditEvents)); } catch (e) {}
    }, [auditEvents]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:queueDraft', JSON.stringify(queueDraft)); } catch (e) {}
    }, [queueDraft]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:users', JSON.stringify(users)); } catch (e) {}
    }, [users]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:patchHistory', JSON.stringify(patchHistory)); } catch (e) {}
    }, [patchHistory]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:deploymentHistory', JSON.stringify(deploymentHistory)); } catch (e) {}
    }, [deploymentHistory]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:jobLogs', JSON.stringify(jobLogs)); } catch (e) {}
    }, [jobLogs]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:apiKeys', JSON.stringify(apiKeys)); } catch (e) {}
    }, [apiKeys]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:maintenanceWindows', JSON.stringify(maintenanceWindows)); } catch (e) {}
    }, [maintenanceWindows]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:notificationRules', JSON.stringify(notificationRules)); } catch (e) {}
    }, [notificationRules]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:savedCommands', JSON.stringify(savedCommands)); } catch (e) {}
    }, [savedCommands]);
    useEffect(() => {
      try { localStorage.setItem('supporthublan:scheduledTasks', JSON.stringify(scheduledTasks)); } catch (e) {}
    }, [scheduledTasks]);

    const ctx = {
      route, navigate, search, setSearch,
      openHost, openJob, openDrawer: setDrawer, closeDrawer,
      lastRefresh, setLastRefresh,
      theme, toggleTheme, applyTheme, setTheme, showShortcuts, setShowShortcuts,
      // stateful data
      hosts, activeJobs, savedQueues, queueDraft, auditEvents,
      users, patchHistory, deploymentHistory, jobLogs,
      // mutators
      addHosts, updateHost, updateHosts, addJob, updateJob, removeJob, addSavedQueue, setQueueDraft,
      appendAudit, clearPersistedState,
      addUser, updateUser, removeUser, addPatchHistory, addDeploymentHistory, addJobLog,
      executePowerAction, executeDeployment, executeScript,
      checkHostStatuses, runHardwareCheck, fetchHardwareForHost,
      addApiKey, removeApiKey, addMaintenanceWindow, removeMaintenanceWindow,
      updateNotificationRule, apiKeys, maintenanceWindows, notificationRules,
      savedCommands, addSavedCommand,
      scheduledTasks, addScheduledTask,
    };

    const renderScreen = () => {
      switch (route.page) {
        case 'dashboard': return <DashboardScreen />;
        case 'inventory': return <InventoryScreen />;
        case 'updates': return <UpdatesScreen />;
        case 'deployments': return <DeploymentsScreen />;
        case 'scripts': return <ScriptsScreen />;
        case 'services': return <ServicesScreen />;
        case 'power': return <PowerScreen />;
        case 'queue': return <QueueScreen />;
        case 'scheduler': return <SchedulerScreen />;
        case 'reports': return <ReportsScreen />;
        case 'audit': return <AuditScreen />;
        case 'settings': return <SettingsScreen />;
        default: return <DashboardScreen />;
      }
    };

    return (
      <AppCtx.Provider value={ctx}>
        <ToastProvider>
          {/* Auth gate — show login screen if not authenticated and backend requires auth */}
          {authChecking ? (
            <div className="flex items-center justify-center h-screen bg-bg">
              <div className="text-text-dim text-sm flex items-center gap-2">
                <Icon name="Loader2" size={16} className="animate-spin" /> Loading…
              </div>
            </div>
          ) : !currentUser ? (
            <LoginScreen onLogin={login} />
          ) : (
          <div className="flex flex-col h-screen overflow-hidden">
            <TopHeader onMenuToggle={() => { setSidebarCollapsed(c => !c); setMobileNavOpen(o => !o); }} onLogout={logout} currentUser={currentUser} />
            <div className="flex flex-1 overflow-hidden">
              {/* Desktop sidebar */}
              <div className="hidden lg:block">
                <Sidebar collapsed={sidebarCollapsed} />
              </div>
              {/* Mobile nav drawer — slides in from the LEFT, stops above the terminal panel.
                  Sidebar is the FIRST flex child (flush with left edge), backdrop fills the rest.
                  Bottom offset = terminal height + status bar (28px) so the terminal stays visible. */}
              {mobileNavOpen && (() => {
                let th = 80;
                try { th = parseInt(localStorage.getItem('supporthublan:terminal-height') || '80', 10); if (isNaN(th) || th < 60) th = 80; } catch {}
                return (
                  <div className="lg:hidden fixed left-0 right-0 top-0 flex" style={{ bottom: (th + 28) + 'px', zIndex: 50 }}>
                    {/* Sidebar FIRST — flush with the left edge of the screen */}
                    <div className="w-52 max-w-[80vw] bg-surface border-r border-border flex flex-col flex-shrink-0">
                      <Sidebar collapsed={false} fullWidth={true} onNavigate={() => setMobileNavOpen(false)} />
                    </div>
                    {/* Backdrop fills the remaining space to the right — click to close */}
                    <div className="flex-1 bg-black/60 min-w-0" onClick={() => setMobileNavOpen(false)} />
                  </div>
                );
              })()}
              {/* Main workspace — vertical split: content (top) + terminal panel (bottom) */}
              <div className="flex-1 flex flex-col overflow-hidden min-w-0">
                <main id="workspace" className="flex-1 overflow-y-auto p-4 bg-bg" style={{ minHeight: '120px' }}>
                  {renderScreen()}
                </main>
                <TerminalPanel />
              </div>
              {/* Right Drawer — inline (flexbox sibling) so terminal does not extend underneath.
                  When open, the main workspace shrinks to make room. Drawer scrolls independently. */}
              <RightDrawerInline open={drawer.open} kind={drawer.kind} data={drawer.data} onClose={closeDrawer} />
            </div>
            <StatusBar />
            <ShortcutsOverlay open={showShortcuts} onClose={() => setShowShortcuts(false)} />
          </div>
          )}
        </ToastProvider>
      </AppCtx.Provider>
    );
  };

  // ============================================================
  // TERMINAL PANEL — VSCode-style bottom panel for live logs + PsTools command input
  // ============================================================
  const TerminalPanel = () => {
    const { activeJobs, auditEvents } = useApp();
    const [collapsed, setCollapsed] = useState(() => { try { return localStorage.getItem('supporthublan:terminal-collapsed') === '1'; } catch { return false; } });
    // Default 3 lines tall (~80px) — user can drag to resize.
    // IMPORTANT: Clamp stored value to a safe max on load to prevent the panel
    // from covering the whole screen if a stale value is in localStorage.
    const [height, setHeight] = useState(() => {
      try {
        let stored = parseInt(localStorage.getItem('supporthublan:terminal-height') || '80', 10);
        // v1.4.7 migration: reset any stored value > 40% of viewport to the default 80px.
        // This fixes users who have a stale large value from v1.3 (280px) or accidental drags.
        const maxH = Math.floor(window.innerHeight * 0.4);
        if (isNaN(stored) || stored < 60 || stored > maxH) {
          stored = 80;
          try { localStorage.setItem('supporthublan:terminal-height', '80'); } catch {}
        }
        return stored;
      } catch { return 80; }
    });
    const [resizing, setResizing] = useState(false);
    const [activeTab, setActiveTab] = useState('all'); // all | current | errors | terminal
    const [lines, setLines] = useState([]);
    const [command, setCommand] = useState('');
    const [history, setHistory] = useState([]);
    const [historyIdx, setHistoryIdx] = useState(-1);
    const [running, setRunning] = useState(false);
    const [sessionId] = useState(() => 'term-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8));
    const [autoScroll, setAutoScroll] = useState(true);
    const scrollRef = useRef(null);
    const inputRef = useRef(null);
    const linesRef = useRef([]);

    // Append a line — declared FIRST because it's referenced by useEffects below
    // (must be defined before use to avoid temporal dead zone ReferenceError)
    const appendLine = useCallback((line, stream = 'info') => {
      const ts = new Date().toLocaleTimeString();
      setLines(prev => [...prev.slice(-500), { ts, line: String(line), stream }]); // cap at 500 lines
    }, []);

    // Persist collapsed state
    useEffect(() => { try { localStorage.setItem('supporthublan:terminal-collapsed', collapsed ? '1' : '0'); } catch {} }, [collapsed]);

    // Listen for "open terminal and run command" events from the inventory row "Cmd" button
    useEffect(() => {
      const handler = (e) => {
        const { command, host } = e.detail || {};
        // Expand the panel
        setCollapsed(false);
        // Switch to the Terminal tab so the input is visible
        setActiveTab('terminal');
        // Auto-run the command after a tick (give the panel time to expand)
        setTimeout(() => {
          if (command && window._supporthublanWs && window._supporthublanWs.readyState === 1) {
            setHistory(prev => [...prev.slice(-50), command]);
            setHistoryIdx(-1);
            setRunning(true);
            window._supporthublanWs.send(JSON.stringify({ type: 'terminal-run', command, sessionId }));
            appendLine(`\x1b[36m$ ${command}\x1b[0m\r\n`, 'command');
          } else if (command) {
            appendLine(`\x1b[33mQueued: ${command}\x1b[0m\r\nWebSocket not ready yet — click in the terminal input and press Enter to retry.`, 'stderr');
          }
          // Focus the input
          setTimeout(() => inputRef.current?.focus(), 200);
        }, 250);
      };
      window.addEventListener('supporthublan:terminal-open', handler);
      return () => window.removeEventListener('supporthublan:terminal-open', handler);
    }, [sessionId, appendLine]);

    // Persist height
    useEffect(() => { try { localStorage.setItem('supporthublan:terminal-height', String(height)); } catch {} }, [height]);

    // Drag-to-resize handler (mouse + touch)
    const startResize = (e) => {
      e.preventDefault();
      setResizing(true);
      const startY = (e.touches ? e.touches[0].clientY : e.clientY) ;
      const startH = height;
      const onMove = (ev) => {
        const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
        const delta = startY - y;
        // Min 60px (1 line), max 40% of viewport — prevents covering the workspace
        const newH = Math.max(60, Math.min(window.innerHeight * 0.4, startH + delta));
        setHeight(Math.round(newH));
      };
      const onUp = () => {
        setResizing(false);
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.addEventListener('touchmove', onMove);
      document.addEventListener('touchend', onUp);
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'ns-resize';
    };

    // Keep linesRef in sync
    useEffect(() => { linesRef.current = lines; }, [lines]);

    // Watch active jobs and append their step changes to the terminal
    const lastJobStepRef = useRef({});
    useEffect(() => {
      activeJobs.forEach(job => {
        const last = lastJobStepRef.current[job.id];
        if (last !== job.step) {
          lastJobStepRef.current[job.id] = job.step;
          if (job.step) {
            const color = job.status === 'failed' ? '\x1b[31m' : job.status === 'completed' ? '\x1b[32m' : '\x1b[36m';
            appendLine(`${color}[${job.name}] ${job.step}${job.status === 'completed' ? ' — done' : job.status === 'failed' ? ' — FAILED' : ''}\x1b[0m`, job.status === 'failed' ? 'stderr' : 'stdout');
          }
        }
      });
    }, [activeJobs, appendLine]);

    // Watch audit events — show new ones in terminal
    const lastAuditIdRef = useRef(null);
    useEffect(() => {
      if (!auditEvents || auditEvents.length === 0) return;
      const latest = auditEvents[0];
      if (lastAuditIdRef.current === null) {
        lastAuditIdRef.current = latest.id;
        return;
      }
      if (latest.id !== lastAuditIdRef.current) {
        lastAuditIdRef.current = latest.id;
        const color = latest.result === 'success' ? '\x1b[32m' : latest.result === 'failed' ? '\x1b[31m' : '\x1b[33m';
        appendLine(`${color}[audit] ${latest.action} → ${latest.result}${latest.parameters?.hostname ? ' on ' + latest.parameters.hostname : ''}\x1b[0m`, latest.result === 'failed' ? 'stderr' : 'info');
      }
    }, [auditEvents, appendLine]);

    // WebSocket message handler for terminal output
    useEffect(() => {
      const handler = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'terminal-output' && data.sessionId === sessionId) {
            appendLine(data.line, data.stream || 'stdout');
          } else if (data.type === 'terminal-complete' && data.sessionId === sessionId) {
            setRunning(false);
          } else if (data.type === 'terminal-error' && data.sessionId === sessionId) {
            appendLine(`\x1b[31mError: ${data.error}\x1b[0m`, 'stderr');
            setRunning(false);
          } else if (data.type === 'queue-step-complete' || data.type === 'queue-progress' || data.type === 'queue-complete') {
            const color = data.status === 'failed' ? '\x1b[31m' : data.type === 'queue-complete' ? '\x1b[32m' : '\x1b[36m';
            const label = data.type === 'queue-complete'
              ? `[queue] Complete — ${data.completed}/${data.total} steps`
              : `[queue] Step ${data.stepIndex + 1}/${data.totalSteps} on ${data.hostname} — ${data.status || 'running'} (${data.completed}/${data.total})`;
            appendLine(`${color}${label}\x1b[0m`, data.status === 'failed' ? 'stderr' : 'stdout');
          } else if (data.type === 'scan-complete') {
            const s = data.summary;
            appendLine(`\x1b[32m[scan] Complete — ${s.online}/${s.total} hosts online\x1b[0m`, 'stdout');
          }
        } catch {}
      };
      // The WebSocket is opened by StatusBar's useEffect and stored at window._supporthublanWs
      // We add our own listener that checks the raw message via a CustomEvent
      // Simpler: poll window._supporthublanWs every 200ms
      const interval = setInterval(() => {
        if (window._supporthublanWs && !window._supporthublanWs._supporthublanListenerAdded) {
          window._supporthublanWs.addEventListener('message', handler);
          window._supporthublanWs._supporthublanListenerAdded = true;
        }
      }, 200);
      return () => {
        clearInterval(interval);
        if (window._supporthublanWs) {
          window._supporthublanWs.removeEventListener('message', handler);
          window._supporthublanWs._supporthublanListenerAdded = false;
        }
      };
    }, [sessionId, appendLine]);

    // Auto-scroll
    useEffect(() => {
      if (autoScroll && scrollRef.current) {
        scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }
    }, [lines, autoScroll]);

    // Run command
    const runCommand = () => {
      const cmd = command.trim();
      if (!cmd) return;
      if (!window._supporthublanWs || window._supporthublanWs.readyState !== 1) {
        appendLine('\x1b[31mError: WebSocket not connected. Backend must be running to execute commands.\x1b[0m', 'stderr');
        return;
      }
      setHistory(prev => [...prev.slice(-50), cmd]);
      setHistoryIdx(-1);
      setRunning(true);
      window._supporthublanWs.send(JSON.stringify({ type: 'terminal-run', command: cmd, sessionId }));
      setCommand('');
    };

    // Filter lines by active tab
    const filteredLines = lines.filter(l => {
      if (activeTab === 'all') return true;
      if (activeTab === 'errors') return l.stream === 'stderr';
      if (activeTab === 'current') return true; // would filter by current host — for now, same as all
      if (activeTab === 'terminal') return true; // only manual commands — would need tagging
      return true;
    });

    // Render ANSI color codes (simple parser — converts \x1b[...m to spans)
    const renderLine = (text) => {
      // Strip ANSI for now — Terminal panel doesn't need full color support
      const stripped = text.replace(/\x1b\[[0-9;]*m/g, '');
      return stripped;
    };

    const handleKeyDown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); runCommand(); }
      else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length > 0) {
          const newIdx = historyIdx === -1 ? history.length - 1 : Math.max(0, historyIdx - 1);
          setHistoryIdx(newIdx);
          setCommand(history[newIdx]);
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIdx !== -1) {
          const newIdx = historyIdx + 1;
          if (newIdx >= history.length) { setHistoryIdx(-1); setCommand(''); }
          else { setHistoryIdx(newIdx); setCommand(history[newIdx]); }
        }
      } else if (e.key === 'l' && e.ctrlKey) {
        e.preventDefault();
        setLines([]);
      }
    };

    if (collapsed) {
      return (
        <div className="flex-shrink-0 bg-surface border-t border-border h-7 flex items-center px-3 text-meta text-text-dim">
          <button onClick={() => setCollapsed(false)} className="flex items-center gap-1.5 hover:text-text">
            <Icon name="ChevronUp" size={12} /> Terminal
            {running && <span className="ml-2 w-1.5 h-1.5 bg-success rounded-full animate-pulse" />}
            {lines.length > 0 && <span className="ml-1">({lines.length} lines)</span>}
          </button>
        </div>
      );
    }

    return (
      <div className="flex-shrink-0 bg-surface border-t-2 border-border flex flex-col relative" style={{ height: height + 'px' }}>
        {/* Resize handle — drag up/down to resize the panel */}
        <div
          onMouseDown={startResize}
          onTouchStart={startResize}
          className="absolute top-0 left-0 right-0 h-1 cursor-ns-resize hover:bg-primary/50 transition-colors group"
          title="Drag to resize"
        >
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-1 bg-border group-hover:bg-primary rounded-b" />
        </div>
        {/* Tab bar */}
        <div className="flex items-center justify-between border-b border-border bg-surface-raised px-1">
          <div className="flex">
            {[
              { id: 'all', label: 'All', icon: 'List' },
              { id: 'current', label: 'Current', icon: 'Crosshair' },
              { id: 'errors', label: 'Errors', icon: 'AlertCircle' },
              { id: 'terminal', label: 'Terminal', icon: 'Terminal' },
            ].map(t => (
              <button key={t.id} onClick={() => { setActiveTab(t.id); if (t.id === 'terminal') setTimeout(() => inputRef.current?.focus(), 100); }}
                className={`flex items-center gap-1.5 px-3 py-1.5 text-[11px] font-medium border-b-2 -mb-px ${activeTab === t.id ? 'border-primary text-primary' : 'border-transparent text-text-dim hover:text-text'}`}>
                <Icon name={t.icon} size={11} />{t.label}
                {t.id === 'errors' && lines.filter(l => l.stream === 'stderr').length > 0 && (
                  <span className="ml-1 px-1 text-[9px] bg-red-500/20 text-danger rounded">{lines.filter(l => l.stream === 'stderr').length}</span>
                )}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-1">
            <button onClick={() => setAutoScroll(a => !a)} title="Toggle auto-scroll" className={`p-1 rounded ${autoScroll ? 'text-primary' : 'text-text-dim'} hover:bg-border`}>
              <Icon name="ArrowDownToLine" size={12} />
            </button>
            <button onClick={() => setLines([])} title="Clear (Ctrl+L)" className="p-1 rounded text-text-dim hover:bg-border">
              <Icon name="Trash2" size={12} />
            </button>
            <button onClick={() => setCollapsed(true)} title="Collapse panel" className="p-1 rounded text-text-dim hover:bg-border">
              <Icon name="ChevronDown" size={12} />
            </button>
          </div>
        </div>

        {/* Output area */}
        <div ref={scrollRef} className="flex-1 overflow-y-auto font-mono text-[12px] leading-[1.4] p-2 text-text" style={{ fontFamily: 'JetBrains Mono, Consolas, "Courier New", monospace' }}>
          {filteredLines.length === 0 ? (
            <div className="text-muted italic px-1 py-2">
              No output yet. Type a PsTools command below (e.g. <code className="text-text-dim">psinfo \\pc-01</code>) or run an action from the inventory.
            </div>
          ) : (
            filteredLines.map((l, i) => (
              <div key={i} className={`whitespace-pre-wrap break-all ${l.stream === 'stderr' ? 'text-danger' : l.stream === 'stdout' ? 'text-text' : l.stream === 'command' ? 'text-info' : 'text-text-dim'}`}>
                <span className="text-muted mr-2">{l.ts}</span>
                {renderLine(l.line)}
              </div>
            ))
          )}
        </div>

        {/* Command input */}
        <div className="border-t border-border bg-surface-raised flex items-center px-2 py-1.5">
          <span className="text-success font-mono text-[12px] mr-2 flex-shrink-0">ps&gt;</span>
          <input
            ref={inputRef}
            type="text"
            value={command}
            onChange={(e) => setCommand(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="Type a PsTools command — e.g.  psexec \\pc-01 cmd   |   psinfo \\pc-01   |   ping pc-01   |   powershell Get-Service"
            className="flex-1 bg-transparent border-0 outline-none font-mono text-[12px] text-text placeholder-gray-600"
            style={{ fontFamily: 'JetBrains Mono, Consolas, "Courier New", monospace' }}
            disabled={running}
          />
          {running && (
            <button onClick={() => window._supporthublanWs?.send(JSON.stringify({ type: 'terminal-kill', sessionId }))}
              className="ml-2 px-2 py-0.5 text-[10px] bg-red-500/20 text-danger rounded hover:bg-red-500/30">
              Stop
            </button>
          )}
        </div>
      </div>
    );
  };

  // ============================================================
  // AUDIT SCREEN — Persistent audit log from SQLite
  // ============================================================
  const AuditScreen = () => {
    const toast = useToast();
    const [entries, setEntries] = useState([]);
    const [loading, setLoading] = useState(true);
    const [search, setSearch] = useState('');
    const [filter, setFilter] = useState('all');
    const [page, setPage] = useState(0);
    const pageSize = 50;

    const loadAudit = async () => {
      setLoading(true);
      try {
        if (window.SupportHubLANAPI) {
          const url = search
            ? `${window.SUPPORTHUBLAN_API_URL}/api/audit/search?q=${encodeURIComponent(search)}`
            : `${window.SUPPORTHUBLAN_API_URL}/api/audit?limit=${pageSize}&offset=${page * pageSize}`;
          const resp = await fetch(url);
          const json = await resp.json();
          if (json.success) setEntries(json.data || []);
        }
      } catch (e) {
        // Fallback to local auditEvents
      }
      setLoading(false);
    };

    useEffect(() => { loadAudit(); }, [page, search]);

    const clearAudit = async () => {
      if (!confirm('Clear all audit log entries? This cannot be undone.')) return;
      try {
        await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/audit/clear`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
        toast.success('Audit log cleared');
        loadAudit();
      } catch (e) { toast.error('Failed to clear audit log'); }
    };

    const filtered = entries.filter(e => {
      if (filter === 'all') return true;
      if (filter === 'success') return e.result === 'success';
      if (filter === 'failed') return e.result === 'failed';
      if (filter === 'skipped') return e.result === 'skipped';
      return true;
    });

    return (
      <div className="space-y-3">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-xl font-semibold text-text">Audit Log</h1>
            <p className="text-xs text-text-dim mt-0.5">Persistent log of all admin actions. Stored in SQLite on the backend.</p>
          </div>
          <div className="flex items-center gap-2">
            <input type="text" value={search} onChange={(e) => { setSearch(e.target.value); setPage(0); }} placeholder="Search..." className="px-2 py-1 text-xs bg-surface-raised border border-border rounded text-text w-48" />
            <select value={filter} onChange={(e) => setFilter(e.target.value)} className="px-2 py-1 text-xs bg-surface-raised border border-border rounded text-text">
              <option value="all">All Results</option>
              <option value="success">Success Only</option>
              <option value="failed">Failed Only</option>
              <option value="skipped">Skipped Only</option>
            </select>
            <ActionButton variant="ghost" size="sm" icon="RefreshCw" onClick={loadAudit}>Refresh</ActionButton>
            <ActionButton variant="danger" size="sm" icon="Trash2" onClick={clearAudit}>Clear All</ActionButton>
          </div>
        </div>

        <SectionCard>
          {loading ? (
            <div className="p-4 text-center text-text-dim text-xs">Loading…</div>
          ) : filtered.length === 0 ? (
            <div className="p-4 text-center text-text-dim text-xs">No audit entries found.</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr className="border-b border-border text-text-dim text-meta">
                    <th className="text-left p-2 font-medium">Timestamp</th>
                    <th className="text-left p-2 font-medium">Action</th>
                    <th className="text-left p-2 font-medium">Category</th>
                    <th className="text-left p-2 font-medium">Targets</th>
                    <th className="text-left p-2 font-medium">Result</th>
                    <th className="text-left p-2 font-medium">User</th>
                    <th className="text-left p-2 font-medium">Output / Error</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(e => (
                    <tr key={e.id} className="border-b border-border hover:bg-surface-raised">
                      <td className="p-2 font-mono text-text-dim whitespace-nowrap">{e.timestamp}</td>
                      <td className="p-2 text-text font-mono">{e.action}</td>
                      <td className="p-2 text-text-dim">{e.category || '—'}</td>
                      <td className="p-2 text-text-dim text-[11px] max-w-xs truncate">{e.target_ids || '—'}</td>
                      <td className="p-2">
                        <span className={`px-1.5 py-0.5 text-[10px] rounded font-medium ${e.result === 'success' ? 'bg-success/15 text-success' : e.result === 'failed' ? 'bg-danger/15 text-danger' : e.result === 'skipped' ? 'bg-warning/15 text-warning' : 'bg-surface-raised text-text-dim'}`}>{e.result}</span>
                      </td>
                      <td className="p-2 text-text-dim">{e.user || '—'}</td>
                      <td className="p-2 text-text-dim text-[11px] max-w-md truncate font-mono" title={e.output || ''}>{e.output || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <div className="flex items-center justify-between p-2 border-t border-border text-meta text-text-dim">
            <span>Page {page + 1} · {filtered.length} entries shown</span>
            <div className="flex gap-1">
              <ActionButton variant="ghost" size="xs" disabled={page === 0} onClick={() => setPage(p => Math.max(0, p - 1))}>Previous</ActionButton>
              <ActionButton variant="ghost" size="xs" disabled={filtered.length < pageSize} onClick={() => setPage(p => p + 1)}>Next</ActionButton>
            </div>
          </div>
        </SectionCard>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  /* __APP_ROOT_END__ */

  </script>
</body>
</html>
