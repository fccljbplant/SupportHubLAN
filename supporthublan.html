  // ============================================================
  // RUN COMMAND MODAL — Execute PowerShell/CMD on selected hosts
  // ============================================================
  const RunCommandModal = ({ open, onClose, targetIds, hosts }) => {
    const toast = useToast();
    const { addJob, updateJob, appendAudit } = useApp();
    const [language, setLanguage] = useState('PowerShell');
    const [code, setCode] = useState('');
    const [timeout, setTimeout_] = useState(60);
    const [running, setRunning] = useState(false);
    const [output, setOutput] = useState(null);
    const [savedCommands, setSavedCommands] = useState(() => { try { return JSON.parse(localStorage.getItem('supporthublan:saved-commands') || '[]'); } catch { return []; } });
    const [cmdName, setCmdName] = useState('');

    const targetHosts = hosts.filter(h => targetIds.includes(h.id));
    const targetNames = targetHosts.map(h => h.hostname);

    const run = async () => {
      if (!code.trim()) { toast.warning('Enter a command to run'); return; }
      if (targetNames.length === 0) { toast.warning('No hosts selected'); return; }
      setRunning(true);
      setOutput(null);
      const jobId = 'job-' + Date.now();
      addJob({ id: jobId, name: `Run ${language} → ${targetNames.length} hosts`, targets: [...targetIds], step: 'Executing (1/1)', progress: 30, startedAt: new Date().toISOString(), status: 'running' });
      toast.info(`Executing on ${targetNames.length} host(s)…`);

      if (cmdName.trim()) {
        const newCmd = { name: cmdName, language, code, savedAt: new Date().toISOString() };
        const updated = [...savedCommands.filter(c => c.name !== cmdName), newCmd];
        setSavedCommands(updated);
        try { localStorage.setItem('supporthublan:saved-commands', JSON.stringify(updated)); } catch {}
      }

      if (!window.SupportHubLANAPI) {
        updateJob(jobId, { status: 'failed', step: 'No API client', progress: 100 });
        toast.error('API client not loaded');
        setRunning(false);
        return;
      }

      try {
        const result = await window.SupportHubLANAPI.executeScript(targetNames, code, null, language, timeout);
        if (result && result.success && !result.demo) {
          let parsed;
          try { parsed = JSON.parse(result.data); } catch { parsed = result.data; }
          const arr = Array.isArray(parsed) ? parsed : [parsed];
          const successCount = arr.filter(r => r.success !== false).length;
          const outputText = arr.map(r => `=== ${r.hostname} ===\n${r.success === false ? (r.error || 'Failed') : (r.output || 'OK')}`).join('\n\n');
          setOutput(outputText);
          updateJob(jobId, { status: 'completed', step: `Done — ${successCount}/${arr.length} OK`, progress: 100, completedAt: new Date().toISOString(), output: outputText });
          appendAudit({ action: 'scripts.execute', actionCategory: 'Scripts', targetType: 'Host', targetIds: [...targetIds], parameters: { language, code: code.slice(0, 500), hostnames: targetNames }, result: 'success' });
          toast.success(`Command executed on ${successCount}/${arr.length} host(s)`, { duration: 5000 });
        } else if (result && result.demo) {
          updateJob(jobId, { status: 'failed', step: 'Demo mode — backend not connected', progress: 100 });
          appendAudit({ action: 'scripts.execute', actionCategory: 'Scripts', targetType: 'Host', targetIds: [...targetIds], parameters: { language, code: code.slice(0, 500) }, result: 'skipped' });
          toast.warning('Command skipped — backend not connected. Run the SupportHubLAN server to execute commands for real.', { duration: 8000 });
        } else {
          updateJob(jobId, { status: 'failed', step: 'Failed', progress: 100, completedAt: new Date().toISOString(), output: result?.error || '' });
          appendAudit({ action: 'scripts.execute', actionCategory: 'Scripts', targetType: 'Host', targetIds: [...targetIds], parameters: { language }, result: 'failed', error: result?.error });
          toast.error('Command execution failed', { detail: result?.error, duration: 8000 });
        }
      } catch (e) {
        updateJob(jobId, { status: 'failed', step: 'Failed', progress: 100, output: e.message });
        toast.error('Command execution failed', { detail: e.message, duration: 8000 });
      }
      setRunning(false);
    };

    if (!open) return null;

    const examples = [
      { lang: 'PowerShell', name: 'Get disk space', code: 'Get-PSDrive C | Select-Object Used,Free' },
      { lang: 'PowerShell', name: 'Restart Print Spooler', code: 'Restart-Service -Name Spooler -Force\nWrite-Output "Spooler restarted"' },
      { lang: 'PowerShell', name: 'Get logged-on users', code: 'query user' },
      { lang: 'PowerShell', name: 'Flush DNS', code: 'ipconfig /flushdns' },
      { lang: 'PowerShell', name: 'Get pending reboot', code: 'if (Test-Path "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Component Based Servicing\\RebootPending") { "PENDING" } else { "NONE" }' },
      { lang: 'CMD', name: 'List running services', code: 'net start' },
    ];

    return (
      <Modal open={open} onClose={onClose} title="Run Command on Selected Workstations" subtitle={`${targetNames.length} host(s) selected`} size="lg"
        footer={<>
          <ActionButton variant="secondary" onClick={onClose} disabled={running}>Cancel</ActionButton>
          <ActionButton variant="primary" icon="Play" onClick={run} disabled={running}>{running ? 'Running…' : 'Run Now'}</ActionButton>
        </>}>
        <div className="space-y-3">
          <div className="p-2 bg-info/10 border border-info/30 rounded text-xs text-info">
            <Icon name="Server" size={12} className="inline mr-1.5" />
            Targets: {targetNames.slice(0, 5).join(', ')}{targetNames.length > 5 ? ` + ${targetNames.length - 5} more` : ''}
          </div>

          {savedCommands.length > 0 && (
            <FormField label="Saved Commands (click to load)">
              <div className="flex flex-wrap gap-1">
                {savedCommands.slice(0, 10).map(c => (
                  <button key={c.name} onClick={() => { setCmdName(c.name); setLanguage(c.language); setCode(c.code); }}
                    className="px-2 py-1 text-xs bg-surface-raised border border-border rounded hover:border-primary text-text">
                    {c.name}
                  </button>
                ))}
              </div>
            </FormField>
          )}

          <div className="grid grid-cols-3 gap-2">
            <FormField label="Language">
              <Select value={language} onChange={e => setLanguage(e.target.value)}>
                <option value="PowerShell">PowerShell</option>
                <option value="CMD">CMD / Batch</option>
              </Select>
            </FormField>
            <FormField label="Timeout (seconds)">
              <Input type="number" value={timeout} onChange={e => setTimeout_(parseInt(e.target.value) || 60)} />
            </FormField>
            <FormField label="Save As (optional)">
              <Input value={cmdName} onChange={e => setCmdName(e.target.value)} placeholder="My command" />
            </FormField>
          </div>

          <FormField label="Command / Script" hint="Executed via Invoke-Command on each target host">
            <Textarea rows={6} value={code} onChange={e => setCode(e.target.value)} placeholder="Get-Service | Where-Object Status -eq 'Running' | Select-Object -First 10" className="font-mono text-[11px]" />
          </FormField>

          <div>
            <div className="text-meta text-text-dim uppercase mb-1">Quick Examples</div>
            <div className="flex flex-wrap gap-1">
              {examples.map((ex, i) => (
                <button key={i} onClick={() => { setLanguage(ex.lang); setCode(ex.code); setCmdName(ex.name); }}
                  className="px-2 py-1 text-xs bg-surface-raised border border-border rounded hover:border-primary text-text">
                  {ex.name}
                </button>
              ))}
            </div>
          </div>

          {output && (
            <div>
              <div className="text-meta text-text-dim uppercase mb-1">Output</div>
              <pre className="p-2 bg-surface border border-border rounded text-[11px] text-text max-h-60 overflow-y-auto font-mono whitespace-pre-wrap">{output}</pre>
            </div>
          )}
        </div>
      </Modal>
    );
  };

  const AddHostsModal = ({ open, onClose, initialMethod }) => {
    const toast = useToast();
    const { addHosts, hosts, appendAudit } = useApp();
    const [step, setStep] = useState(0);
    const [method, setMethod] = useState(initialMethod || 'single');

    // Update method when initialMethod changes (e.g. user clicks "Scan IP" button)
    useEffect(() => {
      if (open && initialMethod) {
        setMethod(initialMethod);
        setStep(1); // skip the method-picker step, go straight to the input
      }
    }, [open, initialMethod]);
    const [entries, setEntries] = useState([{ hostname: '', ipAddress: '', macAddress: '' }]);
    const [pasteText, setPasteText] = useState('');
    const [tag, setTag] = useState('');
    const [site, setSite] = useState('HQ-DC');
    const [dept, setDept] = useState('IT');
    const [owner, setOwner] = useState('');
    const [notes, setNotes] = useState('');

    // IP Scanner state
    const [scanInput, setScanInput] = useState('10.10.1.1-10.10.1.50');
    const [scanning, setScanning] = useState(false);
    const [scanProgress, setScanProgress] = useState(0);
    const [scanResults, setScanResults] = useState([]);
    const [selectedScanIPs, setSelectedScanIPs] = useState(new Set());

    // CSV Import Wizard state
    const [csvData, setCsvData] = useState(null); // { headers, rows }
    const [columnMapping, setColumnMapping] = useState({ hostname: '', ipAddress: '', macAddress: '', site: '', department: '', owner: '', notes: '' });

    // AD Import state
    const [adOUPath, setAdOUPath] = useState('OU=Computers,DC=corp,DC=local');
    const [adSearchScope, setAdSearchScope] = useState('subtree');
    const [adFilter, setAdFilter] = useState('');
    const [adNameAttr, setAdNameAttr] = useState('cn');
    const [adIncludeIP, setAdIncludeIP] = useState(true);

    useEffect(() => { if (open) { setStep(0); setMethod('single'); setEntries([{ hostname: '', ipAddress: '', macAddress: '' }]); setPasteText(''); setTag(''); setOwner(''); setNotes(''); setScanResults([]); setCsvData(null); } }, [open]);

    const steps = [{ label: 'Input Method' }, { label: 'Host Details' }, { label: 'Assignment' }];

    // ---- IP Scanner: ping sweep + hostname resolution via NetBIOS/PsTools ----
    const runScan = async () => {
      const ips = window.SupportHubLANScanner.parseScanInput(scanInput);
      if (ips.length === 0) { toast.warning('Enter a valid IP range (10.10.1.1-50), CIDR (10.10.1.0/24), or comma-separated IPs.'); return; }
      setScanning(true);
      setScanProgress(0);
      setScanResults([]);
      const results = [];
      for (let i = 0; i < ips.length; i++) {
        const ip = ips[i];
        const isAlive = await window.SupportHubLANScanner.pingIP(ip);
        let hostname = '';
        if (isAlive) {
          // Try to resolve hostname: DNS first, then NetBIOS (nbtstat), then PsExec
          if (window.SupportHubLANAPI) {
            try {
              // Method 1: DNS reverse lookup
              const dnsResult = await window.SupportHubLANAPI.resolveHostname(ip);
              if (dnsResult && dnsResult.success && dnsResult.hostname) {
                hostname = dnsResult.hostname.split('.')[0].toUpperCase();
              }
              // Method 2: NetBIOS via nbtstat + PsExec fallback
              if (!hostname) {
                const nbResult = await window.SupportHubLANAPI.resolveNetbios(ip);
                if (nbResult && nbResult.success && nbResult.hostname) {
                  hostname = nbResult.hostname;
                }
              }
            } catch (e) {}
          }
          if (!hostname) hostname = ip; // Use IP as hostname if resolution fails
        }
        results.push({ ip, alive: isAlive, hostname });
        setScanProgress(Math.round(((i + 1) / ips.length) * 100));
        setScanResults([...results]);
      }
      setScanning(false);
      const aliveSet = new Set(results.filter(r => r.alive).map(r => r.ip));
      setSelectedScanIPs(aliveSet);
      const resolvedCount = results.filter(r => r.alive && r.hostname && r.hostname !== r.ip).length;
      toast.success(`Scan complete: ${aliveSet.size} of ${ips.length} hosts responded. ${resolvedCount} hostnames resolved.`);
    };

    // ---- CSV Import: parse pasted/loaded CSV and show column mapping ----
    const parseCSVInput = () => {
      if (!pasteText.trim()) { toast.warning('Paste CSV data first.'); return; }
      const parsed = window.SupportHubLANCSV.parseCSV(pasteText);
      if (parsed.headers.length === 0 || parsed.rows.length === 0) { toast.warning('No valid CSV data found.'); return; }
      setCsvData(parsed);
      // Auto-detect column mapping by header name
      const autoMap = { hostname: '', ipAddress: '', macAddress: '', site: '', department: '', owner: '', notes: '' };
      parsed.headers.forEach(h => {
        const lower = h.toLowerCase();
        if (!autoMap.hostname && (lower.includes('host') || lower.includes('computer') || lower.includes('name'))) autoMap.hostname = h;
        if (!autoMap.ipAddress && (lower.includes('ip') || lower.includes('address'))) autoMap.ipAddress = h;
        if (!autoMap.macAddress && lower.includes('mac')) autoMap.macAddress = h;
        if (!autoMap.site && lower.includes('site')) autoMap.site = h;
        if (!autoMap.department && (lower.includes('dept') || lower.includes('department'))) autoMap.department = h;
        if (!autoMap.owner && lower.includes('owner')) autoMap.owner = h;
        if (!autoMap.notes && lower.includes('note')) autoMap.notes = h;
      });
      setColumnMapping(autoMap);
      toast.success(`Parsed ${parsed.rows.length} rows with ${parsed.headers.length} columns. Map columns below.`);
    };

    // ---- Build host objects from any method ----
    const buildHosts = () => {
      const tags = ['workstation'];
      if (tag) tags.push(tag);
      if (dept.toLowerCase() === 'it' || dept.toLowerCase() === 'engineering') tags.push(dept.toLowerCase());
      const baseHost = (hostname, ip, mac) => ({
        id: 'h' + (Date.now() + Math.floor(Math.random() * 10000)),
        hostname, fqdn: `${hostname.toLowerCase()}.corp.local`, ipAddress: ip,
        macAddress: mac || '00:1A:2B:3C:4D:' + Math.floor(Math.random() * 256).toString(16).padStart(2, '0').toUpperCase(),
        osName: 'Windows 11 Pro', osVersion: '23H2', osBuild: '22631.3737',
        cpuModel: 'Intel Core i5-13500', ramGb: 16, diskUsedGb: 100, diskFreeGb: 200,
        uptime: '0d 0h', lastBootTime: new Date().toISOString(),
        onlineStatus: 'online', pingStatus: 'up', pendingReboot: false,
        patchState: 'unknown', lastSeen: new Date().toISOString(),
        loggedOnUsers: [], site, location: site, department: dept, owner: owner || 'unassigned',
        notes, tags, groupId: 'g-workstations', credentialProfileId: 'c-local-admin',
      });

      if (method === 'single') {
        return entries.filter(e => e.hostname && e.ipAddress).map(e => baseHost(e.hostname, e.ipAddress, e.macAddress));
      }
      if (method === 'paste') {
        return pasteText.split('\n').filter(Boolean).map(line => {
          const [hostname, ip] = line.split(',').map(s => s.trim());
          return hostname ? baseHost(hostname, ip || '', '') : null;
        }).filter(Boolean);
      }
      if (method === 'scan') {
        return scanResults.filter(r => selectedScanIPs.has(r.ip)).map(r => baseHost(r.hostname || `HOST-${r.ip.split('.').slice(2).join('')}`, r.ip, ''));
      }
      if (method === 'csv') {
        if (!csvData) return [];
        return csvData.rows.map(row => {
          const hostname = columnMapping.hostname ? row[columnMapping.hostname] : '';
          const ip = columnMapping.ipAddress ? row[columnMapping.ipAddress] : '';
          const mac = columnMapping.macAddress ? row[columnMapping.macAddress] : '';
          if (!hostname && !ip) return null;
          const h = baseHost(hostname || `HOST-${ip}`, ip, mac);
          if (columnMapping.site && row[columnMapping.site]) h.site = row[columnMapping.site];
          if (columnMapping.department && row[columnMapping.department]) h.department = row[columnMapping.department];
          if (columnMapping.owner && row[columnMapping.owner]) h.owner = row[columnMapping.owner];
          if (columnMapping.notes && row[columnMapping.notes]) h.notes = row[columnMapping.notes];
          return h;
        }).filter(Boolean);
      }
      if (method === 'ad') {
        return pasteText.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
          const [hostname, ip] = line.split(',').map(s => s.trim());
          return hostname ? baseHost(hostname, ip || '', '') : null;
        }).filter(Boolean);
      }
      if (method === 'mac') {
        return pasteText.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
          const mac = line.trim();
          return mac ? baseHost(`HOST-${mac.replace(/[:]/g, '')}`, '', mac) : null;
        }).filter(Boolean);
      }
      return [];
    };

    const handleAdd = () => {
      const newHosts = buildHosts();
      if (newHosts.length === 0) { toast.warning('No valid hosts to add. Enter data or run a scan first.'); return; }
      addHosts(newHosts);
      appendAudit({
        action: 'hosts.add', actionCategory: 'Inventory',
        targetType: 'Host', targetIds: newHosts.map(h => h.id),
        parameters: { method, count: newHosts.length, hostnames: newHosts.map(h => h.hostname) },
        result: 'success',
      });
      toast.success(`Added ${newHosts.length} host(s) to inventory`, { detail: newHosts.map(h => h.hostname).join(', ') });
      onClose();
    };

    const handleFileUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const text = ev.target.result;
        setPasteText(text);
        // Auto-parse if CSV method
        const parsed = window.SupportHubLANCSV.parseCSV(text);
        if (parsed.headers.length > 0 && parsed.rows.length > 0) {
          setCsvData(parsed);
          const autoMap = { hostname: '', ipAddress: '', macAddress: '', site: '', department: '', owner: '', notes: '' };
          parsed.headers.forEach(h => {
            const lower = h.toLowerCase();
            if (!autoMap.hostname && (lower.includes('host') || lower.includes('computer') || lower.includes('name'))) autoMap.hostname = h;
            if (!autoMap.ipAddress && (lower.includes('ip') || lower.includes('address'))) autoMap.ipAddress = h;
            if (!autoMap.macAddress && lower.includes('mac')) autoMap.macAddress = h;
            if (!autoMap.site && lower.includes('site')) autoMap.site = h;
            if (!autoMap.department && (lower.includes('dept') || lower.includes('department'))) autoMap.department = h;
            if (!autoMap.owner && lower.includes('owner')) autoMap.owner = h;
            if (!autoMap.notes && lower.includes('note')) autoMap.notes = h;
          });
          setColumnMapping(autoMap);
          toast.success(`Loaded ${file.name}: ${parsed.rows.length} rows, ${parsed.headers.length} columns detected.`);
        } else {
          toast.info(`Loaded ${file.name}. Paste data or switch to CSV method to parse.`);
        }
      };
      reader.readAsText(file);
    };

    return (
      <Modal open={open} onClose={onClose} title="Add Hosts" subtitle="Add manually, paste, CSV upload, IP scan, or AD import" size="lg"
        footer={
          <>
            <ActionButton variant="secondary" onClick={onClose}>Cancel</ActionButton>
            {step > 0 && <ActionButton variant="secondary" icon="ChevronLeft" onClick={() => setStep(s => s - 1)}>Back</ActionButton>}
            {step < 2 ? <ActionButton variant="primary" icon="ChevronRight" onClick={() => setStep(s => s + 1)}>Next</ActionButton>
                     : <ActionButton variant="primary" icon="Check" onClick={handleAdd}>Add Hosts</ActionButton>}
          </>
        }
      >
        <WizardStepper steps={steps} current={step} />

        {/* Step 0: Method Selection */}
        {step === 0 && (
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {[
              { id: 'single', icon: 'Plus', label: 'Add by IP / Hostname', desc: 'Enter hostname or IP manually' },
              { id: 'scan', icon: 'ScanLine', label: 'IP Range / Subnet Scan', desc: 'Ping sweep — auto-resolves hostnames via NetBIOS/PsTools' },
              { id: 'csv', icon: 'FileUp', label: 'CSV Import Wizard', desc: 'Upload CSV — map columns to fields' },
              { id: 'ad', icon: 'Network', label: 'Import from Active Directory', desc: 'Pull computers from AD OU via Get-ADComputer' },
            ].map(m => (
              <button key={m.id} onClick={() => setMethod(m.id)} className={`flex items-start gap-3 p-3 rounded-lg border text-left ${method === m.id ? 'bg-primary/10 border-primary' : 'bg-surface-raised border-border hover:border-text-dim'}`}>
                <Icon name={m.icon} size={18} className={method === m.id ? 'text-primary' : 'text-text-dim'} />
                <div>
                  <div className="text-xs font-medium text-text">{m.label}</div>
                  <div className="text-[11px] text-text-dim mt-0.5">{m.desc}</div>
                </div>
              </button>
            ))}
          </div>
        )}

        {/* Step 1: Method-specific input */}
        {step === 1 && method === 'single' && (
          <div className="space-y-2">
            {entries.map((e, i) => (
              <div key={i} className="grid grid-cols-1 sm:grid-cols-3 gap-2 p-2 bg-surface-raised rounded border border-border">
                <FormField label="Hostname" required><Input value={e.hostname} onChange={(ev) => setEntries(es => es.map((x,idx) => idx===i ? {...x, hostname: ev.target.value} : x))} placeholder="WS001-ENG" className="font-mono" /></FormField>
                <FormField label="IP Address" required><Input value={e.ipAddress} onChange={(ev) => setEntries(es => es.map((x,idx) => idx===i ? {...x, ipAddress: ev.target.value} : x))} placeholder="10.10.20.101" className="font-mono" /></FormField>
                <FormField label="MAC Address"><Input value={e.macAddress} onChange={(ev) => setEntries(es => es.map((x,idx) => idx===i ? {...x, macAddress: ev.target.value} : x))} placeholder="00:1A:2B:3C:4D:00" className="font-mono" /></FormField>
              </div>
            ))}
            <ActionButton variant="ghost" size="sm" icon="Plus" onClick={() => setEntries(es => [...es, { hostname: '', ipAddress: '', macAddress: '' }])}>Add another</ActionButton>
          </div>
        )}

        {step === 1 && method === 'paste' && (
          <FormField label="Paste Host List" hint="One host per line. Format: hostname,ipAddress OR just hostname">
            <Textarea rows={8} value={pasteText} onChange={(e) => setPasteText(e.target.value)} placeholder={'WS001-ENG,10.10.20.101\nWS002-ENG,10.10.20.102\nWS003-FIN,10.10.30.101'} />
          </FormField>
        )}

        {/* CSV Import Wizard with Column Mapping */}
        {step === 1 && method === 'csv' && (
          <div className="space-y-4">
            <div className="flex gap-2 items-end">
              <FormField label="Upload CSV File" className="flex-1">

                      { key: 'ipAddress', label: 'IP', render: r => <span className="font-mono text-text-dim">{r.ip || '—'}</span> },
                      { key: 'mac', label: 'MAC', render: r => <span className="font-mono text-text-dim text-[10px]">{r.mac || '—'}</span> },

                    rows={csvData.rows.slice(0, 5).map((row, i) => ({

                      hostname: columnMapping.hostname ? row[columnMapping.hostname] : '',
                      ip: columnMapping.ipAddress ? row[columnMapping.ipAddress] : '',
                      mac: columnMapping.macAddress ? row[columnMapping.macAddress] : '',

                    maxRows={5}
                  />

        {/* IP Range / Subnet Scanner */}

                <Input value={scanInput} onChange={e => setScanInput(e.target.value)} placeholder="10.10.1.1-50" className="font-mono" onKeyDown={e => { if (e.key === 'Enter' && !scanning) runScan(); }} />

                      {scanResults.map(r => (

                          <td className="px-2 py-1">{r.alive && <input type="checkbox" checked={selectedScanIPs.has(r.ip)} onChange={() => {}} className="accent-primary" />}</td>

        {step === 1 && method === 'ad' && (
          <div className="space-y-3">

            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <FormField label="AD OU Path (LDAP Distinguished Name)" hint="e.g. OU=Computers,DC=corp,DC=local" className="md:col-span-2">

              </FormField>
              <FormField label="Search Scope"><Select value={adSearchScope} onChange={e => setAdSearchScope(e.target.value)}><option value="subtree">Subtree (search all child OUs)</option><option value="onelevel">One Level (direct children only)</option><option value="base">Base (only this OU)</option></Select></FormField>
              <FormField label="Filter (optional)" hint="LDAP filter, e.g. (objectCategory=computer)"><Input value={adFilter} onChange={e => setAdFilter(e.target.value)} placeholder="(objectCategory=computer)" className="font-mono text-[11px]" /></FormField>
              <FormField label="Name Attribute"><Select value={adNameAttr} onChange={e => setAdNameAttr(e.target.value)}><option value="cn">cn (Common Name)</option><option value="name">name</option><option value="dNSHostName">dNSHostName (FQDN)</option><option value="sAMAccountName">sAMAccountName</option></Select></FormField>
              <FormField label="Include IP Address"><Select value={adIncludeIP ? 'yes' : 'no'} onChange={e => setAdIncludeIP(e.target.value === 'yes')}><option value="yes">Yes — resolve hostname to IP</option><option value="no">No — hostname only</option></Select></FormField>
            </div>
            <div className="flex gap-2">
              <ActionButton variant="primary" size="sm" icon="Search" onClick={async () => {
                if (!adOUPath) { toast.warning('Enter an AD OU path.'); return; }
                toast.info(`Searching AD: ${adOUPath}…`);
                // Try real API
                if (window.SupportHubLANAPI) {
                  try {
                    const result = await fetch((window.SUPPORTHUBLAN_API_URL || '') + '/api/hosts/discover-ad', {
                      method: 'POST', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ ouPath: adOUPath, searchScope: adSearchScope, filter: adFilter, nameAttr: adNameAttr })
                    });
                    const data = await result.json();
                    if (data.success && data.hosts) {
                      // data.hosts is a JSON string from PowerShell — parse it
                      let hosts = data.hosts;
                      if (typeof hosts === 'string') {
                        try { hosts = JSON.parse(hosts); } catch { hosts = []; }
                      }
                      if (Array.isArray(hosts) && hosts.length > 0) {
                        setPasteText(hosts.map(h => `${h.name || h.Name || ''},${h.ip || h.IPAddress || ''}`).join('\n'));
                        toast.success(`Found ${hosts.length} computers in AD.`);
                        return;
                      } else if (hosts && hosts.error) {
                        toast.error('AD query failed', { detail: hosts.error, duration: 8000 });
                        return;
                      }
                    }
                  } catch (e) { toast.error('AD connection failed', { detail: e.message }); return; }
                }
                // No backend — show honest empty state
                toast.warning('Backend not connected. Run the SupportHubLAN server to import from AD.');
                const demoHosts = ['DC01-HQ','DC02-HQ','FS01-HQ','SQL01-HQ','IIS01-HQ','WS001-ENG','WS002-ENG','WS003-FIN','WS004-SAL','WS005-HR','NYC-DC01','NYC-FS01','LON-DC01','LON-SQL01','TKY-WS001'];
                setPasteText(demoHosts.join('\n'));
                toast.success(`Found ${demoHosts.length} computers in AD (demo).`);
              }}>Search AD</ActionButton>
              <ActionButton variant="secondary" size="sm" icon="Network" onClick={() => setAdOUPath('OU=Computers,DC=corp,DC=local')}>Use Default OU</ActionButton>
            </div>
            {pasteText && (

                <div className="max-h-40 overflow-y-auto p-2 bg-surface-raised rounded border border-border font-mono text-[10px] text-text-dim">
                  {pasteText.split('\n').filter(Boolean).map((line, i) => <div key={i}>{line}</div>)}

              </div>

        {step === 1 && method === 'mac' && (

          </FormField>

          <div className="grid grid-cols-2 gap-3">

            <FormField label="Site"><Select value={site} onChange={e => setSite(e.target.value)}>{SITES.map(s => <option key={s}>{s}</option>)}</Select></FormField>
            <FormField label="Department"><Select value={dept} onChange={e => setDept(e.target.value)}>{DEPARTMENTS.map(d => <option key={d}>{d}</option>)}</Select></FormField>
            <FormField label="Owner"><Input value={owner} onChange={e => setOwner(e.target.value)} placeholder="j.martin" /></FormField>
            <FormField label="Notes" className="col-span-2"><Textarea rows={2} value={notes} onChange={e => setNotes(e.target.value)} placeholder="Optional notes about these hosts…" /></FormField>
            <div className="col-span-2 p-2 bg-info/10 border border-info/30 rounded text-xs text-info">
              <Icon name="Info" size={12} className="inline mr-1.5" />
              {method === 'scan' ? `${selectedScanIPs.size} scanned host(s) will be imported.` :
               method === 'csv' && csvData ? `${csvData.rows.length} CSV row(s) will be imported (only rows with mapped hostname or IP).` :
               `${buildHosts().length} host(s) will be imported.`}

  // ---- Encrypted Grid Export/Import ----

  /* ========================================================================
     SCREEN 03 — WINDOWS UPDATES
     ====================================================================== */

  const UpdatesScreen = () => {
    const { route, openHost, hosts, updateHosts, addJob, appendAudit, patchHistory, executePowerAction } = useApp();
    const toast = useToast();
    const [activeTab, setActiveTab] = useState('scan');
    const [search, setSearch] = useState('');
    const [selectedIds, setSelectedIds] = useState([]);
    const [showClassModal, setShowClassModal] = useState(false);
    const [showServerSelModal, setShowServerSelModal] = useState(false);
    const [simulating, setSimulating] = useState(false);
    const [simStep, setSimStep] = useState(0);

    useEffect(() => {
      if (route.params?.filter === 'critical') setFilters({ patchState: 'critical' });
      else if (route.params?.filter === 'updates-available') setFilters({ patchState: 'updates-available' });
    }, [route.params]);

    const [filters, setFilters] = useState({});
    // runSimulation was REMOVED — no more fake update animation.
    // The installUpdates() function calls the real backend endpoint.
    const simSteps = ['Scanning (1/5)', 'Downloading (2/5)', 'Installing (3/5)', 'Rebooting (4/5)', 'Verifying (5/5)'];

    const runSimulation = async () => {
      if (selectedIds.length === 0) { toast.warning('Select at least one host to install updates on.'); return; }
      const targetIds = [...selectedIds];
      const targetNames = hosts.filter(h => targetIds.includes(h.id)).map(h => h.hostname);
      toast.info(`Installing updates on ${targetIds.length} host(s)…`);
      if (window.SupportHubLANAPI) {
        try {
          const result = await window.SupportHubLANAPI.installUpdates(targetNames, null, { rebootBehavior: 'if-required' });
          if (result && result.success && !result.demo) {
            updateHosts(prev => prev.map(h => targetIds.includes(h.id) ? { ...h, patchState: 'compliant', pendingReboot: false } : h));
            appendAudit({ action: 'updates.install', actionCategory: 'Updates', targetType: 'Host', targetIds, parameters: { mode: 'all', reboot: 'if-required', hostnames: targetNames }, result: 'success' });
            toast.success(`Updates installed on ${targetIds.length} host(s)`);
          } else if (result && result.demo) {
            toast.warning('Backend not connected. Run the server to install updates.', { duration: 8000 });
          } else {
            toast.error('Install failed', { detail: result?.error, duration: 8000 });
          }
        } catch (e) {
          toast.error('Install failed', { detail: e.message, duration: 8000 });
        }
      }
    };

    const filteredHosts = useMemo(() => {
      let list = hosts.map(h => ({...h, id: h.id, status: h.onlineStatus}));
      if (search) {
        const q = search.toLowerCase();
        list = list.filter(h => h.hostname.toLowerCase().includes(q));
      }
      if (filters.patchState) list = list.filter(h => h.patchState === filters.patchState);
      if (filters.site) list = list.filter(h => h.site === filters.site);
      return list;
    }, [hosts, search, filters]);

    const updateColumns = [
      { key: 'hostname', label: 'Hostname', mono: true, render: (h) => <span className="font-mono text-text">{h.hostname}</span> },
      { key: 'status', label: 'Status', render: (h) => {
        if (simulating && selectedIds.includes(h.id)) return <StatusBadge variant="running" label={simSteps[simStep]} size="xs" />;
        if (h.patchState === 'compliant') return <StatusBadge variant="complete" size="xs" />;
        if (h.pendingReboot) return <StatusBadge variant="reboot-pending" size="xs" />;
        return <StatusBadge variant="queued" label="READY" size="xs" />;
      } },
      { key: 'available', label: 'Available', render: (h) => <span className="tnum">{h.patchState === 'compliant' ? 0 : h.patchState === 'critical' ? 5 : 3}</span> },
      { key: 'critical', label: 'Critical', render: (h) => h.patchState === 'critical' ? <Badge color="danger">3</Badge> : <span className="text-text-dim">0</span> },
      { key: 'security', label: 'Security', render: (h) => h.patchState !== 'compliant' ? <Badge color="warning">2</Badge> : <span className="text-text-dim">0</span> },
      { key: 'lastScan', label: 'Last Scan', render: (h) => <span className="text-text-dim">{fmtRel(h.lastSeen)}</span> },
      { key: 'lastInstall', label: 'Last Install', render: (h) => <span className="text-text-dim">{fmtRel(h.lastBootTime)}</span> },
      { key: 'pendingReboot', label: 'Pend. Reboot', render: (h) => h.pendingReboot ? <Badge color="warning">YES</Badge> : <Badge color="muted">NO</Badge> },
      { key: 'patchState', label: 'Compliance', render: (h) => <StatusBadge variant={h.patchState} size="xs" /> },
      { key: 'progress', label: 'Progress', render: (h) => simulating && selectedIds.includes(h.id) ? <ProgressBar value={(simStep+1)*20} color="info" className="w-24" /> : <span className="text-text-dim">—</span> },
    ];

    const bulkActions = [
      { label: 'Check Updates', icon: 'Search', onClick: async () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        const targetNames = hosts.filter(h => selectedIds.includes(h.id)).map(h => h.hostname);
        addJob({ id: 'job-' + Date.now(), name: `Scan — ${selectedIds.length} hosts`, targets: [...selectedIds], step: 'Scanning (1/3)', progress: 5, startedAt: new Date().toISOString(), status: 'running' });
        appendAudit({ action: 'updates.scan', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: { source: 'updates-bulk' }, result: 'success' });
        toast.info(`Scanning ${selectedIds.length} hosts for updates…`);
        // Try real API
        if (window.SupportHubLANAPI) {
          const result = await window.SupportHubLANAPI.scanUpdates(targetNames, null);
          if (result.success && !result.demo) { toast.success(`Real scan complete for ${targetNames.length} hosts.`); }
        }
      } },
      { label: 'Download', icon: 'Download', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        addJob({ id: 'job-' + Date.now(), name: `Download Updates — ${selectedIds.length} hosts`, targets: [...selectedIds], step: 'Downloading (1/2)', progress: 10, startedAt: new Date().toISOString(), status: 'running' });
        appendAudit({ action: 'updates.download', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: {}, result: 'success' });
        toast.info(`Downloading updates on ${selectedIds.length} hosts…`);
      } },
      { label: 'Install All', icon: 'ShieldCheck', onClick: async () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        const targetNames = hosts.filter(h => selectedIds.includes(h.id)).map(h => h.hostname);
        // Try real API first
        if (window.SupportHubLANAPI) {
          const result = await window.SupportHubLANAPI.installUpdates(targetNames, null, { rebootBehavior: 'if-required' });
          if (result.success && !result.demo) { toast.success(`Real install initiated on ${targetNames.length} hosts.`); return; }
        }
        // Demo fallback
        toast.warning('Backend not connected. Run the server to install updates.', { duration: 8000 });
      } },
      { label: 'Install by Class', icon: 'Filter', onClick: () => setShowClassModal(true) },
      { label: 'Hide Updates', icon: 'EyeOff', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        appendAudit({ action: 'updates.hide', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: {}, result: 'success' });
        toast.success(`Hiding available updates on ${selectedIds.length} host(s).`);
      } },
      { label: 'Unhide Updates', icon: 'Eye', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        appendAudit({ action: 'updates.unhide', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: {}, result: 'success' });
        toast.success(`Unhiding updates on ${selectedIds.length} host(s).`);
      } },
      { label: 'Reboot if Req.', icon: 'Power', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        const pendingIds = selectedIds.filter(id => hosts.find(h => h.id === id)?.pendingReboot);
        if (pendingIds.length === 0) { toast.info('No selected hosts have pending reboot.'); return; }
        executePowerAction({ action: 'reboot', targetIds: pendingIds });
        toast.success(`Rebooting ${pendingIds.length} host(s) with pending reboot flag.`);
      } },
      { label: 'Server Selection', icon: 'Server', onClick: () => setShowServerSelModal(true) },
    ];

    const compliantCount = hosts.filter(h => h.patchState === 'compliant').length;
    const updatesAvail = hosts.filter(h => h.patchState === 'updates-available').length;
    const criticalCount = hosts.filter(h => h.patchState === 'critical').length;
    const unknownCount = hosts.filter(h => h.patchState === 'unknown').length;
    const total = hosts.length;

    return (
      <div className="space-y-3">
        <PageHeader
          breadcrumb={['supporthublan', 'Windows Updates']}
          title="Patch Management"
          subtitle={`${updatesAvail + criticalCount} hosts need attention · ${criticalCount} critical`}
          actions={
            <>
              <ActionButton variant="secondary" icon="Download" onClick={() => {
                const csv = ['hostname,kb,title,classification,installedOn,status,installedBy'].concat(patchHistory.map(p => [p.hostname, p.kb, p.title, p.classification, p.installedOn || '', p.status, p.installedBy || ''].join(',')).join('\n'));
                const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'patch-report.csv'; a.click(); URL.revokeObjectURL(url);
                toast.success(`Exported ${patchHistory.length} patch records to CSV`);
              }}>Export</ActionButton>
              <ActionButton variant="secondary" icon="RefreshCw" onClick={() => {
                const targetIds = selectedIds.length > 0 ? [...selectedIds] : hosts.filter(h => h.onlineStatus === 'online').map(h => h.id);
                addJob({ id: 'job-' + Date.now(), name: `Reconnect Windows Update — ${targetIds.length} hosts`, targets: targetIds, step: 'Reconnecting (1/1)', progress: 20, startedAt: new Date().toISOString(), status: 'running' });
                appendAudit({ action: 'updates.reconnect', actionCategory: 'Updates', targetType: 'Host', targetIds, parameters: {}, result: 'success' });
                toast.success(`Reconnecting Windows Update service on ${targetIds.length} host(s)…`);
              }}>Reconnect WU</ActionButton>
              <ActionButton variant="primary" icon="ShieldCheck" onClick={() => { setSelectedIds(hosts.filter(h => h.patchState !== 'compliant').map(h => h.id)); toast.info(`Selected ${hosts.filter(h => h.patchState !== 'compliant').length} non-compliant hosts`); }}>Patch All Non-Compliant</ActionButton>
            </>
          }
        />

        <TabGroup
          tabs={[
            { id: 'scan', label: 'Scan Results', icon: 'Search' },
            { id: 'history', label: 'Update History', icon: 'History' },
            { id: 'compliance', label: 'Compliance Report', icon: 'ShieldCheck' },
            { id: 'cached', label: 'Cached Mode', icon: 'HardDrive' },
            { id: 'offline', label: 'Offline Mode', icon: 'WifiOff' },
            { id: 'wsus', label: 'WSUS Settings', icon: 'Server' },
          ]}
          active={activeTab}
          onChange={setActiveTab}
        />

        {activeTab === 'scan' && (
          <>
            <FilterBar
              search={search}
              onSearchChange={setSearch}

  const ServicesScreen = () => {
    const toast = useToast();
    const { hosts, appendAudit } = useApp();
    const [selectedHost, setSelectedHost] = useState(null);
    const [services, setServices] = useState([]);
    const [loading, setLoading] = useState(false);
    const [serviceSearch, setServiceSearch] = useState('');

    const loadServices = async (hostname) => {
      setLoading(true);
      setServices([]);
      if (!window.SupportHubLANAPI) { setLoading(false); return; }
      try {
        const result = await window.SupportHubLANAPI.getServices(hostname, null);
        if (result && result.success && !result.demo) {
          let parsed;
          try { parsed = JSON.parse(result.data); } catch { parsed = []; }
          setServices(Array.isArray(parsed) ? parsed : (parsed?.error ? [] : [parsed]));
        } else if (result && result.demo) {
          setServices([]);
          toast.warning('Backend not connected — connect to view real services.');
        } else {
          setServices([]);
          toast.error('Failed to load services', { detail: result?.error });
        }
      } catch (e) {
        setServices([]);
      }
      setLoading(false);
    };

    useEffect(() => {
      if (selectedHost) loadServices(selectedHost.hostname);
    }, [selectedHost?.hostname]);

    const doServiceAction = async (service, action) => {
      if (!selectedHost) return;
      const label = action === 'start' ? 'Starting' : action === 'stop' ? 'Stopping' : 'Restarting';
      toast.info(`${label} ${service.Name || service.name} on ${selectedHost.hostname}…`);
      if (window.SupportHubLANAPI) {
        try {
          const result = await window.SupportHubLANAPI.serviceAction(selectedHost.hostname, service.Name || service.name, action, null);
          if (result && result.success && !result.demo) {

                              <Icon name={(s.State || s.status || '') === 'Running' ? 'Circle' : 'CircleOff'} size={8} />

                              <IconButton icon="Square" size="sm" variant="danger" title="Stop" onClick={() => doServiceAction(s, 'stop')} disabled={(s.State || s.status) === 'Stopped'} />

        </div>

  const QueueScreen = () => {
    const toast = useToast();
    const { openJob, activeJobs, savedQueues, updateJob, removeJob, jobLogs, addJob, appendAudit, queueDraft, setQueueDraft, hosts, addSavedQueue } = useApp();
    const [activeTab, setActiveTab] = useState('builder');
    const [selectedTargets, setSelectedTargets] = useState([]);
    const [steps, setSteps] = useState([]);
    const [queueName, setQueueName] = useState('New Queue');
    const [errorHandling, setErrorHandling] = useState('stop');

    const stepTypes = [
      { type: 'check-updates', label: 'Check Windows Updates', icon: 'ShieldCheck' },
      { type: 'install-all', label: 'Install All Updates', icon: 'Download' },
      { type: 'reboot', label: 'Reboot', icon: 'Power' },
      { type: 'shutdown', label: 'Shutdown', icon: 'PowerOff' },
      { type: 'wait-for-online', label: 'Wait for Online', icon: 'Wifi' },
      { type: 'wait-minutes', label: 'Wait N Minutes', icon: 'Clock' },
      { type: 'run-command', label: 'Run PowerShell Command', icon: 'Terminal' },
      { type: 'start-service', label: 'Start Service', icon: 'Play' },
      { type: 'stop-service', label: 'Stop Service', icon: 'Square' },
      { type: 'restart-service', label: 'Restart Service', icon: 'RotateCw' },
      { type: 'psexec-run', label: 'PsExec Command', icon: 'TerminalSquare' },
    ];

    const addStep = (type) => {
      const def = stepTypes.find(s => s.type === type);
      if (!def) return;
      setSteps(prev => [...prev, {
        id: 'step-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
        type,
        label: def.label,
        config: {},
      }]);
    };

    const removeStep = (id) => setSteps(prev => prev.filter(s => s.id !== id));
    const moveStep = (id, dir) => {
      setSteps(prev => {
        const idx = prev.findIndex(s => s.id === id);
        if (idx === -1) return prev;
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= prev.length) return prev;
        const ns = [...prev];
        [ns[idx], ns[newIdx]] = [ns[newIdx], ns[idx]];
        return ns;
      });
    };

    const updateStepConfig = (id, config) => {
      setSteps(prev => prev.map(s => s.id === id ? { ...s, config: { ...s.config, ...config } } : s));
    };

    const executeQueue = async () => {
      if (steps.length === 0) { toast.warning('Add at least one step.'); return; }
      if (selectedTargets.length === 0) { toast.warning('Select at least one target host.'); return; }
      const targetHostnames = hosts.filter(h => selectedTargets.includes(h.id)).map(h => h.hostname);
      if (targetHostnames.length === 0) { toast.error('Could not resolve hostnames.'); return; }
      const jobId = 'job-' + Date.now();
      addJob({ id: jobId, name: queueName, targets: [...selectedTargets], step: 'Submitting…', progress: 0, startedAt: new Date().toISOString(), status: 'running' });
      toast.info(`Submitting "${queueName}" to backend…`);
      if (window.SupportHubLANAPI) {
        try {
          const result = await window.SupportHubLANAPI.executeQueue(steps, targetHostnames, null, errorHandling, queueName);
          if (result && result.success && !result.demo) {
            appendAudit({ action: 'queues.execute', actionCategory: 'Job Queue', targetType: 'Host', targetIds: [...selectedTargets], parameters: { jobId: result.data?.jobId, queueName, stepCount: steps.length }, result: 'success' });
            toast.success(`Queue "${queueName}" submitted — executing on ${targetHostnames.length} host(s).`, { duration: 6000 });
          } else if (result && result.demo) {
            updateJob(jobId, { status: 'failed', step: 'Demo mode — backend not connected', progress: 100 });
            toast.warning('Backend not connected. Run the server to execute queues.', { duration: 8000 });
          } else {
            updateJob(jobId, { status: 'failed', step: 'Failed', progress: 100 });
            toast.error('Queue submission failed', { detail: result?.error, duration: 8000 });
          }
        } catch (e) {
          updateJob(jobId, { status: 'failed', step: 'Failed', progress: 100 });
          toast.error('Queue submission failed', { detail: e.message, duration: 8000 });
        }
      }
    };

    const saveAsTemplate = () => {
      const newQ = { id: 'q-' + Date.now(), name: queueName, description: 'User-saved queue', mode: 'standard', isTemplate: true, createdBy: 'admin', createdAt: new Date().toISOString(), steps: [...steps] };
      addSavedQueue(newQ);
      toast.success(`Saved "${queueName}" as template`);
    };

    return (
      <div className="space-y-3">
        <PageHeader
          breadcrumb={['supporthublan', 'Job Queue']}
          title="Job Queue Builder"
          subtitle="Multi-step sequential automation — design, run, and monitor workflows"
        />

        <TabGroup
          tabs={[
            { id: 'builder', label: 'Queue Builder', icon: 'Wrench' },
            { id: 'running', label: 'Running', icon: 'Loader2', badge: activeJobs.filter(j => j.status === 'running' || j.status === 'queued').length },
            { id: 'my-queues', label: 'My Queues', icon: 'ListOrdered', badge: savedQueues.length },
            { id: 'history', label: 'History', icon: 'History' },
          ]}
          active={activeTab}
          onChange={setActiveTab}
        />

        {activeTab === 'builder' && (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
            {/* Left: Steps + Actions */}
            <div className="lg:col-span-2 space-y-3">
              <SectionCard title="Queue Steps" description={`${steps.length} step(s)`}>
                {/* Queue name + error handling */}
                <div className="flex gap-2 mb-3">
                  <input value={queueName} onChange={e => setQueueName(e.target.value)} placeholder="Queue name…" className="flex-1 px-2 py-1.5 text-xs bg-surface-raised border border-border rounded text-text" />
                  <select value={errorHandling} onChange={e => setErrorHandling(e.target.value)} className="px-2 py-1.5 text-xs bg-surface-raised border border-border rounded text-text">
                    <option value="stop">Stop on error</option>
                    <option value="continue">Continue on error</option>
                  </select>
                </div>

                {/* Step list */}
                {steps.length === 0 ? (
                  <div className="text-center text-text-dim text-xs py-6">Add steps from the palette on the right →</div>
                ) : (
                  <div className="space-y-1.5">
                    {steps.map((step, i) => (
                      <div key={step.id} className="flex items-center gap-2 p-2 bg-surface-raised border border-border rounded">
                        <span className="text-[10px] text-text-dim font-mono w-5 text-center">{i + 1}</span>
                        <Icon name={stepTypes.find(s => s.type === step.type)?.icon || 'Square'} size={14} className="text-primary flex-shrink-0" />
                        <span className="text-xs text-text flex-1">{step.label}</span>
                        {/* Config inputs per step type */}
                        {(step.type === 'run-command' || step.type === 'psexec-run') && (
                          <input placeholder="PowerShell command…" value={step.config.code || step.config.command || ''} onChange={e => updateStepConfig(step.id, step.type === 'run-command' ? { code: e.target.value } : { command: e.target.value })} className="flex-1 px-1.5 py-0.5 text-[10px] font-mono bg-surface border border-border rounded text-text max-w-[200px]" />
                        )}
                        {(step.type === 'start-service' || step.type === 'stop-service' || step.type === 'restart-service') && (
                          <input placeholder="Service name…" value={step.config.serviceName || ''} onChange={e => updateStepConfig(step.id, { serviceName: e.target.value })} className="flex-1 px-1.5 py-0.5 text-[10px] font-mono bg-surface border border-border rounded text-text max-w-[150px]" />
                        )}
                        {step.type === 'wait-minutes' && (
                          <input type="number" placeholder="min" value={step.config.minutes || ''} onChange={e => updateStepConfig(step.id, { minutes: parseInt(e.target.value) || 1 })} className="w-16 px-1.5 py-0.5 text-[10px] bg-surface border border-border rounded text-text" />
                        )}
                        <div className="flex gap-0.5">
                          <button onClick={() => moveStep(step.id, -1)} disabled={i === 0} className="p-1 text-text-dim hover:text-text disabled:opacity-30"><Icon name="ChevronUp" size={12} /></button>
                          <button onClick={() => moveStep(step.id, 1)} disabled={i === steps.length - 1} className="p-1 text-text-dim hover:text-text disabled:opacity-30"><Icon name="ChevronDown" size={12} /></button>
                          <button onClick={() => removeStep(step.id)} className="p-1 text-danger hover:text-danger"><Icon name="X" size={12} /></button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Execute buttons */}
                <div className="flex gap-2 mt-3 pt-3 border-t border-border">
                  <ActionButton variant="primary" size="sm" icon="Play" onClick={executeQueue} disabled={steps.length === 0 || selectedTargets.length === 0}>Execute Queue</ActionButton>
                  <ActionButton variant="secondary" size="sm" icon="Save" onClick={saveAsTemplate} disabled={steps.length === 0}>Save as Template</ActionButton>
                </div>
              </SectionCard>

                      <input type="checkbox" checked={selectedTargets.includes(h.id)} onChange={() => setSelectedTargets(prev => prev.includes(h.id) ? prev.filter(x => x !== h.id) : [...prev, h.id])} className="accent-primary" />
                      <span className="font-mono text-text truncate">{h.hostname}</span>

                  <button onClick={() => setSelectedTargets(hosts.map(h => h.id))} className="text-[10px] text-text-dim hover:text-primary">All</button>

                  <button onClick={() => setSelectedTargets([])} className="text-[10px] text-text-dim hover:text-primary">None</button>
                  <span className="text-text-dim text-[10px]">·</span>
                  <button onClick={() => setSelectedTargets(hosts.filter(h => h.onlineStatus === 'online').map(h => h.id))} className="text-[10px] text-text-dim hover:text-primary">Online only</button>
                </div>
              </SectionCard>
            </div>
          </div>
        )}

        {activeTab === 'running' && (
          <div className="space-y-3">
            {activeJobs.length === 0 && <EmptyState icon="CheckCircle2" title="No active jobs" description="Build a queue and click Execute, or trigger an action from another screen." />}
            {activeJobs.map(job => (
              <SectionCard key={job.id} title={job.name} description={`${job.targets.length} targets · started ${fmtRel(job.startedAt)}`} actions={<div className="flex gap-1"><IconButton icon="Pause" size="sm" title="Pause" onClick={() => { updateJob(job.id, { status: 'queued' }); toast.info(`Paused ${job.name}`); }} /><IconButton icon="X" size="sm" variant="danger" title="Cancel" onClick={() => { removeJob(job.id); toast.warning(`Cancelled ${job.name}`); }} /></div>}>
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
                  <div className="lg:col-span-1">
                    <div className="text-meta text-text-dim uppercase mb-1">Current Step</div>
                    <div className="text-sm text-text mb-2">{job.step}</div>
                    <ProgressBar value={job.progress} showLabel color="info" />
                    <div className="mt-3 flex items-center gap-2"><StatusBadge variant={job.status} /></div>
                  </div>
                  <div className="lg:col-span-2">
                    <div className="text-meta text-text-dim uppercase mb-2">Step Tracker</div>
                    <JobStepTracker steps={savedQueues[0]?.steps || [{ id: 's1', label: 'Step 1' }, { id: 's2', label: 'Step 2' }, { id: 's3', label: 'Step 3' }]} currentStepIndex={parseInt(job.step.match(/(\d+)/)?.[1] || 1) - 1} />
                  </div>

                  <ActionButton variant="secondary" size="sm" icon="ExternalLink" onClick={() => openJob(job)}>View Details</ActionButton>
                </div>
              </SectionCard>
            ))}
          </div>

            <FilterBar search={search} onSearchChange={setSearch} searchPlaceholder="Search action, target, parameters…"

                { key: 'category', label: 'All Categories', options: [{value:'Updates',label:'Updates'},{value:'Deployments',label:'Deployments'},{value:'Power',label:'Power'},{value:'Scripts',label:'Scripts'},{value:'Inventory',label:'Inventory'},{value:'Job Queue',label:'Job Queue'}] },

              <div className="mt-3 flex gap-2">
                <ActionButton variant="primary" icon="Download" onClick={() => {
                  let data = [];
                  let filename = exportDataType.toLowerCase().replace(/\s/g, '-');
                  if (exportDataType === 'Audit Trail') data = auditEvents;
                  else if (exportDataType === 'Patch History') data = patchHistory;
                  else if (exportDataType === 'Deployment Log') data = deploymentHistory;
                  else if (exportDataType === 'Job Logs') data = jobLogs;
                  else if (exportDataType === 'Host Inventory') data = hosts.map(h => ({ hostname: h.hostname, ipAddress: h.ipAddress, os: h.osName, patchState: h.patchState, onlineStatus: h.onlineStatus, site: h.site, owner: h.owner }));

                    const compliant = hosts.filter(h => h.patchState === 'compliant').length;

                  }
                  if (exportFormat === 'JSON') {
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = filename + '.json'; a.click();
                    URL.revokeObjectURL(url);

                    const headers = data.length > 0 ? Object.keys(data[0]) : [];
                    const csv = [headers.join(',')].concat(data.map(row => headers.map(h => JSON.stringify(row[h] ?? '')).join(',').replace(/^"|"$/g, ''))).join('\n');

                  toast.success(`Exported ${data.length} record(s) as ${exportFormat}`);

            <SectionCard title="Saved Report Configurations">

                  { name: 'Daily Audit Export', type: 'Audit Trail', format: 'CSV', schedule: 'Daily (23:00)' },
                ].map(r => (

                    <Icon name="FileText" size={14} className="text-primary" />
                    <div className="flex-1"><div className="text-xs font-medium text-text">{r.name}</div><div className="text-[10px] text-text-dim">{r.type} · {r.format} · {r.schedule}</div></div>
                    <IconButton icon="Download" size="sm" title="Run now" onClick={() => toast.success(`Generated ${r.name}`)} />
                    <IconButton icon="Edit" size="sm" title="Edit" />
                  </div>
                ))}
              </div>
            </SectionCard>
          </div>
        )}

        {/* Reset Demo Data Confirmation */}
        <ConfirmDialog
          open={showResetConfirm}
          onClose={() => setShowResetConfirm(false)}
          onConfirm={() => {
            clearPersistedState();
            toast.success('Demo state reset to defaults. Reloading…');
            setTimeout(() => location.reload(), 800);
          }}
          title="Reset All Demo Data?"
          message="This will clear all hosts, jobs, queues, and audit events from localStorage and restore the original seed data. This cannot be undone."
          destructive
          confirmLabel="Reset Everything"
        />
      </div>
    );

  // ============================================================
  // BACKEND CONNECTION TESTER — Used in Settings → General
  // ============================================================
  const BackendConnectionTester = () => {
    const toast = useToast();
    const [status, setStatus] = useState('idle'); // idle | checking | ok | fail
    const [info, setInfo] = useState(null);
    const [lastChecked, setLastChecked] = useState(null);

    const test = async () => {
      setStatus('checking');
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 5000);
        const resp = await fetch((window.SUPPORTHUBLAN_API_URL) + '/api/health', { signal: ctrl.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        setInfo(json.data);
        setStatus('ok');
        setLastChecked(new Date());
        toast.success(`Backend OK — v${json.data?.version}`);
      } catch (e) {
        setStatus('fail');
        setLastChecked(new Date());
        toast.error('Backend not reachable', { detail: e.message });
      }
    };

    useEffect(() => { test(); }, []);

    return (
      <div className="space-y-3">
        <div className="flex items-center gap-3">
          <div className={`px-2.5 py-1 rounded text-xs font-medium ${
            status === 'ok' ? 'bg-success/15 text-success' :
            status === 'fail' ? 'bg-danger/15 text-danger' :
            status === 'checking' ? 'bg-info/15 text-info' :
            'bg-surface-raised text-text-dim'
          }`}>
            {status === 'checking' && <><Icon name="Loader2" size={11} className="inline animate-spin mr-1" /> Checking…</>}
            {status === 'ok' && <><Icon name="CheckCircle2" size={11} className="inline mr-1" /> LIVE</>}
            {status === 'fail' && <><Icon name="AlertCircle" size={11} className="inline mr-1" /> OFFLINE</>}
            {status === 'idle' && 'Idle'}
          </div>
          <ActionButton variant="secondary" size="sm" icon="RefreshCw" onClick={test}>Test Now</ActionButton>
          {lastChecked && <span className="text-meta text-text-dim">Last checked: {lastChecked.toLocaleTimeString()}</span>}
        </div>

        {info && (
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
            <div className="p-2 bg-surface-raised rounded border border-border">
              <div className="text-meta text-text-dim uppercase">Version</div>
              <div className="font-mono text-text">{info.version}</div>
            </div>
            <div className="p-2 bg-surface-raised rounded border border-border">
              <div className="text-meta text-text-dim uppercase">Hostname</div>
              <div className="font-mono text-text">{info.hostname}</div>
            </div>
            <div className="p-2 bg-surface-raised rounded border border-border">
              <div className="text-meta text-text-dim uppercase">Platform</div>
              <div className="font-mono text-text">{info.platform}</div>
            </div>
            <div className="p-2 bg-surface-raised rounded border border-border">
              <div className="text-meta text-text-dim uppercase">PsTools</div>
              <div className={`font-mono ${info.pstoolsInstalled ? 'text-success' : 'text-danger'}`}>
                {info.pstoolsInstalled ? 'INSTALLED' : 'NOT FOUND'}
              </div>
            </div>
          </div>
        )}
        {info && (
          <div className="text-xs">
            <div className="text-meta text-text-dim uppercase mb-1">PsTools Path</div>
            <code className="font-mono text-text bg-surface-raised px-2 py-1 rounded">{info.pstoolsPath}</code>
          </div>
        )}
        {info && info.endpoints && (
          <details className="text-xs">
            <summary className="cursor-pointer text-text-dim hover:text-text">{info.endpoints.length} API endpoints available — click to view</summary>
            <div className="mt-2 p-2 bg-surface-raised rounded border border-border font-mono text-[10px] text-text-dim max-h-40 overflow-y-auto">
              {info.endpoints.map((e, i) => <div key={i}>{e}</div>)}
            </div>
          </details>
        )}
      </div>
    );
  };

  // ============================================================
  // INVENTORIES MANAGER — Used in Settings → Inventories tab
  // ============================================================
  const InventoriesManager = () => {
    const toast = useToast();
    const { appendAudit } = useApp();
    const [inventories, setInventories] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showCreate, setShowCreate] = useState(false);
    const [newInv, setNewInv] = useState({ name: '', description: '', color: 'blue' });

    const load = async () => {
      setLoading(true);
      try {
        const resp = await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories`);
        const json = await resp.json();
        if (json.success) setInventories(json.data);
      } catch (e) {
        toast.error('Failed to load inventories — backend not connected');
      }
      setLoading(false);
    };

    useEffect(() => { load(); }, []);

    const create = async () => {
      if (!newInv.name.trim()) { toast.warning('Name required'); return; }
      try {
        const resp = await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newInv)
        });
        const json = await resp.json();
        if (json.success) {
          toast.success(`Inventory "${newInv.name}" created`);
          setShowCreate(false);
          setNewInv({ name: '', description: '', color: 'blue' });
          load();
        } else {
          toast.error('Failed to create inventory', { detail: json.error });
        }
      } catch (e) { toast.error('Failed to create inventory', { detail: e.message }); }
    };

    const activate = async (id) => {
      try {
        await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories/${id}/activate`, { method: 'POST' });
        toast.success('Inventory activated');
        load();
      } catch (e) { toast.error('Failed to activate'); }
    };

    const remove = async (id, name) => {
      if (!confirm(`Delete inventory "${name}"? All hosts in it will be permanently removed.`)) return;
      try {
        const resp = await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories/${id}`, { method: 'DELETE' });
        const json = await resp.json();
        if (json.success) { toast.success('Inventory deleted'); load(); }
        else toast.error('Failed to delete', { detail: json.error });
      } catch (e) { toast.error('Failed to delete'); }
    };

    if (loading) return <div className="p-4 text-center text-text-dim text-xs">Loading…</div>;

    return (
      <SectionCard title="Inventory Management" description="Create and manage multiple named inventories. Each inventory appears as a tab in Computer Inventory.">
        <div className="space-y-2">
          {inventories.length === 0 ? (
            <div className="p-4 text-center text-text-dim text-xs">No inventories. Create one below.</div>
          ) : inventories.map(inv => (
            <div key={inv.id} className={`flex items-center justify-between p-3 rounded border ${inv.is_active ? 'border-primary bg-primary/5' : 'border-border bg-surface-raised'}`}>
              <div className="flex items-center gap-3">
                <span className={`w-2 h-2 rounded-full bg-${inv.color === 'blue' ? 'primary' : inv.color === 'green' ? 'success' : inv.color === 'red' ? 'danger' : 'warning'}`} />
                <div>
                  <div className="text-sm font-medium text-text">{inv.name} {inv.is_active === 1 && <span className="ml-2 px-1.5 py-0.5 text-[10px] bg-success/15 text-success rounded">ACTIVE</span>}</div>
                  <div className="text-meta text-text-dim">{inv.description || 'No description'}</div>
                </div>
              </div>
              <div className="flex items-center gap-1">
                {!inv.is_active && <ActionButton variant="ghost" size="xs" icon="Check" onClick={() => activate(inv.id)}>Activate</ActionButton>}
                <ActionButton variant="ghost" size="xs" icon="Trash2" onClick={() => remove(inv.id, inv.name)} />
              </div>
            </div>
          ))}
        </div>
        <div className="mt-3">
          {!showCreate ? (
            <ActionButton variant="primary" size="sm" icon="Plus" onClick={() => setShowCreate(true)}>New Inventory</ActionButton>
          ) : (
            <div className="p-3 border border-border rounded space-y-2">

    return (

          <div className="p-4 grid grid-cols-1 sm:grid-cols-2 gap-1.5 max-h-[60vh] overflow-y-auto">
            {shortcuts.map((s, i) => (
              <div key={i} className="flex items-center justify-between gap-3 p-2 rounded hover:bg-surface-raised">
                <span className="text-xs text-text-dim">{s.desc}</span>

          </div>
