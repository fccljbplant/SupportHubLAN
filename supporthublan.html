<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SupportHubLAN — Windows Endpoint Administration</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS (local vendor copy — works on LAN with no internet) -->
  <script src="vendor/tailwind.min.js"></script>

  <!-- React 18 (local vendor copy) -->
  <script crossorigin src="vendor/react.production.min.js"></script>
  <script crossorigin src="vendor/react-dom.production.min.js"></script>

  <!-- Babel for JSX (local vendor copy) -->
  <script src="vendor/babel.min.js"></script>

  <!-- Lucide Icons UMD (local vendor copy) -->
  <script src="vendor/lucide.min.js"></script>

  <!-- CDN fallbacks (only used if vendor files are missing, e.g. on GitHub Pages) -->
  <script>
    window.__fallbackLoaded = false;
    function loadFallback(id, url) {
      if (window[id]) return;
      window.__fallbackLoaded = true;
      var s = document.createElement('script');
      s.src = url; s.async = false;
      document.head.appendChild(s);
    }
    document.addEventListener('DOMContentLoaded', function() {
      loadFallback('tailwind', 'https://cdn.tailwindcss.com');
      loadFallback('React', 'https://unpkg.com/react@18/umd/react.production.min.js');
      loadFallback('ReactDOM', 'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js');
      loadFallback('Babel', 'https://unpkg.com/@babel/standalone/babel.min.js');
      loadFallback('lucide', 'https://unpkg.com/lucide@latest/dist/umd/lucide.min.js');
    });
  </script>

  <script>
    // Tailwind theme extension with supporthublan tokens
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: '#0f1117',
            surface: '#1a1d27',
            'surface-raised': '#21263a',
            border: '#2e3347',
            primary: { DEFAULT: '#4f83ff', hover: '#6b9aff' },
            success: '#22c55e',
            warning: '#f59e0b',
            danger: '#ef4444',
            info: '#38bdf8',
            muted: '#6b7280',
            text: { DEFAULT: '#e2e8f0', dim: '#94a3b8' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          fontSize: {
            'meta': ['11px', { lineHeight: '16px', letterSpacing: '0.05em' }],
          },
          boxShadow: {
            'card': '0 1px 2px rgba(0,0,0,0.3), 0 0 0 1px #2e3347',
            'raised': '0 4px 12px rgba(0,0,0,0.4), 0 0 0 1px #2e3347',
          },
          keyframes: {
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
            slideIn: {
              '0%': { transform: 'translateX(100%)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            spin: { '0%': { transform: 'rotate(0deg)' }, '100%': { transform: 'rotate(360deg)' } },
          },
          animation: {
            pulseSoft: 'pulseSoft 2s ease-in-out infinite',
            slideIn: 'slideIn 200ms ease-out',
            fadeIn: 'fadeIn 150ms ease-out',
            spin: 'spin 1s linear infinite',
          },
        },
      },
    };
  </script>

  <style>
    html, body, #root { height: 100%; }
    body {
      background: var(--c-bg, #0f1117);
      color: var(--c-text, #e2e8f0);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }
    /* ---- Dark theme (default) ---- */
    :root, .dark {
      --c-bg: #0f1117;
      --c-surface: #1a1d27;
      --c-surface-raised: #21263a;
      --c-border: #2e3347;
      --c-text: #e2e8f0;
      --c-text-dim: #94a3b8;
      --c-muted: #6b7280;
    }
    /* ---- Light theme ---- */
    .light {
      --c-bg: #f1f5f9;
      --c-surface: #ffffff;
      --c-surface-raised: #f8fafc;
      --c-border: #e2e8f0;
      --c-text: #1e293b;
      --c-text-dim: #64748b;
      --c-muted: #94a3b8;
    }
    /* Override Tailwind color tokens with CSS variables so theme switching works */
    .dark .bg-bg { background-color: var(--c-bg) !important; }
    .dark .bg-surface { background-color: var(--c-surface) !important; }
    .dark .bg-surface-raised { background-color: var(--c-surface-raised) !important; }
    .dark .border-border { border-color: var(--c-border) !important; }
    .dark .text-text { color: var(--c-text) !important; }
    .dark .text-text-dim { color: var(--c-text-dim) !important; }
    .light .bg-bg { background-color: var(--c-bg) !important; }
    .light .bg-surface { background-color: var(--c-surface) !important; }
    .light .bg-surface-raised { background-color: var(--c-surface-raised) !important; }
    .light .border-border { border-color: var(--c-border) !important; }
    .light .text-text { color: var(--c-text) !important; }
    .light .text-text-dim { color: var(--c-text-dim) !important; }
    .light ::-webkit-scrollbar-track { background: #f1f5f9; }
    .light ::-webkit-scrollbar-thumb { background: #cbd5e1; }

    /* Focus rings */

    /* Hide native number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* ---- Professional toolbar styling (BatchPatch-inspired) ---- */

      align-items: center;
      gap: 1px;
      padding: 2px 4px;
      border-right: 1px solid var(--c-border, #2e3347);

    .toolbar-group:last-child { border-right: none; }

      color: var(--c-text-dim, #94a3b8);

      border: 1px solid transparent;
      white-space: nowrap;

    }
    .toolbar-btn:hover {

      border-color: rgba(79, 131, 255, 0.2);
    }
    .toolbar-btn:active {
      background: rgba(79, 131, 255, 0.2);
    }
    .toolbar-btn-danger:hover {

      border-color: rgba(239, 68, 68, 0.2);
    }

      background: rgba(34, 197, 94, 0.1);

      border-color: rgba(34, 197, 94, 0.2);
    }

      background: rgba(245, 158, 11, 0.1);

    }
    .toolbar-divider {
      width: 1px;

      background: var(--c-border, #2e3347);
      margin: 0 2px;
    }
    .toolbar-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--c-muted, #6b7280);
      padding: 0 4px;
    }

    /* ---- Context menu ---- */
    .context-menu {
      position: fixed;
      z-index: 200;
      min-width: 200px;
      background: var(--c-surface, #1a1d27);
      border: 1px solid var(--c-border, #2e3347);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      padding: 4px;
      animation: fadeIn 100ms ease-out;
    }
    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--c-text-dim, #94a3b8);
      cursor: pointer;
      border-radius: 4px;
      transition: background 100ms ease;
    }
    .context-menu-item:hover {
      background: rgba(79, 131, 255, 0.15);
      color: #4f83ff;
    }
    .context-menu-item-danger:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    .context-menu-separator {
      height: 1px;
      background: var(--c-border, #2e3347);
      margin: 4px 0;
    }
    .context-menu-label {
      padding: 4px 10px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--c-muted, #6b7280);
    }

    /* ---- Grid borderless mode (Ctrl+B) ---- */
    .grid-borderless table { border-collapse: collapse; }
    .grid-borderless table td, .grid-borderless table th { border: none !important; }
    .grid-borderless table tr { border-bottom: 1px solid rgba(46, 51, 71, 0.3) !important; }

    /* ---- Smooth scrollbar ---- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--c-border, #2e3347); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d425a; }
  </style>

<body>
  <div id="root"></div>

  <!-- supporthublan API Client — connects to backend for real operations -->
  <script>
    // API URL — auto-detect:
    //   • If served by the backend (same origin), use window.location.origin
    //   • If loaded from file:// or GitHub Pages, fall back to localhost:8080
    //   • Override with window.SUPPORTHUBLAN_API_URL = 'http://10.0.0.5:8080' before this script
    if (!window.SUPPORTHUBLAN_API_URL) {
      if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
        // Served by backend or static host — try same-origin first
        window.SUPPORTHUBLAN_API_URL = window.location.origin;
      } else {
        // file:// — assume backend running on localhost:8080
        window.SUPPORTHUBLAN_API_URL = 'http://localhost:8080';
      }
    }
    window._supporthublanBackendStatus = 'checking'; // checking | connected | demo

    // ---- IP Range / Subnet Scanner Utilities ----
    window.SupportHubLANScanner = (function() {
      // Parse IP range: "10.10.1.1-10.10.1.50" or "10.10.1.1-50"
      function parseRange(rangeStr) {
        const parts = rangeStr.trim().split('-');
        if (parts.length !== 2) return [];
        const startIP = parts[0].trim().split('.');
        const endPart = parts[1].trim();
        let endIP;
        if (endPart.includes('.')) {
          endIP = endPart.split('.');
        } else {
          endIP = [...startIP.slice(0, 3), endPart];
        }
        const startNum = (parseInt(startIP[0]) << 24) | (parseInt(startIP[1]) << 16) | (parseInt(startIP[2]) << 8) | parseInt(startIP[3]);
        const endNum = (parseInt(endIP[0]) << 24) | (parseInt(endIP[1]) << 16) | (parseInt(endIP[2]) << 8) | parseInt(endIP[3]);
        const ips = [];
        for (let i = startNum; i <= endNum && i >= 0; i++) {
          ips.push([(i >> 24) & 0xFF, (i >> 16) & 0xFF, (i >> 8) & 0xFF, i & 0xFF].join('.'));
          if (ips.length > 254) break; // cap at /24
        }
        return ips;
      }

      // Parse CIDR: "10.10.1.0/24"
      function parseCIDR(cidrStr) {
        const [ip, prefix] = cidrStr.trim().split('/');
        const prefixLen = parseInt(prefix);
        if (isNaN(prefixLen) || prefixLen < 16 || prefixLen > 30) return [];
        const ipParts = ip.split('.').map(Number);
        const ipNum = (ipParts[0] << 24) | (ipParts[1] << 16) | (ipParts[2] << 8) | ipParts[3];
        const mask = prefixLen === 0 ? 0 : (0xFFFFFFFF << (32 - prefixLen)) >>> 0;
        const network = (ipNum & mask) >>> 0;
        const broadcast = (network | (~mask >>> 0)) >>> 0;
        const ips = [];
        for (let i = network + 1; i < broadcast && i >= 0; i++) {
          ips.push([(i >> 24) & 0xFF, (i >> 16) & 0xFF, (i >> 8) & 0xFF, i & 0xFF].join('.'));
          if (ips.length > 254) break;
        }
        return ips;
      }

      // Parse a scan input string — could be range, CIDR, or comma-separated IPs
      function parseScanInput(input) {
        input = input.trim();
        if (input.includes('/')) return parseCIDR(input);
        if (input.includes('-')) return parseRange(input);
        if (input.includes(',')) return input.split(',').map(s => s.trim()).filter(Boolean);
        return [input];
      }

      // Ping an IP — REAL when backend is connected, HONEST null when in demo mode
      // (Math.random fallback removed — was creating fake "online" hosts)
      async function pingIP(ip) {
        if (window.SupportHubLANAPI) {
          try {
            const result = await window.SupportHubLANAPI.pingHost(ip);
            if (result.success && !result.demo) return result.data?.online || false;
            // Backend in demo mode — return null so the UI can show honest empty state
            return null;
          } catch (e) {
            return null;
          }
        }
        return null;
      }

      // Bulk ping sweep via dedicated /api/scan endpoint (real backend parallelism)
      async function scanRange(ips) {
        if (!window.SupportHubLANAPI) return ips.map(ip => ({ ip, online: null }));
        try {
          const resp = await fetch((window.SUPPORTHUBLAN_API_URL) + '/api/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ips })
          });
          if (!resp.ok) return ips.map(ip => ({ ip, online: null }));
          // The /api/scan endpoint responds immediately with a jobId; results come via WebSocket
          const data = await resp.json();
          return ips.map(ip => ({ ip, online: null, jobId: data?.data?.jobId }));
        } catch (e) {
          return ips.map(ip => ({ ip, online: null }));
        }
      }

      return { parseRange, parseCIDR, parseScanInput, pingIP, scanRange };
    })();

    // ---- CSV Parser ----
    window.SupportHubLANCSV = (function() {
      function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length === 0) return { headers: [], rows: [] };
        const headers = parseLine(lines[0]);
        const rows = lines.slice(1).map(line => {
          const values = parseLine(line);
          const obj = {};
          headers.forEach((h, i) => { obj[h] = values[i] || ''; });
          return obj;
        });
        return { headers, rows };
      }

      function parseLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') {
            if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
            else { inQuotes = !inQuotes; }
          } else if (c === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else {
            current += c;
          }
        }
        result.push(current.trim());
        return result;
      }

      function toCSV(rows, headers) {
        const headerLine = headers.map(h => `"${h}"`).join(',');
        const dataLines = rows.map(row => headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}"`).join(','));
        return [headerLine, ...dataLines].join('\n');
      }

      return { parseCSV, toCSV };
    })();

    // API Client with demo fallback
    window.SupportHubLANAPI = (function() {
      // Use a getter so changes to window.SUPPORTHUBLAN_API_URL (e.g. from Settings) take effect immediately
      const getApiUrl = () => window.SUPPORTHUBLAN_API_URL || 'http://localhost:8080';
      let _available = null;

      async function checkBackend() {
        if (_available !== null) return _available;
        try {
          const ctrl = new AbortController();
          setTimeout(() => ctrl.abort(), 2000);
          const resp = await fetch(getApiUrl() + '/api/health', { signal: ctrl.signal });
          _available = resp.ok;
        } catch (e) { _available = false; }
        window._supporthublanBackendStatus = _available ? 'connected' : 'demo';
        return _available;
      }

      async function apiCall(endpoint, body) {
        const available = await checkBackend();
        if (!available) return { success: false, demo: true, error: 'Backend not available — running in demo mode' };
        try {
          const resp = await fetch(getApiUrl() + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          return await resp.json();
        } catch (e) {
          return { success: false, demo: true, error: e.message };
        }
      }

      return {
        isBackendAvailable: checkBackend,
        apiUrl: getApiUrl(),
        getStatus: () => window._supporthublanBackendStatus,

        // Host operations
        getHostInfo: (hostname, credential) => apiCall('/api/hosts/' + hostname + '/info', { credential }),
        pingHost: (hostname) => apiCall('/api/hosts/' + hostname + '/ping', {}),

        // Windows Updates
        scanUpdates: (hostnames, credential) => apiCall('/api/updates/scan', { hostnames, credential }),
        downloadUpdates: (hostnames, credential, kbFilter) => apiCall('/api/updates/download', { hostnames, credential, kbFilter }),
        installUpdates: (hostnames, credential, opts) => apiCall('/api/updates/install', { hostnames, credential, ...opts }),
        getUpdateHistory: (hostnames, credential) => apiCall('/api/updates/history', { hostnames, credential }),

        // Scripts
        executeScript: (hostnames, script, credential, language, timeout) => apiCall('/api/scripts/execute', { hostnames, script, credential, language, timeout }),

        // Deployments
        deployPackage: (hostnames, packagePath, args, credential, rebootBehavior) => apiCall('/api/deploy/package', { hostnames, packagePath, arguments: args, credential, rebootBehavior }),
        copyFiles: (hostnames, sourcePath, destinationPath, credential) => apiCall('/api/deploy/copy', { hostnames, sourcePath, destinationPath, credential }),

        // Services
        getServices: (hostname, credential) => apiCall('/api/services/' + hostname + '/list', { credential }),
        serviceAction: (hostname, serviceName, action, credential) => apiCall('/api/services/' + hostname + '/action', { serviceName, action, credential }),

        // Processes
        getProcesses: (hostname, credential) => apiCall('/api/processes/' + hostname + '/list', { credential }),
        killProcess: (hostname, pid, name, credential) => apiCall('/api/processes/' + hostname + '/kill', { pid, name, credential }),

        // Power
        // Power — pass single hostname (string) per call; backend expects { hostname, action, credential }
        powerAction: (hostname, action, credential, message) => apiCall('/api/power/action', { hostname, action, credential, message }),
        // Wake-on-LAN — pass single MAC address (string) per call; backend expects { mac }
        wakeOnLan: (mac) => apiCall('/api/power/wol', { mac }),
        checkPendingReboot: (hostnames, credential) => apiCall('/api/power/check-pending', { hostnames, credential }),

        // Job Queue
        executeQueue: (steps, hostnames, credential, errorHandling, queueName) => apiCall('/api/queues/execute', { steps, hostnames, credential, errorHandling, queueName }),

        // LAPS — Local Admin Password Solution
        retrieveLaps: (hostnames, credential) => apiCall('/api/laps/retrieve', { hostnames, credential }),
        rotateLaps: (hostnames, credential) => apiCall('/api/laps/rotate', { hostnames, credential }),

        // PsTools — direct endpoints (each tool has its own route)
        pstoolsPsInfo: (hostname) => apiCall('/api/pstools/psinfo', { hostname }),
        pstoolsPsList: (hostname) => apiCall('/api/pstools/pslist', { hostname }),
        pstoolsPsKill: (hostname, target) => apiCall('/api/pstools/pskill', { hostname, target }),
        pstoolsPsService: (hostname, action, serviceName) => apiCall('/api/pstools/psservice', { hostname, action, serviceName }),
        pstoolsPsLoggedOn: (hostname) => apiCall('/api/pstools/psloggedon', { hostname }),
        pstoolsPsShutdown: (hostname, action, timeout, message) => apiCall('/api/pstools/psshutdown', { hostname, action, timeout, message }),
        pstoolsPsFile: (hostname) => apiCall('/api/pstools/psfile', { hostname }),
        pstoolsPsGetSid: (hostname) => apiCall('/api/pstools/psgetsid', { hostname }),
        pstoolsPsSuspend: (hostname, target, action) => apiCall('/api/pstools/pssuspend', { hostname, target, action }),
        pstoolsExecute: (tool, hostname, args) => apiCall('/api/pstools/execute', { tool, hostname, args }),

        // Network scanner — bulk
        scanIps: (ips) => apiCall('/api/scan', { ips }),

        // Remote desktop
        launchRemote: (hostname, ip, protocol, port) => apiCall('/api/remote/connect', { hostname, ip, protocol, port }),

        // PC Event Log
        getEventLog: (hostname, logName, maxEvents, severity, credential) =>
          apiCall('/api/hosts/' + hostname + '/eventlog', { logName, maxEvents, severity, credential }),

        // Health check (force re-check by resetting _available)
        recheckBackend: () => { _available = null; return checkBackend(); },

        // Hardware info + change detection
        getHardwareInfo: (hostname) => apiCall('/api/hosts/' + hostname + '/hardware', {}),
        checkHardwareChanges: (hostnames) => apiCall('/api/hardware/check-changes', { hostnames }),
        checkHostStatus: (hostnames) => apiCall('/api/hosts/status-check', { hostnames }),
        resolveNetbios: (ip) => apiCall('/api/hosts/resolve-netbios', { ip }),
        resolveHostname: (ip) => apiCall('/api/hosts/resolve-hostname', { ip }),
      };
    })();
  </script>

  <script>
    /* Babel standalone auto-runs inline scripts with data-presets="react",
       but the modern preset emits `import { jsx } from "react/jsx-runtime"`
       which fails in a non-module script. We disable auto-run and invoke
       Babel.transform ourselves with the classic runtime so it emits
       React.createElement calls (which work since React is a global). */

    function compileAndRunApp() {
      const scriptEl = document.getElementById('app-script');
      if (!scriptEl) { console.error('app-script element not found'); return; }
      const code = scriptEl.textContent;
      try {
        const out = Babel.transform(code, {
          presets: [['react', { runtime: 'classic' }]],
        }).code;
        const fn = new Function(out);
        fn();
      } catch (e) {
        console.error('Babel transform/exec error:', e);
        document.getElementById('root').innerHTML =
          '<div style="padding:24px;font-family:monospace;color:#ef4444;background:#0f1117;min-height:100vh">Failed to compile app: ' +
          (e.message || e) + '\n\n' + ((e.stack || '').split('\n').slice(0, 8).join('\n')) +
          '</div>';
      }
    }

    // Wait for Babel to be available before compiling
    function waitForBabel() {
      if (typeof Babel !== 'undefined') {
        compileAndRunApp();
      } else {
        // Retry every 100ms for up to 10 seconds

      {action && <div className="mt-4">{action}</div>}
    </div>
  );

  // ---- PageHeader ----
  const PageHeader = ({ breadcrumb = [], title, subtitle, actions }) => {
    const { navigate } = useApp();
    return (
      <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 mb-4">
        <div className="min-w-0">
          {breadcrumb.length > 0 && (
            <nav className="flex items-center gap-1.5 text-meta text-text-dim mb-1">
              {breadcrumb.map((b, i) => (
                <span key={i} className="flex items-center gap-1.5">
                  {i > 0 && <Icon name="ChevronRight" size={10} />}
                  <span className={i === breadcrumb.length - 1 ? 'text-text-dim' : 'hover:text-text cursor-pointer'} onClick={() => i === 0 && navigate('dashboard')}>{b}</span>
                </span>
              ))}
            </nav>
          )}
          <div className="flex items-center gap-2">
            <button onClick={() => navigate('dashboard')} className="text-text-dim hover:text-primary transition-colors flex-shrink-0" title="Back to Dashboard">
              <Icon name="ArrowLeft" size={16} />
            </button>
            <h1 className="text-lg font-bold text-text leading-tight">{title}</h1>
          </div>
          {subtitle && <p className="text-xs text-text-dim mt-0.5 ml-6">{subtitle}</p>}
        </div>
        {actions && <div className="flex items-center gap-2 flex-wrap flex-shrink-0">{actions}</div>}
      </div>
    );
  };

  // ---- SectionCard ----
  const SectionCard = ({ title, description, actions, children, className = '', bodyClassName = '', closable, onClose, collapsible = true }) => {
    const [collapsed, setCollapsed] = useState(false);
    return (
      <div className={`bg-surface border border-border rounded-lg ${className}`}>
        {(title || actions) && (
          <div className="flex items-center justify-between gap-2 p-3 border-b border-border">
            <div className="flex items-center gap-2 min-w-0 cursor-default">
              {collapsible && (
                <button onClick={() => setCollapsed(c => !c)} className="text-text-dim hover:text-text flex-shrink-0" title={collapsed ? 'Expand' : 'Collapse'}>
                  <Icon name={collapsed ? 'ChevronRight' : 'ChevronDown'} size={14} />
                </button>
              )}
              <div className="min-w-0">
                {title && <h3 className="text-sm font-semibold text-text">{title}</h3>}
                {description && !collapsed && <p className="text-[11px] text-text-dim mt-0.5">{description}</p>}
              </div>
            </div>
            <div className="flex items-center gap-1 flex-shrink-0">
              {actions}
              {closable && <IconButton icon="X" size="sm" onClick={onClose} title="Close" />}
            </div>
          </div>
        )}
        {!collapsed && <div className={`p-3 ${bodyClassName}`}>{children}</div>}
      </div>
    );
  };

  // ---- FormField ----
  const FormField = ({ label, required, error, hint, children, className = '' }) => (
    <div className={`flex flex-col gap-1 ${className}`}>
      {label && (
        <label className="text-meta text-text-dim uppercase font-medium">
          {label}{required && <span className="text-danger ml-0.5">*</span>}
        </label>
      )}
      {children}
      {hint && !error && <span className="text-[11px] text-text-dim">{hint}</span>}
      {error && <span className="text-[11px] text-danger flex items-center gap-1"><Icon name="AlertCircle" size={11} />{error}</span>}
    </div>
  );

  const inputCls = "w-full px-2.5 py-1.5 text-xs bg-surface-raised border border-border rounded text-text placeholder:text-muted focus:border-primary focus:outline-none transition-colors";
  const Input = (props) => <input {...props} className={`${inputCls} ${props.className || ''}`} />;
  const Textarea = (props) => <textarea {...props} className={`${inputCls} font-mono ${props.className || ''}`} />;
  const Select = ({ children, ...props }) => <select {...props} className={`${inputCls} ${props.className || ''}`}>{children}</select>;

  // ---- TabGroup ----
  const TabGroup = ({ tabs, active, onChange, className = '' }) => (
    <div className={`flex items-center gap-1 border-b border-border ${className}`}>
      {tabs.map((t) => (
        <button
          key={t.id}
          onClick={() => onChange(t.id)}
          className={`relative px-3 py-2 text-xs font-medium transition-colors -mb-px border-b-2 ${active === t.id ? 'border-primary text-primary' : 'border-transparent text-text-dim hover:text-text'}`}
        >
          <span className="flex items-center gap-1.5">
            {t.icon && <Icon name={t.icon} size={13} />}
            {t.label}
            {typeof t.badge === 'number' && t.badge > 0 && (
              <span className="ml-1 px-1.5 py-0.5 text-[10px] bg-primary/15 text-primary rounded-full">{t.badge}</span>
            )}
          </span>
        </button>
      ))}
    </div>
  );

  // ---- DataTable: sortable, selectable, paginated ----
  const DataTable = ({ columns, rows, selectable = true, selectedIds = [], onSelectionChange, onRowClick, density = 'default', emptyMessage = 'No data', maxRows, onContextMenu }) => {
    const [sortBy, setSortBy] = useState(null);
    const [sortDir, setSortDir] = useState('asc');
    const [page, setPage] = useState(0);
    const pageSize = maxRows || 25;

    const sortedRows = useMemo(() => {
      if (!sortBy) return rows;
      const sorted = [...rows].sort((a, b) => {
        const av = a[sortBy], bv = b[sortBy];
        if (av == null) return 1;
        if (bv == null) return -1;
        if (typeof av === 'number' && typeof bv === 'number') return av - bv;
        return String(av).localeCompare(String(bv));
      });
      return sortDir === 'asc' ? sorted : sorted.reverse();
    }, [rows, sortBy, sortDir]);

    const pagedRows = sortedRows.slice(page * pageSize, (page + 1) * pageSize);
    const totalPages = Math.ceil(sortedRows.length / pageSize);
    const allSelected = sortedRows.length > 0 && selectedIds.length === sortedRows.length;

    const handleSort = (key) => {
      if (sortBy === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
      else { setSortBy(key); setSortDir('asc'); }
    };

    const toggleAll = () => {
      if (!onSelectionChange) return;
      if (allSelected) onSelectionChange([]);
      else onSelectionChange(sortedRows.map(r => r.id));
    };
    const toggleOne = (id) => {
      if (!onSelectionChange) return;
      if (selectedIds.includes(id)) onSelectionChange(selectedIds.filter(x => x !== id));
      else onSelectionChange([...selectedIds, id]);
    };

    const rowH = density === 'compact' ? 'h-7' : density === 'comfortable' ? 'h-11' : 'h-9';
    const cellPad = density === 'compact' ? 'px-2 py-0.5' : 'px-3 py-1';

    return (
      <div className="flex flex-col">
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-surface-raised border-b border-border">
                {selectable && (
                  <th className={`w-8 ${cellPad}`}>
                    <input type="checkbox" checked={allSelected} onChange={toggleAll} className="accent-primary" />
                  </th>
                )}
                {columns.map((col) => (
                  <th key={col.key} className={`text-left ${cellPad} text-meta text-text-dim uppercase font-semibold whitespace-nowrap ${col.sortable !== false ? 'cursor-pointer hover:text-text' : ''}`} onClick={() => col.sortable !== false && handleSort(col.key)}>
                    {col.headerRender ? col.headerRender() : (
                      <span className="inline-flex items-center gap-1">
                        {col.label}
                        {sortBy === col.key && <Icon name={sortDir === 'asc' ? 'ChevronUp' : 'ChevronDown'} size={11} />}
                      </span>
                    )}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {pagedRows.length === 0 ? (
                <tr><td colSpan={columns.length + (selectable ? 1 : 0)} className="text-center py-8 text-text-dim text-xs">{emptyMessage}</td></tr>
              ) : pagedRows.map((row) => {
                const isSelected = selectedIds.includes(row.id);
                const isOffline = row.onlineStatus === 'offline';
                return (
                  <tr
                    key={row.id}
                    onClick={() => onRowClick && onRowClick(row)}
                    onContextMenu={(e) => { if (onContextMenu) { e.preventDefault(); onContextMenu(e, row); } }}
                    className={`border-b border-border/50 hover:bg-surface-raised transition-colors ${isSelected ? 'bg-primary/5' : ''} ${onRowClick ? 'cursor-pointer' : ''}`}
                    style={isSelected ? { boxShadow: 'inset 2px 0 0 #4f83ff' } : (row._rowColor ? { boxShadow: `inset 3px 0 0 ${row._rowColor}`, background: row._rowColor + '10' } : undefined)}
                    style={isSelected ? { boxShadow: 'inset 2px 0 0 #4f83ff' } : undefined}
                  >
                    {selectable && (
                      <td className={cellPad} onClick={(e) => e.stopPropagation()}>
                        <input type="checkbox" checked={isSelected} onChange={() => toggleOne(row.id)} className="accent-primary" />
                      </td>
                    )}
                    {columns.map((col) => (
                      <td key={col.key} className={`${cellPad} ${col.mono ? 'font-mono' : ''} ${col.className || ''} ${isOffline && col.key !== 'status' ? 'text-text-dim' : 'text-text'}`}>
                        {col.render ? col.render(row) : (row[col.key] ?? '—')}
                      </td>
                    ))}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {totalPages > 1 && (
          <div className="flex items-center justify-between mt-3 px-1">
            <span className="text-meta text-text-dim">
              Showing {page * pageSize + 1}–{Math.min((page + 1) * pageSize, sortedRows.length)} of {sortedRows.length}
            </span>
            <div className="flex items-center gap-1">
              <IconButton icon="ChevronLeft" size="sm" onClick={() => setPage(p => Math.max(0, p - 1))} />
              <span className="text-xs text-text-dim px-2">{page + 1} / {totalPages}</span>
              <IconButton icon="ChevronRight" size="sm" onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} />
            </div>
          </div>
        )}
      </div>
    );
  };

  // ---- FilterBar: search + dropdown filters + active filter chips ----
  const FilterBar = ({ search, onSearchChange, searchPlaceholder = 'Search…', filters = [], activeFilters = {}, onFilterChange, right }) => (
    <div className="flex flex-wrap items-center gap-2 mb-3 p-2.5 bg-surface border border-border rounded-lg">
      <div className="relative flex-1 min-w-[200px]">
        <Icon name="Search" size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-muted" />
        <input
          value={search}
          onChange={(e) => onSearchChange(e.target.value)}
          placeholder={searchPlaceholder}
          className="w-full pl-8 pr-3 py-1.5 text-xs bg-surface-raised border border-border rounded text-text placeholder:text-muted focus:border-primary focus:outline-none"
        />
      </div>
      {filters.map((f) => (
        <select
          key={f.key}
          value={activeFilters[f.key] || ''}
          onChange={(e) => onFilterChange(f.key, e.target.value)}
          className="px-2 py-1.5 text-xs bg-surface-raised border border-border rounded text-text focus:border-primary focus:outline-none"
        >
          <option value="">{f.label}</option>
          {f.options.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      ))}
      {right}
    </div>
  );

  // ---- CodeBlock ----
  const CodeBlock = ({ code, language = 'text', showLineNumbers = true, maxHeight = '300px' }) => {
    const [copied, setCopied] = useState(false);
    const lines = code.split('\n');
    const handleCopy = () => {
      try { navigator.clipboard.writeText(code); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch(e) {}
    };
    return (
      <div className="relative bg-[#0a0c12] border border-border rounded-lg overflow-hidden">
        <div className="flex items-center justify-between px-3 py-1.5 border-b border-border bg-surface">
          <span className="text-meta text-text-dim uppercase">{language}</span>
          <button onClick={handleCopy} className="text-meta text-text-dim hover:text-primary flex items-center gap-1">
            <Icon name={copied ? 'Check' : 'Copy'} size={11} />{copied ? 'Copied' : 'Copy'}
          </button>
        </div>
        <div className="overflow-auto font-mono text-[11px] leading-relaxed" style={{ maxHeight }}>
          <table className="w-full">
            <tbody>
              {lines.map((line, i) => (
                <tr key={i} className="hover:bg-surface/40">
                  {showLineNumbers && <td className="text-right pr-2 pl-3 py-0.5 text-muted select-none w-10">{i + 1}</td>}
                  <td className="py-0.5 pr-3 text-text whitespace-pre-wrap break-all">{line || ' '}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  // ---- Timeline: vertical activity feed ----
  const Timeline = ({ items }) => {
    const resultColor = { success: 'text-success', warning: 'text-warning', error: 'text-danger', info: 'text-info', running: 'text-info' };
    const resultIcon = { success: 'CheckCircle2', warning: 'AlertTriangle', error: 'XCircle', info: 'Info', running: 'Loader2' };
    return (
      <div className="relative pl-4">
        <div className="absolute left-[7px] top-1 bottom-1 w-px bg-border" />
        {items.map((item, i) => (
          <div key={item.id || i} className="relative pb-3 last:pb-0">
            <div className={`absolute -left-4 top-0.5 w-3.5 h-3.5 rounded-full border-2 border-surface flex items-center justify-center ${resultColor[item.result] || 'text-muted'}`}>
              <Icon name={resultIcon[item.result] || 'Circle'} size={8} className={item.result === 'running' ? 'animate-spin' : ''} />
            </div>
            <div className="ml-2">
              <div className="flex items-center gap-2 text-xs">
                <span className="font-medium text-text">{item.actor}</span>
                <span className="text-text-dim">{item.action}</span>
              </div>
              <p className="text-[11px] text-text-dim mt-0.5">{item.targets}</p>
              <span className="text-[10px] text-muted">{fmtRel(item.timestamp)}</span>
            </div>
          </div>
        ))}
      </div>
    );
  };

  // ---- JobStepTracker: vertical stepper ----
  const JobStepTracker = ({ steps, currentStepIndex }) => (
    <div className="relative pl-4">
      <div className="absolute left-[7px] top-1 bottom-1 w-px bg-border" />
      {steps.map((step, i) => {
        const state = i < currentStepIndex ? 'complete' : i === currentStepIndex ? 'running' : 'pending';
        const colorMap = { complete: 'bg-success border-success', running: 'bg-info border-info animate-pulseSoft', pending: 'bg-surface border-border' };
        const iconMap = { complete: 'Check', running: 'Loader2', pending: 'Circle' };
        const textMap = { complete: 'text-text', running: 'text-text font-medium', pending: 'text-text-dim' };
        return (
          <div key={step.id || i} className="relative pb-2.5 last:pb-0">
            <div className={`absolute -left-4 top-0.5 w-3.5 h-3.5 rounded-full border-2 flex items-center justify-center ${colorMap[state]}`}>
              <Icon name={iconMap[state]} size={8} className={state === 'running' ? 'animate-spin text-white' : state === 'complete' ? 'text-white' : 'text-muted'} />
            </div>
            <div className="ml-2">
              <p className={`text-xs ${textMap[state]}`}>{step.label}</p>
              {state === 'running' && <p className="text-[10px] text-info">In progress…</p>}
              {state === 'complete' && <p className="text-[10px] text-success">Completed</p>}
            </div>
          </div>
        );
      })}
    </div>
  );

  // ---- WizardStepper ----
  const WizardStepper = ({ steps, current, onStepClick }) => (
    <div className="flex items-center gap-2 mb-4">
      {steps.map((s, i) => {
        const state = i < current ? 'complete' : i === current ? 'current' : 'pending';
        return (
          <React.Fragment key={i}>
            <button
              disabled={i > current}
              onClick={() => onStepClick && onStepClick(i)}
              className={`flex items-center gap-2 px-2.5 py-1.5 rounded text-xs font-medium transition-colors ${state === 'current' ? 'bg-primary/15 text-primary' : state === 'complete' ? 'text-success' : 'text-text-dim'}`}
            >
              <span className={`inline-flex items-center justify-center w-5 h-5 rounded-full text-[10px] ${state === 'current' ? 'bg-primary text-white' : state === 'complete' ? 'bg-success text-white' : 'bg-surface-raised text-text-dim'}`}>
                {state === 'complete' ? <Icon name="Check" size={10} /> : i + 1}
              </span>
              {s.label || s}
            </button>
            {i < steps.length - 1 && <div className={`flex-1 h-px ${i < current ? 'bg-success' : 'bg-border'}`} />}
          </React.Fragment>
        );
      })}
    </div>
  );

  // ---- Tag color lookup ----
  const tagColor = (name) => {
    const t = HOST_TAGS.find(t => t.name === name);
    return t ? t.color : '#6b7280';
  };

  const TagChip = ({ name }) => {
    const c = tagColor(name);
    return (
      <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium border" style={{ color: c, borderColor: c + '55', background: c + '15' }}>
        {name}
      </span>
    );
  };

  /* ------------------------------------------------------------------------
     CONTEXT MENU — Right-click menu for host rows (like BatchPatch grid)
  ------------------------------------------------------------------------ */
  const ContextMenu = ({ x, y, items, onClose }) => {
    useEffect(() => {
      const handler = () => onClose();
      window.addEventListener('click', handler);
      window.addEventListener('contextmenu', handler);
      return () => { window.removeEventListener('click', handler); window.removeEventListener('contextmenu', handler); };
    }, [onClose]);
    // Adjust position if near edge
    const adjustedX = Math.min(x, window.innerWidth - 220);
    const adjustedY = Math.min(y, window.innerHeight - (items.length * 32 + 20));
    return (
      <div className="context-menu" style={{ left: adjustedX, top: adjustedY }} onClick={(e) => e.stopPropagation()}>
        {items.map((item, i) => {
          if (item.separator) return <div key={i} className="context-menu-separator" />;
          if (item.label) return <div key={i} className="context-menu-label">{item.label}</div>;
          return (
            <div
              key={i}
              className={`context-menu-item ${item.danger ? 'context-menu-item-danger' : ''}`}
              onClick={() => { item.onClick && item.onClick(); onClose(); }}
            >
              {item.icon && <Icon name={item.icon} size={13} />}
              <span>{item.text}</span>
              {item.shortcut && <span className="ml-auto text-[10px] text-muted">{item.shortcut}</span>}
            </div>
          );
        })}
      </div>
    );
  };

  /* ------------------------------------------------------------------------
     ACTION TOOLBAR — BatchPatch-style icon toolbar above the grid
  ------------------------------------------------------------------------ */
  const ActionToolbar = ({ groups }) => (
    <div className="flex items-center flex-wrap gap-0 p-1.5 bg-surface border border-border rounded-lg mb-2 overflow-x-auto">
      {groups.map((group, gi) => (
        <React.Fragment key={gi}>
          {gi > 0 && <div className="toolbar-divider" />}
          {group.label && <span className="toolbar-label">{group.label}</span>}
          <div className="toolbar-group">
            {group.items.map((item, i) => (
              <button
                key={i}
                className={`toolbar-btn ${item.variant === 'danger' ? 'toolbar-btn-danger' : item.variant === 'success' ? 'toolbar-btn-success' : item.variant === 'warning' ? 'toolbar-btn-warning' : ''}`}
                onClick={item.onClick}
                title={item.title || item.label}
                disabled={item.disabled}
              >
                {item.icon && <Icon name={item.icon} size={14} />}
                {item.label}
              </button>
            ))}
          </div>
        </React.Fragment>
      ))}
    </div>
  );

  /* __DESIGN_SYSTEM_END__ */
  /* ========================================================================
     APP SHELL — Header + Sidebar + Drawer + Status Bar
     ====================================================================== */

  // Single source of truth for the app version — update this when bumping versions.
  // Used by the sidebar footer and the status bar so they always match.
  const APP_VERSION = 'v3.3.0';
  const APP_BUILD_DATE = '2026.06.21';

  const NAV_ITEMS = [
    { id: 'dashboard',   label: 'Dashboard',           icon: 'LayoutDashboard' },
    { id: 'inventory',   label: 'Computer Inventory',  icon: 'Server' },
    { id: 'updates',     label: 'Windows Updates',     icon: 'ShieldCheck', badgeKey: 'updates' },
    { id: 'deployments', label: 'Software Deployment', icon: 'Package' },
    { id: 'scripts',     label: 'Scripts & Commands',  icon: 'Terminal' },
    { id: 'services',    label: 'Services',            icon: 'Activity' },
    { id: 'power',       label: 'Power & Wake-on-LAN', icon: 'Power' },
    { id: 'queue',       label: 'Job Queue',           icon: 'ListOrdered', badgeKey: 'jobs' },
    { id: 'scheduler',   label: 'Scheduler',           icon: 'CalendarClock' },
    { id: 'reports',     label: 'Reports & Logs',      icon: 'FileText' },
    { id: 'audit',       label: 'Audit Log',           icon: 'History' },
    { id: 'settings',    label: 'Settings',            icon: 'Settings' },
  ];

  // Global app state context
  const AppCtx = createContext(null);
  const useApp = () => useContext(AppCtx);

  // ---- Top Header (56px) ----
  const TopHeader = ({ onMenuToggle, onLogout, currentUser }) => {
    const { navigate, search, setSearch, hosts, activeJobs, theme, toggleTheme } = useApp();
    const [searchFocused, setSearchFocused] = useState(false);
    const searchRef = useRef(null);
    const [profileOpen, setProfileOpen] = useState(false);
    const [notifOpen, setNotifOpen] = useState(false);

    // Cmd/Ctrl+K to focus search
    useEffect(() => {
      const h = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchRef.current && searchRef.current.focus(); }
        if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); searchRef.current && searchRef.current.focus(); }
      };
      window.addEventListener('keydown', h);
      return () => window.removeEventListener('keydown', h);
    }, []);

    const onlineCount = hosts.filter(h => h.onlineStatus === 'online').length;
    const offlineCount = hosts.filter(h => h.onlineStatus === 'offline').length;
    const runningJobs = activeJobs.filter(j => j.status === 'running').length;

    // Search dropdown results
    const searchResults = useMemo(() => {
      if (!search || search.length < 1) return [];
      const q = search.toLowerCase();
      const hostMatches = hosts.filter(h => h.hostname.toLowerCase().includes(q) || h.ipAddress.includes(q) || h.tags.some(t => t.toLowerCase().includes(q)) || h.site.toLowerCase().includes(q) || h.osName.toLowerCase().includes(q)).slice(0, 5);
      const navMatches = NAV_ITEMS.filter(n => n.label.toLowerCase().includes(q)).slice(0, 3);
      return { hosts: hostMatches, nav: navMatches };
    }, [search, hosts]);

    return (
      <header className="flex items-center justify-between gap-3 px-3 h-14 bg-surface border-b border-border flex-shrink-0">
        {/* Left: Logo + Name — clicking the logo navigates to the dashboard */}
        <div className="flex items-center gap-2">
          <IconButton icon="Menu" onClick={onMenuToggle} title="Toggle sidebar" />
          <button
            onClick={() => navigate('dashboard')}
            title="Go to Dashboard"
            className="flex items-center gap-2 hover:opacity-80 transition-opacity rounded"
          >
            <div className="w-8 h-8 rounded-md bg-primary flex items-center justify-center">
              <Icon name="Grid3x3" size={18} className="text-white" />
            </div>
            <div className="hidden sm:block text-left">
              <div className="text-sm font-bold text-text leading-tight">SupportHubLAN</div>
              <div className="text-[10px] text-text-dim leading-tight">Windows Endpoint Administration</div>
            </div>
          </button>
        </div>

        {/* Center: Global Search — hidden on very small screens to prevent cramping */}
        <div className="flex-1 max-w-xl relative hidden sm:block">
          <Icon name="Search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-muted" />

                        <div className="text-xs font-mono text-text truncate">{h.hostname}</div>

            {notifOpen && (
              <>
                <div className="fixed inset-0 z-40" onClick={() => setNotifOpen(false)} />
                <div className="absolute right-0 top-full mt-1 w-80 bg-surface border border-border rounded-lg shadow-raised z-50">

                    <span className="text-xs font-semibold text-text">Notifications</span>
                    <button onClick={() => { setNotifOpen(false); toast.success('All notifications marked as read'); }} className="text-meta text-primary hover:underline">Mark all read</button>

                  <div className="max-h-72 overflow-y-auto">

              <div className="w-7 h-7 rounded-full bg-primary/20 border border-primary/40 flex items-center justify-center text-xs font-semibold text-primary">{(currentUser?.username || 'A').charAt(0).toUpperCase()}</div>

                <div className="absolute right-0 top-full mt-1 w-56 bg-surface border border-border rounded-lg shadow-raised z-50">
                  <div className="p-2.5 border-b border-border">
                    <div className="text-xs font-semibold text-text">{currentUser?.username || 'admin'}</div>
                    <div className="mt-1"><Badge color="primary">{currentUser?.role || 'Admin'}</Badge></div>
                  </div>
                  <div className="py-1">
                    <button onClick={() => navigate('settings')} className="w-full flex items-center gap-2 px-3 py-1.5 text-xs text-text hover:bg-surface-raised"><Icon name="Settings" size={13} /> Settings</button>
                    <button onClick={() => { toggleTheme(); }} className="w-full flex items-center gap-2 px-3 py-1.5 text-xs text-text hover:bg-surface-raised"><Icon name={theme === 'dark' ? 'Sun' : 'Moon'} size={13} /> {theme === 'dark' ? 'Switch to Light mode' : 'Switch to Dark mode'}</button>
                  </div>
                  <div className="py-1 border-t border-border">
                    <button onClick={() => { setProfileOpen(false); onLogout && onLogout(); }} className="w-full flex items-center gap-2 px-3 py-1.5 text-xs text-danger hover:bg-danger/10"><Icon name="LogOut" size={13} /> Sign out</button>
                  </div>

  // ---- Left Sidebar (220px collapsible) ----
  const Sidebar = ({ collapsed, onNavigate, fullWidth = false }) => {
    const { route, navigate, hosts, activeJobs } = useApp();
    const updatesBadge = hosts.filter(h => h.patchState === 'updates-available' || h.patchState === 'critical').length;
    const jobsBadge = activeJobs.filter(j => j.status === 'running' || j.status === 'queued').length;
    const badges = { updates: updatesBadge, jobs: jobsBadge };
    // fullWidth = true when rendered inside the mobile drawer (parent sets the width)
    const widthClass = fullWidth ? 'w-full' : (collapsed ? 'w-14' : 'w-56');
    return (
      <aside className={`flex flex-col bg-surface border-r border-border transition-all duration-200 flex-shrink-0 ${widthClass}`}>
        <nav className="flex-1 overflow-y-auto py-2">
          {NAV_ITEMS.map((item, idx) => {
            const active = route.page === item.id;
            const badge = item.badgeKey ? badges[item.badgeKey] : 0;
            return (
              <button
                key={item.id}
                onClick={() => { navigate(item.id); onNavigate && onNavigate(); }}
                title={collapsed ? item.label : undefined}
                className={`relative w-full flex items-center gap-2.5 px-3 py-2 text-xs font-medium transition-colors ${active ? 'bg-primary/10 text-primary' : 'text-text-dim hover:bg-surface-raised hover:text-text'}`}
                style={active ? { boxShadow: 'inset 2px 0 0 #4f83ff' } : undefined}
              >
                <Icon name={item.icon} size={18} className="flex-shrink-0" />
                {!collapsed && (
                  <>
                    <span className="flex-1 text-left truncate">{item.label}</span>
                    {badge > 0 && <span className={`px-1.5 py-0.5 text-[10px] rounded-full ${active ? 'bg-primary text-white' : 'bg-warning/15 text-warning'}`}>{badge}</span>}
                  </>
                )}
                {collapsed && badge > 0 && (
                  <span className="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-warning rounded-full" />
                )}
              </button>
            );
          })}
        </nav>
        {!collapsed && (
          <div className="p-3 border-t border-border">
            <div className="text-meta text-text-dim uppercase mb-1">Version</div>
            <div className="text-xs text-text">SupportHubLAN {APP_VERSION}</div>
            <div className="text-[10px] text-text-dim">Build {APP_BUILD_DATE}</div>
          </div>
        )}
      </aside>
    );
  };

  // ---- Right Drawer (380px) for host/job detail ----
  const RightDrawer = ({ open, onClose, kind, data }) => {
    const { navigate } = useApp();
    const [tab, setTab] = useState('overview');
    useEffect(() => { setTab('overview'); }, [data?.id]);
    useEffect(() => {
      const h = (e) => { if (e.key === 'Escape' && open) onClose(); };
      window.addEventListener('keydown', h);
      return () => window.removeEventListener('keydown', h);
    }, [open, onClose]);
    if (!open || !data) return null;
    const host = kind === 'host' ? data : null;
    const job = kind === 'job' ? data : null;

    let tabs = [];
    if (host) tabs = [
      { id: 'overview', label: 'Overview', icon: 'Info' },
      { id: 'updates', label: 'Updates', icon: 'ShieldCheck' },
      { id: 'deployments', label: 'Deployments', icon: 'Package' },
      { id: 'jobs', label: 'Jobs', icon: 'ListOrdered' },
      { id: 'services', label: 'Services', icon: 'Activity' },
      { id: 'processes', label: 'Processes', icon: 'Cpu' },
      { id: 'logs', label: 'Event Logs', icon: 'FileText' },
      { id: 'network', label: 'Network', icon: 'Network' },
      { id: 'apps', label: 'Installed Apps', icon: 'Boxes' },
      { id: 'remote', label: 'Remote', icon: 'Monitor' },
      { id: 'audit', label: 'Audit Trail', icon: 'History' },
    ];
    if (job) tabs = [
      { id: 'overview', label: 'Overview', icon: 'Info' },
      { id: 'steps', label: 'Steps', icon: 'ListOrdered' },
      { id: 'hosts', label: 'Hosts', icon: 'Server' },
      { id: 'log', label: 'Live Log', icon: 'Terminal' },
    ];

    return (
      <>
        <div className="fixed inset-0 bg-black/40 z-30 animate-fadeIn" onClick={onClose} />
        <aside className="fixed right-0 top-0 bottom-0 w-[380px] bg-surface border-l border-border z-40 flex flex-col animate-slideIn">
          {/* Header */}
          <div className="flex items-center justify-between p-3 border-b border-border">
            <div className="min-w-0">
              <div className="text-meta text-text-dim uppercase">{kind === 'host' ? 'Host Detail' : 'Job Detail'}</div>
              <div className="text-sm font-semibold text-text font-mono truncate">{host ? host.hostname : job.name}</div>
            </div>
            <IconButton icon="X" onClick={onClose} title="Close (Esc)" />
          </div>

          {/* Tabs */}
          <div className="flex items-center gap-1 px-2 border-b border-border overflow-x-auto">
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} className={`flex items-center gap-1.5 px-2.5 py-2 text-[11px] font-medium whitespace-nowrap border-b-2 -mb-px ${tab === t.id ? 'border-primary text-primary' : 'border-transparent text-text-dim hover:text-text'}`}>
                <Icon name={t.icon} size={12} />{t.label}
              </button>
            ))}
          </div>

          {/* Body */}
          <div className="flex-1 overflow-y-auto p-3">
            {host && <HostDrawerTab tab={tab} host={host} />}
            {job && <JobDrawerTab tab={tab} job={job} />}
          </div>
        </aside>
      </>
    );
  };

  // ---- Right Drawer INLINE (flexbox sibling, not fixed) — used in v1.4.2+
  // Desktop (lg+): 380px flexbox sibling of the workspace column.
  //   The workspace (incl. terminal panel) shrinks to make room. Both visible side-by-side.
  // Mobile (<lg): full-screen overlay (fixed position) that stops ABOVE the terminal panel.
  //   The terminal stays visible at the bottom. The drawer scrolls independently.
  const RightDrawerInline = ({ open, kind, data }) => {
    const { navigate, closeDrawer } = useApp();
    const [tab, setTab] = useState('overview');
    // Track terminal height so the mobile drawer can stop above it
    const [termHeight, setTermHeight] = useState(() => { try { return parseInt(localStorage.getItem('supporthublan:terminal-height') || '80', 10); } catch { return 80; } });
    useEffect(() => { setTab('overview'); }, [data?.id]);
    useEffect(() => {
      const h = (e) => { if (e.key === 'Escape' && open) closeDrawer(); };
      window.addEventListener('keydown', h);
      return () => window.removeEventListener('keydown', h);
    }, [open, closeDrawer]);
    // Listen for terminal height changes
    useEffect(() => {
      const h = () => { try { setTermHeight(parseInt(localStorage.getItem('supporthublan:terminal-height') || '80', 10)); } catch {} };
      window.addEventListener('storage', h);
      const interval = setInterval(h, 500); // poll for changes from the TerminalPanel
      return () => { window.removeEventListener('storage', h); clearInterval(interval); };
    }, []);
    if (!open || !data) return null;
    const host = kind === 'host' ? data : null;
    const job = kind === 'job' ? data : null;

    let tabs = [];
    if (host) tabs = [
      { id: 'overview', label: 'Overview', icon: 'Info' },
      { id: 'updates', label: 'Updates', icon: 'ShieldCheck' },
      { id: 'deployments', label: 'Deployments', icon: 'Package' },
      { id: 'jobs', label: 'Jobs', icon: 'ListOrdered' },
      { id: 'services', label: 'Services', icon: 'Activity' },
      { id: 'processes', label: 'Processes', icon: 'Cpu' },
      { id: 'logs', label: 'Event Logs', icon: 'FileText' },
      { id: 'network', label: 'Network', icon: 'Network' },
      { id: 'apps', label: 'Installed Apps', icon: 'Boxes' },
      { id: 'audit', label: 'Audit Trail', icon: 'History' },
    ];
    if (job) tabs = [
      { id: 'overview', label: 'Overview', icon: 'Info' },
      { id: 'steps', label: 'Steps', icon: 'ListOrdered' },
      { id: 'hosts', label: 'Hosts', icon: 'Server' },
      { id: 'log', label: 'Live Log', icon: 'Terminal' },
    ];

    const headerAndTabs = (
      <>
        <div className="flex items-center justify-between p-3 border-b border-border">
          <div className="min-w-0 flex items-center gap-2">
            <IconButton icon="ChevronRight" onClick={closeDrawer} title="Close (Esc)" className="lg:hidden" />
            <div className="min-w-0">
              <div className="text-meta text-text-dim uppercase">{kind === 'host' ? 'Host Detail' : 'Job Detail'}</div>
              <div className="text-sm font-semibold text-text font-mono truncate">{host ? host.hostname : job.name}</div>
            </div>
          </div>
          <IconButton icon="X" onClick={closeDrawer} title="Close (Esc)" className="hidden lg:flex" />
        </div>
        <div className="flex items-center gap-1 px-2 border-b border-border overflow-x-auto">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`flex items-center gap-1.5 px-2.5 py-2 text-[11px] font-medium whitespace-nowrap border-b-2 -mb-px ${tab === t.id ? 'border-primary text-primary' : 'border-transparent text-text-dim hover:text-text'}`}>
              <Icon name={t.icon} size={12} />{t.label}
            </button>
          ))}
        </div>
      </>
    );

    const body = (
      <div className="flex-1 overflow-y-auto p-3">
        {host && <HostDrawerTab tab={tab} host={host} />}
        {job && <JobDrawerTab tab={tab} job={job} />}
      </div>
    );

    return (
      <>
        {/* Mobile (<lg): fixed overlay that stops ABOVE the terminal panel.
            Terminal height is read from localStorage and used as the bottom offset.
            This way the terminal stays visible at the bottom while the drawer covers the workspace. */}
        <aside className="lg:hidden fixed left-0 right-0 bg-surface border-t border-border flex flex-col animate-slideIn"
               style={{ top: '56px', bottom: termHeight + 'px', zIndex: 30 }}>
          {headerAndTabs}
          {body}
        </aside>

        {/* Desktop (lg+): 380px flexbox sibling — workspace shrinks to make room */}
        <aside className="hidden lg:flex w-[380px] bg-surface border-l border-border flex-col flex-shrink-0 animate-slideIn">
          {headerAndTabs}
          {body}
        </aside>
      </>
    );
  };

  // Host drawer tab content
  const HostDrawerTab = ({ tab, host }) => {
    const { activeJobs, hosts, updateHosts, addJob, appendAudit, executePowerAction } = useApp();
    // Always read the freshest version of this host from state (so drawer updates after mutations)
    const liveHost = hosts.find(h => h.id === host.id) || host;
    if (tab === 'overview') {
      const hw = liveHost._hardwareInfo;
      return (
        <div className="space-y-3">
          <div className="flex items-center gap-2">
            <StatusBadge variant={liveHost.onlineStatus} />
            <StatusBadge variant={liveHost.patchState} />
            {liveHost.pendingReboot && <StatusBadge variant="reboot-pending" />}
          </div>

          {/* Basic info */}
          <div className="grid grid-cols-2 gap-2 text-xs">
            {[
              ['Hostname', liveHost.hostname, true], ['FQDN', liveHost.fqdn, true],
              ['IP Address', liveHost.ipAddress, true], ['MAC Address', liveHost.macAddress, true],
              ['OS', liveHost.osName], ['OS Build', liveHost.osBuild],
              ['Site', liveHost.site], ['Department', liveHost.department],
              ['Owner', liveHost.owner], ['Tags', liveHost.tags.map(t => <TagChip key={t} name={t} />)],
            ].map(([label, value, mono], i) => (
              <div key={i} className={label === 'Tags' ? 'col-span-2' : ''}>
                <div className="text-meta text-text-dim uppercase">{label}</div>
                <div className={`text-text ${mono ? 'font-mono' : ''} ${label === 'Tags' ? 'flex flex-wrap gap-1 mt-1' : ''}`}>{value || '—'}</div>
              </div>
            ))}
          </div>

          {/* Full hardware info (if available) */}
          {hw ? (
            <div className="space-y-2">
              <div className="text-meta text-text-dim uppercase">Hardware Details</div>

              {/* System */}
              <div className="p-2 bg-surface-raised rounded border border-border">
                <div className="text-[10px] font-semibold text-text mb-1">System</div>
                <div className="grid grid-cols-2 gap-1 text-[10px]">
                  <div><span className="text-text-dim">Manufacturer:</span> <span className="text-text">{hw.system?.manufacturer || '—'}</span></div>
                  <div><span className="text-text-dim">Model:</span> <span className="text-text">{hw.system?.model || '—'}</span></div>
                  <div><span className="text-text-dim">Serial:</span> <span className="text-text font-mono">{hw.system?.serial || '—'}</span></div>
                  <div><span className="text-text-dim">BIOS:</span> <span className="text-text">{hw.system?.biosVersion || '—'}</span></div>
                  <div><span className="text-text-dim">Domain:</span> <span className="text-text">{hw.system?.domain || '—'}</span></div>
                  <div><span className="text-text-dim">Managed by:</span> <span className="text-text">{hw.managedBy || '—'}</span></div>
                </div>
              </div>

              {/* Processors */}
              {hw.processors && hw.processors.length > 0 && (
                <div className="p-2 bg-surface-raised rounded border border-border">
                  <div className="text-[10px] font-semibold text-text mb-1">Processors ({hw.processors.length})</div>
                  {hw.processors.map((cpu, i) => (
                    <div key={i} className="text-[10px] space-y-0.5">
                      <div><span className="text-text">{cpu.name}</span></div>
                      <div className="text-text-dim">{cpu.manufacturer} · {cpu.cores}C/{cpu.logicalCores}T · {cpu.maxSpeedMHz}MHz · {cpu.socket || 'N/A'}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Memory */}
              {hw.memory && hw.memory.length > 0 && (
                <div className="p-2 bg-surface-raised rounded border border-border">
                  <div className="text-[10px] font-semibold text-text mb-1">Memory ({hw.memory.length} sticks, {hw.memory.reduce((s, m) => s + (m.capacity || 0), 0)} GB total)</div>
                  {hw.memory.map((ram, i) => (
                    <div key={i} className="text-[10px] text-text-dim">
                      {ram.capacity}GB · {ram.manufacturer || 'Unknown'} · {ram.partNumber || 'N/A'} · {ram.speed}MHz · {ram.deviceLocator || 'N/A'}
                    </div>
                  ))}
                </div>
              )}

              {/* Disks */}
              {hw.disks && hw.disks.length > 0 && (
                <div className="p-2 bg-surface-raised rounded border border-border">
                  <div className="text-[10px] font-semibold text-text mb-1">Disk Drives ({hw.disks.length})</div>
                  {hw.disks.map((disk, i) => (
                    <div key={i} className="text-[10px] text-text-dim">
                      {disk.model} · {disk.sizeGB}GB · {disk.interface || 'N/A'} · FW: {disk.firmware || 'N/A'} · SN: {disk.serialNumber || 'N/A'}
                    </div>
                  ))}
                </div>
              )}

              {/* Logical Disks */}
              {hw.logicalDisks && hw.logicalDisks.length > 0 && (
                <div className="p-2 bg-surface-raised rounded border border-border">
                  <div className="text-[10px] font-semibold text-text mb-1">Partitions</div>
                  {hw.logicalDisks.map((ld, i) => (
                    <div key={i} className="text-[10px] text-text-dim">
                      {ld.drive} · {ld.sizeGB}GB ({ld.freeGB}GB free) · {ld.fileSystem || 'N/A'} · {ld.volumeName || 'N/A'}
                    </div>
                  ))}
                </div>
              )}

              {/* CD/DVD */}
              {hw.cdDvd && hw.cdDvd.length > 0 && (
                <div className="p-2 bg-surface-raised rounded border border-border">
                  <div className="text-[10px] font-semibold text-text mb-1">CD/DVD Drives ({hw.cdDvd.length})</div>
                  {hw.cdDvd.map((cd, i) => (
                    <div key={i} className="text-[10px] text-text-dim">{cd.name} · {cd.manufacturer || 'N/A'}</div>
                  ))}
                </div>
              )}

              {/* GPU */}
              {hw.gpu && hw.gpu.length > 0 && (
                <div className="p-2 bg-surface-raised rounded border border-border">
                  <div className="text-[10px] font-semibold text-text mb-1">Graphics ({hw.gpu.length})</div>
                  {hw.gpu.map((g, i) => (
                    <div key={i} className="text-[10px] text-text-dim">
                      {g.name} · {g.manufacturer || 'N/A'} · {g.ramMB}MB · Driver: {g.driverVersion || 'N/A'} · {g.resolution || 'N/A'}
                    </div>
                  ))}
                </div>
              )}

              {/* Network */}
              {hw.network && hw.network.length > 0 && (
                <div className="p-2 bg-surface-raised rounded border border-border">
                  <div className="text-[10px] font-semibold text-text mb-1">Network Adapters ({hw.network.length})</div>

  const DonutChart = ({ segments, size = 160, thickness = 22, centerLabel, centerSub }) => {
    const total = segments.reduce((s, x) => s + x.value, 0) || 1;
    const radius = (size - thickness) / 2;
    const circumference = 2 * Math.PI * radius;
    let offset = 0;
    const colors = { success: '#22c55e', warning: '#f59e0b', danger: '#ef4444', info: '#38bdf8', muted: '#6b7280' };
    return (
      <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
        <svg width={size} height={size} className="-rotate-90">
          <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#2e3347" strokeWidth={thickness} />
          {segments.map((seg, i) => {
            const len = (seg.value / total) * circumference;
            const el = (
              <circle
                key={i}
                cx={size/2} cy={size/2} r={radius}
                fill="none"
                stroke={colors[seg.color] || seg.color}
                strokeWidth={thickness}
                strokeDasharray={`${len} ${circumference - len}`}
                strokeDashoffset={-offset}
                strokeLinecap="butt"
              />
            );
            offset += len;
            return el;
          })}
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div className="text-xl font-bold text-text tnum">{centerLabel}</div>

        </div>
      </div>
    );
