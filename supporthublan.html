                  <FormField label="Script / Command">
                    <Textarea rows={10} value={code} onChange={e => setCode(e.target.value)} className="font-mono text-[12px]" />
                  </FormField>
                  <div className="grid grid-cols-2 gap-2">
                    <FormField label="Output Handling"><Select defaultValue="both"><option value="both">Capture stdout + stderr</option><option value="stdout">stdout only</option><option value="discard">Discard</option></Select></FormField>
                    <FormField label="Environment Variables"><Input placeholder="KEY=VALUE, KEY2=VALUE2" className="font-mono text-[10px]" /></FormField>
                  </div>
                  <div className="flex gap-2 pt-2">
                    <ActionButton variant="primary" icon="Play" onClick={handleRun} disabled={running}>{running ? 'Running…' : 'Run Now'}</ActionButton>
                    <ActionButton variant="secondary" icon="ListOrdered">Add to Queue</ActionButton>
                    <ActionButton variant="secondary" icon="CalendarClock">Schedule</ActionButton>
                    <ActionButton variant="secondary" icon="Save">Save as Command</ActionButton>
                  </div>
                </div>
              </SectionCard>

              {showOutput && (
                <SectionCard title="Execution Output" description={running ? `Running on ${selectedTargets.length} hosts…` : `${outputResults?.length || 0} of ${selectedTargets.length} hosts · ${language}`} actions={<IconButton icon="X" size="sm" onClick={() => setShowOutput(false)} />}>
                  <div className="space-y-2">
                    {running && (
                      <div className="flex items-center gap-2 p-3 bg-info/10 border border-info/30 rounded text-xs text-info">
                        <Icon name="Loader2" size={14} className="animate-spin" />
                        Executing on {selectedTargets.length} hosts…

                { key: 'usageCount', label: 'Runs', render: r => <span className="tnum">{r.usageCount}</span> },
                { key: 'lastRun', label: 'Last Run', render: r => <span className="text-text-dim">{fmtRel(r.lastRun)}</span> },
                { key: 'tags', label: 'Tags', render: r => <div className="flex flex-wrap gap-1">{r.tags.map(t => <TagChip key={t} name={t} />)}</div> },
                { key: 'actions', label: 'Actions', render: (r) => (

                      setLanguage(r.language);
                      setCode(r.code);
                      setActiveTab('run');

                    <IconButton icon="Edit" size="sm" title="Edit" onClick={() => {

              ]}
              rows={savedCommands.map(c => ({...c, id: c.id}))}
              onRowClick={() => {}}
              maxRows={15}
            />
          </SectionCard>
        )}

        {activeTab === 'history' && (
          <SectionCard bodyClassName="p-0">
            <DataTable
              columns={[
                { key: 'startedAt', label: 'Timestamp', render: r => <span className="text-text-dim">{fmtRel(r.startedAt)}</span> },
                { key: 'commandName', label: 'Command' },
                { key: 'runBy', label: 'Run By', render: r => <span className="font-mono text-text-dim">{r.runBy}</span> },
                { key: 'hostIds', label: 'Targets', render: r => <span className="tnum">{r.hostIds.length}</span> },
                { key: 'status', label: 'Status', render: r => <StatusBadge variant={r.status} size="xs" /> },
                { key: 'exitCode', label: 'Exit', render: r => <span className={`tnum font-mono ${r.exitCode === 0 ? 'text-success' : 'text-danger'}`}>{r.exitCode}</span> },
                { key: 'duration', label: 'Duration' },
                { key: 'actions', label: 'Actions', render: () => <IconButton icon="Eye" size="sm" title="View Output" onClick={() => setActiveTab('output')} /> },
              ]}
              rows={COMMAND_HISTORY.map(c => ({...c, id: c.id, status: c.status}))}
              onRowClick={() => {}}
              maxRows={15}
            />
          </SectionCard>
        )}

        {activeTab === 'output' && (
          <SectionCard title="Output Viewer" description="Side-by-side output comparison for multi-host runs" actions={<div className="flex gap-1"><ActionButton variant="ghost" size="xs" icon="Copy">Copy All</ActionButton><ActionButton variant="ghost" size="xs" icon="Download">Download .txt</ActionButton></div>}>
            {outputResults ? (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                {outputResults.slice(0, 6).map(r => (
                  <div key={r.hostId} className="border border-border rounded overflow-hidden">
                    <div className="flex items-center justify-between p-2 bg-surface-raised">
                      <span className="font-mono text-xs text-text">{r.hostname}</span>
                      <Badge color={r.exitCode === 0 ? 'success' : 'danger'}>exit {r.exitCode}</Badge>

  /* ========================================================================
     SCREEN 06 — SERVICES & PROCESSES
     ====================================================================== */

  const ServicesScreen = () => {
    const toast = useToast();
    const { hosts, appendAudit } = useApp();
    const [activeTab, setActiveTab] = useState('services');
    const [selectedTargets, setSelectedTargets] = useState(['h01']);
    const [serviceSearch, setServiceSearch] = useState('');
    const [fleetSearchQuery, setFleetSearchQuery] = useState('');
    const [fleetSearchResults, setFleetSearchResults] = useState(null);

    // Fleet search: query all hosts for a service/process by name
    const doFleetSearch = () => {
      const q = fleetSearchQuery.trim().toLowerCase();
      if (!q) { toast.warning('Enter a service or process name to search.'); return; }
      toast.info(`Searching fleet for "${fleetSearchQuery}"…`);
      // Simulate a fleet-wide query: ~60% of online hosts "have" the service running
      const results = hosts.filter(h => h.onlineStatus === 'online').map(h => {
        const found = Math.random() < 0.6;
        return {
          id: h.id,
          hostname: h.hostname,
          found,
          status: found ? 'Running' : 'Not running',
          details: found ? `PID ${Math.floor(Math.random() * 9000) + 1000} · ${(Math.random() * 15).toFixed(1)}% CPU${h.loggedOnUsers.length > 0 ? ' · user: ' + h.loggedOnUsers[0] : ''}` : 'Process not found',
        };
      });
      setFleetSearchResults(results);
      const foundCount = results.filter(r => r.found).length;
      appendAudit({ action: 'services.fleet-search', actionCategory: 'Scripts', targetType: 'Host', targetIds: results.map(r => r.id), parameters: { query: fleetSearchQuery, foundCount, totalSearched: results.length }, result: 'success' });
      toast.success(`Searched ${results.length} hosts — "${fleetSearchQuery}" found on ${foundCount}.`);
    };

    // Stateful service list — Start/Stop/Restart mutates this
    const [services, setServices] = useState([
      { name: 'wuauserv', display: 'Windows Update', status: 'Running', startType: 'Manual', pid: 1234, logOnAs: 'LocalSystem' },
      { name: 'BITS', display: 'Background Intelligent Transfer Service', status: 'Running', startType: 'Automatic', pid: 892, logOnAs: 'LocalSystem' },
      { name: 'Spooler', display: 'Print Spooler', status: 'Stopped', startType: 'Automatic', pid: null, logOnAs: 'LocalSystem' },
      { name: 'WinRM', display: 'Windows Remote Management (WS-Management)', status: 'Running', startType: 'Automatic', pid: 4, logOnAs: 'NetworkService' },
      { name: 'MSSQLSERVER', display: 'SQL Server', status: 'Running', startType: 'Automatic', pid: 1024, logOnAs: '.\\MSSQL' },
      { name: 'W3SVC', display: 'World Wide Web Publishing Service', status: 'Running', startType: 'Automatic', pid: 2048, logOnAs: 'LocalSystem' },
    ]);
    const [processes, setProcesses] = useState([
      { pid: 4, name: 'System', cpu: 1.2, mem: 0.5, user: 'SYSTEM', startTime: '2026-05-03 08:14' },
      { pid: 512, name: 'svchost.exe', cpu: 0.4, mem: 24, user: 'SYSTEM', startTime: '2026-05-03 08:14' },
      { pid: 1024, name: 'sqlservr.exe', cpu: 12.5, mem: 4520, user: 'MSSQL', startTime: '2026-05-03 08:15' },
      { pid: 2048, name: 'chrome.exe', cpu: 4.2, mem: 580, user: 'a.garcia', startTime: '2026-06-20 06:30' },
      { pid: 3072, name: 'w3wp.exe', cpu: 8.1, mem: 1240, user: 'IIS_IUSRS', startTime: '2026-06-13 06:00' },
      { pid: 4096, name: 'explorer.exe', cpu: 0.8, mem: 95, user: 'a.garcia', startTime: '2026-06-20 06:30' },
    ]);

    const targetHost = hosts.find(h => h.id === selectedTargets[0]);

    const setServiceStatus = (name, status) => {
      setServices(prev => prev.map(s => s.name === name ? {
        ...s,
        status,
        pid: status === 'Running' ? Math.floor(Math.random() * 9000) + 1000 : null,
      } : s));
    };

    const startService = async (s) => {
      setServiceStatus(s.name, 'Running');
      appendAudit({ action: 'service.start', actionCategory: 'Scripts', targetType: 'Host', targetIds: selectedTargets, parameters: { serviceName: s.name, host: targetHost?.hostname }, result: 'success' });
      toast.success(`Started ${s.name} on ${targetHost?.hostname || 'host'}`);
      if (window.SupportHubLANAPI && targetHost) {
        const result = await window.SupportHubLANAPI.serviceAction(targetHost.hostname, s.name, 'start', null);
        if (result.success && !result.demo) { toast.success(`Real: Started ${s.name} on ${targetHost.hostname}`); }
      }
    };
    const stopService = async (s) => {
      setServiceStatus(s.name, 'Stopped');
      appendAudit({ action: 'service.stop', actionCategory: 'Scripts', targetType: 'Host', targetIds: selectedTargets, parameters: { serviceName: s.name, host: targetHost?.hostname }, result: 'success' });
      toast.warning(`Stopped ${s.name} on ${targetHost?.hostname || 'host'}`);
      if (window.SupportHubLANAPI && targetHost) {
        const result = await window.SupportHubLANAPI.serviceAction(targetHost.hostname, s.name, 'stop', null);
        if (result.success && !result.demo) { toast.success(`Real: Stopped ${s.name} on ${targetHost.hostname}`); }
      }
    };
    const restartService = (s) => {
      setServiceStatus(s.name, 'Stopped');
      setTimeout(() => setServiceStatus(s.name, 'Running'), 800);
      appendAudit({ action: 'service.restart', actionCategory: 'Scripts', targetType: 'Host', targetIds: selectedTargets, parameters: { serviceName: s.name, host: targetHost?.hostname }, result: 'success' });
      toast.info(`Restarting ${s.name} on ${targetHost?.hostname || 'host'}…`);
    };
    const killProcess = async (p) => {
      setProcesses(prev => prev.filter(x => x.pid !== p.pid));
      appendAudit({ action: 'process.kill', actionCategory: 'Scripts', targetType: 'Host', targetIds: selectedTargets, parameters: { pid: p.pid, name: p.name, host: targetHost?.hostname }, result: 'success' });
      toast.warning(`Killed PID ${p.pid} (${p.name}) on ${targetHost?.hostname || 'host'}`);
      if (window.SupportHubLANAPI && targetHost) {
        const result = await window.SupportHubLANAPI.killProcess(targetHost.hostname, p.pid, p.name, null);
        if (result.success && !result.demo) { toast.success(`Real: Killed PID ${p.pid} on ${targetHost.hostname}`); }
      }
    };

    const filteredServices = services.filter(s => !serviceSearch || s.name.toLowerCase().includes(serviceSearch.toLowerCase()) || s.display.toLowerCase().includes(serviceSearch.toLowerCase()));

    return (

  const PowerScreen = () => {
    const toast = useToast();
    const { hosts, updateHosts, executePowerAction, appendAudit, maintenanceWindows, addMaintenanceWindow, removeMaintenanceWindow } = useApp();
    const [activeTab, setActiveTab] = useState('actions');
    const [selectedTargets, setSelectedTargets] = useState([]);
    const [confirm, setConfirm] = useState(null);
    const [pingTiles, setPingTiles] = useState({});

    // Animate ping tiles on availability tab
    useEffect(() => {
      if (activeTab !== 'availability') return;
      const interval = setInterval(() => {
        setPingTiles(tiles => {
          const next = { ...tiles };
          hosts.slice(0, 12).forEach(h => {
            const isOnline = h.onlineStatus === 'online';
            // small chance to flip
            const cur = next[h.id] ?? isOnline;
            if (Math.random() < 0.05) next[h.id] = !cur;
            else next[h.id] = cur;
          });
          return next;
        });
      }, 2000);
      return () => clearInterval(interval);
    }, [activeTab, hosts]);

    const actions = [
      { id: 'reboot', label: 'Reboot', icon: 'Power', desc: 'Standard remote reboot with monitoring', destructive: false },
      { id: 'shutdown', label: 'Shutdown', icon: 'PowerOff', desc: 'Remote shutdown, with monitoring', destructive: false },
      { id: 'soft-restart', label: 'Soft Restart', icon: 'RotateCw', desc: 'Graceful restart with grace period warning', destructive: false },
      { id: 'force-reboot', label: 'Force Reboot', icon: 'Zap', desc: 'Bypass graceful shutdown (destructive)', destructive: true },
      { id: 'abort-reboot', label: 'Abort Pending Reboot', icon: 'X', desc: 'Cancel a scheduled/pending reboot', destructive: false },
      { id: 'check-pending', label: 'Check Reboot Pending', icon: 'HelpCircle', desc: 'Query each host\'s pending reboot flag', destructive: false },
    ];

    return (
      <div className="space-y-3">
        <PageHeader
          breadcrumb={['supporthublan', 'Power & Wake']}
          title="Power Management & Wake-on-LAN"
          subtitle="Reboot, shutdown, and wake endpoints safely with monitoring"
        />

        <TabGroup
          tabs={[
            { id: 'actions', label: 'Actions', icon: 'Power' },
            { id: 'wol', label: 'Wake on LAN', icon: 'Wifi' },
            { id: 'availability', label: 'Availability Monitor', icon: 'Activity' },
            { id: 'maintenance', label: 'Maintenance Windows', icon: 'Clock' },
          ]}
          active={activeTab}
          onChange={setActiveTab}
        />

        {activeTab === 'actions' && (
          <div className="grid grid-cols-1 lg:grid-cols-4 gap-3">

              <HostSelector selected={selectedTargets} onChange={setSelectedTargets} />
            </SectionCard>

            <div className="lg:col-span-3 space-y-3">
              <SectionCard title="Power Actions" description="Each action requires confirmation with host count">
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                  {actions.map(a => (
                    <button key={a.id} onClick={() => setConfirm(a)} className={`flex flex-col items-start gap-1.5 p-3 rounded-lg border text-left ${a.destructive ? 'bg-danger/5 border-danger/30 hover:bg-danger/10' : 'bg-surface-raised border-border hover:border-primary/50'}`}>

                      <div className="text-[10px] text-text-dim">{a.desc}</div>
                    </button>
                  ))}
                </div>
              </SectionCard>

              {confirm && (
                <SectionCard title={`${confirm.label} — Ping Monitor`} description="Real-time ping status during power action">
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">

                      const h = hosts.find(h => h.id === id);

                      return (

              )}
            </div>
          </div>
        )}

        {activeTab === 'maintenance' && (

            if (confirm.id === 'reboot' || confirm.id === 'force-reboot') {
              executePowerAction({ action: 'reboot', targetIds: [...selectedTargets], mode: confirm.id === 'force-reboot' ? 'force' : 'standard' });
              toast.success(`${confirm.label} initiated on ${selectedTargets.length} hosts. Monitor in Job Queue.`);
            } else if (confirm.id === 'shutdown') {
              executePowerAction({ action: 'shutdown', targetIds: [...selectedTargets] });
              toast.success(`Shutdown initiated on ${selectedTargets.length} hosts. Hosts will go offline.`);
            } else if (confirm.id === 'soft-restart') {
              executePowerAction({ action: 'reboot', targetIds: [...selectedTargets], mode: 'graceful' });
              toast.success(`Soft restart initiated on ${selectedTargets.length} hosts.`);
            } else if (confirm.id === 'abort-reboot') {
              updateHosts(prev => prev.map(h => selectedTargets.includes(h.id) ? { ...h, pendingReboot: false } : h));
              appendAudit({ action: 'power.abort-reboot', actionCategory: 'Power', targetType: 'Host', targetIds: [...selectedTargets], parameters: {}, result: 'success' });
              toast.success(`Cleared pending reboot flag on ${selectedTargets.length} hosts.`);
            } else if (confirm.id === 'check-pending') {
              const pendingCount = hosts.filter(h => selectedTargets.includes(h.id) && h.pendingReboot).length;
              appendAudit({ action: 'power.check-pending', actionCategory: 'Power', targetType: 'Host', targetIds: [...selectedTargets], parameters: { pendingCount }, result: 'success' });
              toast.info(`Checked ${selectedTargets.length} hosts — ${pendingCount} have pending reboot flag.`);
            } else {
              toast.info(`${confirm.label} on ${selectedTargets.length} hosts`);
            }
            setConfirm(null);
          }}
          title={confirm?.label || ''}
          message={confirm?.destructive ? `This will forcefully reboot ${selectedTargets.length} host(s) without graceful shutdown. Logged-on users will lose unsaved work. Proceed?` : `This will execute ${confirm?.label} on ${selectedTargets.length} host(s). ${selectedTargets.length > 0 ? 'Hosts with logged-on users: ' + selectedTargets.filter(id => (hosts.find(h => h.id === id)?.loggedOnUsers?.length || 0) > 0).length : 'None'}.`}
          destructive={confirm?.destructive}
          confirmLabel={confirm?.label}
          targetCount={selectedTargets.length}
        />

    );
  };

  const QueueBuilder = () => {
    const toast = useToast();
    const { queueDraft, setQueueDraft, addJob, addSavedQueue, appendAudit, hosts } = useApp();
    // queueDraft (persistent across navigation) contains: name, description, mode, errorHandling,
    // retryCount, retryDelay, notifyOn, steps, selectedTargets
    const draft = queueDraft;
    const patchDraft = (patch) => setQueueDraft(d => ({ ...d, ...patch }));
    const setSteps = (updater) => setQueueDraft(d => ({ ...d, steps: typeof updater === 'function' ? updater(d.steps) : updater }));
    const setSelectedTargets = (ids) => patchDraft({ selectedTargets: ids });

    const [editingStepIdx, setEditingStepIdx] = useState(null);
    const [showDryRun, setShowDryRun] = useState(false);
    const stepIdRef = useRef(1);
    const [activeCategory, setActiveCategory] = useState('windows-update');

    const steps = draft.steps;
    const name = draft.name;
    const description = draft.description;
    const mode = draft.mode;
    const errorHandling = draft.errorHandling;
    const retryCount = draft.retryCount;
    const retryDelay = draft.retryDelay;
    const notifyOn = draft.notifyOn;
    const selectedTargets = draft.selectedTargets;

    const addStep = (stepDef) => {
      const newStep = { id: `qs${stepIdRef.current++}`, type: stepDef.type, label: stepDef.label, category: activeCategory, config: {} };
      setSteps(s => [...s, newStep]);
      setEditingStepIdx(steps.length);
      toast.success(`Added step: ${stepDef.label}`);
    };
    const removeStep = (idx) => setSteps(s => s.filter((_, i) => i !== idx));
    const moveStep = (idx, dir) => setSteps(s => {
      const newS = [...s]; const ni = idx + dir;
      if (ni < 0 || ni >= s.length) return s;
      [newS[idx], newS[ni]] = [newS[ni], newS[idx]];
      return newS;
    });
    const updateStepConfig = (idx, config) => setSteps(s => s.map((st, i) => i === idx ? {...st, config: {...st.config, ...config}} : st));
    const updateStepLabel = (idx, label) => setSteps(s => s.map((st, i) => i === idx ? {...st, label} : st));

    const executeQueue = async () => {
      if (steps.length === 0) { toast.warning('Add at least one step before executing.'); return; }
      if (selectedTargets.length === 0) { toast.warning('Select at least one target host.'); return; }
      const targetHostnames = hosts.filter(h => selectedTargets.includes(h.id)).map(h => h.hostname);
      if (targetHostnames.length === 0) { toast.error('Could not resolve hostnames for selected targets.'); return; }

      const localJobId = 'job-' + Date.now();
      const job = {
        id: localJobId,
        name: name || 'Untitled Queue',
        targets: [...selectedTargets],
        step: `Step 1/${steps.length}: ${steps[0].label}`,
        progress: 0,
        startedAt: new Date().toISOString(),
        status: 'running',
      };
      addJob(job);
      toast.info(`Submitting queue "${name}" to backend…`);

      if (!window.SupportHubLANAPI) {
        updateJob(localJobId, { status: 'failed', progress: 100, step: 'No API client' });
        appendAudit({ action: 'queues.execute', actionCategory: 'Job Queue', targetType: 'Host', targetIds: [...selectedTargets], parameters: { queueName: name }, result: 'failed' });
        toast.error('API client not loaded');
        return;
      }

      try {
        const result = await window.SupportHubLANAPI.executeQueue(steps, targetHostnames, null, mode === 'continue' ? 'continue' : 'stop', name);
        if (result && result.success && !result.demo) {
          // Subscribe to WebSocket for live progress
          const backendJobId = result.data?.jobId;
          if (backendJobId && window._supporthublanWs) {
            window._supporthublanWs.send(JSON.stringify({ type: 'subscribe', jobId: backendJobId }));
          }
          appendAudit({
            action: 'queues.execute', actionCategory: 'Job Queue',
            targetType: 'Host', targetIds: [...selectedTargets],
            parameters: { jobId: backendJobId, queueName: name, stepCount: steps.length, mode, stepLabels: steps.map(s => s.label) },
            result: 'success',
          });
          toast.success(`Queue "${name}" submitted — backend executing on ${targetHostnames.length} host(s). Watch live progress in the Job Queue panel.`, { duration: 6000 });
        } else if (result && result.demo) {
          updateJob(localJobId, { status: 'failed', progress: 100, step: 'Demo mode — backend not connected' });
          appendAudit({ action: 'queues.execute', actionCategory: 'Job Queue', targetType: 'Host', targetIds: [...selectedTargets], parameters: { queueName: name }, result: 'skipped' });
          toast.warning(`Queue not submitted — backend not connected (demo mode). Run the SupportHubLAN server on a Windows admin PC to execute queues for real.`, { duration: 8000 });
        } else {
          updateJob(localJobId, { status: 'failed', progress: 100, step: 'Failed', completedAt: new Date().toISOString() });
          appendAudit({ action: 'queues.execute', actionCategory: 'Job Queue', targetType: 'Host', targetIds: [...selectedTargets], parameters: { queueName: name }, result: 'failed', error: result?.error });
          toast.error(`Queue submission failed`, { detail: result?.error || 'Unknown error', duration: 8000 });
        }
      } catch (e) {
        updateJob(localJobId, { status: 'failed', progress: 100, step: 'Failed', completedAt: new Date().toISOString() });
        appendAudit({ action: 'queues.execute', actionCategory: 'Job Queue', targetType: 'Host', targetIds: [...selectedTargets], parameters: { queueName: name }, result: 'failed', error: e.message });
        toast.error(`Queue submission failed`, { detail: e.message, duration: 8000 });
      }
    };

    const saveAsTemplate = () => {
      const newQ = {
        id: 'q-' + Date.now(),
        name: name || 'Untitled Queue',
        description: description || 'User-saved queue',
        mode, isTemplate: true, createdBy: 'j.martin', createdAt: new Date().toISOString(),
        steps: [...steps],
      };
      addSavedQueue(newQ);
      appendAudit({
        action: 'queues.save', actionCategory: 'Job Queue',
        targetType: 'Queue', targetIds: [newQ.id],
        parameters: { queueName: newQ.name, stepCount: steps.length, mode },
        result: 'success',
      });
      toast.success(`Saved "${newQ.name}" to My Queues`);
    };

    const clearDraft = () => {
      setQueueDraft({
        name: 'New Queue', description: '', mode: 'standard', errorHandling: 'stop',
        retryCount: 0, retryDelay: 30, notifyOn: ['failure'], steps: [], selectedTargets: [],
      });
      setEditingStepIdx(null);
      toast.info('Queue draft cleared');
    };

    return (
      <div className="space-y-3">
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
          {/* Left: Step palette */}
          <SectionCard title="Step Palette" description="Click to add a step to the queue" className="lg:col-span-1" bodyClassName="max-h-[600px] overflow-y-auto">
            <div className="flex flex-wrap gap-1 mb-2">
              {Object.entries(STEP_TYPES).map(([key, cat]) => (
                <button key={key} onClick={() => setActiveCategory(key)} className={`px-2 py-1 text-[10px] rounded border ${activeCategory === key ? 'bg-primary/15 border-primary text-primary' : 'bg-surface-raised border-border text-text-dim hover:text-text'}`}>
                  <Icon name={cat.icon} size={10} className="inline mr-1" />{cat.label}
                </button>
              ))}
            </div>
            <div className="space-y-1">
              {STEP_TYPES[activeCategory].steps.map((s, i) => (
                <button key={i} onClick={() => addStep(s)} className="w-full flex items-start gap-2 p-2 rounded border border-border bg-surface-raised hover:border-primary/50 hover:bg-primary/5 text-left">
                  <Icon name="Plus" size={12} className="text-primary mt-0.5 flex-shrink-0" />
                  <div className="min-w-0">
                    <div className="text-xs font-medium text-text">{s.label}</div>
                    <div className="text-[10px] text-text-dim mt-0.5">{s.desc}</div>
                  </div>
                </button>
              ))}
            </div>
          </SectionCard>

          {/* Right: Queue steps + settings */}
          <div className="lg:col-span-2 space-y-3">
            <SectionCard title="Queue Builder" description={`${steps.length} step(s) in queue`} actions={<div className="flex gap-1"><ActionButton size="xs" variant="ghost" icon="Play" onClick={() => setShowDryRun(true)}>Dry Run</ActionButton><ActionButton size="xs" variant="primary" icon="Rocket" onClick={executeQueue}>Execute</ActionButton></div>}>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
                <FormField label="Queue Name" required><Input value={name} onChange={e => patchDraft({ name: e.target.value })} /></FormField>
                <FormField label="Execution Mode"><Select value={mode} onChange={e => patchDraft({ mode: e.target.value })}><option value="standard">Standard (all selected hosts)</option><option value="basic-sequence">Basic Multi-Row Sequence</option><option value="advanced-sequence">Advanced Multi-Host Sequence</option></Select></FormField>

                            {step.type === 'start-service' || step.type === 'stop-service' || step.type === 'restart-service' || step.type === 'check-service' ? <FormField label="Service Name" className="col-span-2"><Input placeholder="Spooler" className="font-mono" onChange={e => updateStepConfig(idx, { serviceName: e.target.value })} /></FormField> : null}
                            {step.type === 'deploy-package' && <FormField label="Profile" className="col-span-2"><Select onChange={e => updateStepConfig(idx, { profileId: e.target.value })}><option value="">Select profile…</option>{DEPLOYMENT_PROFILES.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</Select></FormField>}

                            {step.type === 'run-saved' && <FormField label="Saved Command" className="col-span-2"><Select onChange={e => updateStepConfig(idx, { commandId: e.target.value })}><option value="">Select command…</option>{SAVED_COMMANDS.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</Select></FormField>}
                            {step.type === 'install-by-class' && <FormField label="Classifications" className="col-span-2"><Input placeholder="Critical, Security" onChange={e => updateStepConfig(idx, { classes: e.target.value })} /></FormField>}
                            {step.type === 'install-by-kb' && <FormField label="KB Filter" className="col-span-2"><Input placeholder="KB5039217, KB5039313" className="font-mono" onChange={e => updateStepConfig(idx, { kbFilter: e.target.value })} /></FormField>}

                            {step.type === 'copy-file' && <><FormField label="Source Path"><Input placeholder="\\\\server\\share\\file.txt" className="font-mono" onChange={e => updateStepConfig(idx, { source: e.target.value })} /></FormField><FormField label="Destination Path"><Input placeholder="C:\\temp\\file.txt" className="font-mono" onChange={e => updateStepConfig(idx, { dest: e.target.value })} /></FormField></>}

                    <div className="flex gap-3 mt-1">
                      {['completion','failure'].map(n => (
                        <label key={n} className="flex items-center gap-1.5 text-xs text-text"><input type="checkbox" checked={notifyOn.includes(n)} onChange={() => patchDraft({ notifyOn: notifyOn.includes(n) ? notifyOn.filter(x => x !== n) : [...notifyOn, n] })} className="accent-primary" />{n.charAt(0).toUpperCase() + n.slice(1)}</label>

            <div className="flex justify-end gap-2">

              <ActionButton variant="secondary" icon="Download" onClick={() => { const json = JSON.stringify(queueDraft, null, 2); const blob = new Blob([json], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'queue-export.json'; a.click(); URL.revokeObjectURL(url); toast.success('Queue exported as JSON'); }}>Export JSON</ActionButton>

        {/* Dry Run Modal */}
        <Modal open={showDryRun} onClose={() => setShowDryRun(false)} title="Dry Run Preview" subtitle="No actions performed — validation only" size="lg"
          footer={<ActionButton variant="primary" onClick={() => setShowDryRun(false)}>Close</ActionButton>}
        >
          {steps.length === 0 ? <EmptyState icon="ListOrdered" title="No steps to preview" /> : (

                  <Badge color="success">Will run</Badge>

      </div>

                  </div>

                <div className="text-xs text-text-dim mb-2">{q.steps.length} step(s) · by {q.createdBy}</div>
                <div className="space-y-1 mb-3">
                  {q.steps.slice(0, 4).map((s, i) => (
                    <div key={s.id} className="flex items-center gap-2 text-[11px] text-text-dim">

  const SchedulerScreen = () => {
    const toast = useToast();
    const { savedQueues, addJob, appendAudit, hosts, maintenanceWindows, addMaintenanceWindow, removeMaintenanceWindow, scheduledTasks, addScheduledTask } = useApp();
    const [activeTab, setActiveTab] = useState('upcoming');
    const [showWizard, setShowWizard] = useState(false);
    const [wizardStep, setWizardStep] = useState(0);
    const [task, setTask] = useState({ name: '', taskType: 'Job Queue', referenceId: '', triggerType: 'one-time', hostIds: [], notifyOn: ['failure'] });

    // Trigger a scheduled task immediately
    const runTaskNow = (t) => {
      appendAudit({
        action: 'schedule.run-now', actionCategory: 'Scheduler',
        targetType: 'ScheduledTask', targetIds: [t.id],
        parameters: { taskName: t.name, taskType: t.taskType, referenceId: t.referenceId },
        result: 'success',
      });
      if (t.taskType === 'Job Queue') {
        const queue = savedQueues.find(q => q.id === t.referenceId);
        if (queue) {
          const jobId = 'job-' + Date.now();
          addJob({
            id: jobId,
            name: `${queue.name} (triggered by "${t.name}")`,
            targets: [...t.hostIds],
            step: queue.steps.length > 0 ? `Step 1/${queue.steps.length}: ${queue.steps[0].label}` : 'Starting',
            progress: 0,
            startedAt: new Date().toISOString(),
            status: 'running',
          });
          toast.success(`Triggered "${queue.name}" on ${t.hostIds.length} hosts.`);
        } else {
          toast.warning('Referenced queue not found. The task may need to be re-linked.');
        }
      } else if (t.taskType === 'Windows Update Action') {
        addJob({
          id: 'job-' + Date.now(),
          name: `${t.name} (triggered)`,
          targets: [...t.hostIds],
          step: 'Scanning (1/3)',
          progress: 10,
          startedAt: new Date().toISOString(),
          status: 'running',
        });
        toast.success(`Triggered "${t.name}" — scanning ${t.hostIds.length} hosts.`);
      } else if (t.taskType === 'Power Action') {
        addJob({
          id: 'job-' + Date.now(),
          name: `${t.name} (triggered)`,
          targets: [...t.hostIds],
          step: 'Sending signal (1/2)',
          progress: 30,
          startedAt: new Date().toISOString(),
          status: 'running',
        });
        toast.success(`Triggered "${t.name}" on ${t.hostIds.length} hosts.`);
      } else {
        toast.success(`Triggered "${t.name}".`);
      }
    };

    // Build calendar month grid for June 2026
    const calendarDays = useMemo(() => {
      const year = 2026, month = 5; // June (0-indexed)
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const startDay = first.getDay();
      const days = [];
      for (let i = 0; i < startDay; i++) days.push(null);
      for (let d = 1; d <= last.getDate(); d++) days.push(d);
      return days;
    }, []);

    const tasksOnDay = (day) => scheduledTasks.filter(t => {
      const d = new Date(t.nextRun);
      return d.getUTCDate() === day && d.getUTCMonth() === 5 && d.getUTCFullYear() === 2026;
    });

  const BackendConnectionTester = () => {
    const toast = useToast();
    const [status, setStatus] = useState('idle'); // idle | checking | ok | fail
    const [info, setInfo] = useState(null);
    const [lastChecked, setLastChecked] = useState(null);

    const test = async () => {
      setStatus('checking');
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 5000);
        const resp = await fetch((window.SUPPORTHUBLAN_API_URL) + '/api/health', { signal: ctrl.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        setInfo(json.data);
        setStatus('ok');
        setLastChecked(new Date());
        toast.success(`Backend OK — v${json.data?.version}`);
      } catch (e) {
        setStatus('fail');
        setLastChecked(new Date());
        toast.error('Backend not reachable', { detail: e.message });
      }
    };

    useEffect(() => { test(); }, []);

    return (
      <div className="space-y-3">
        <div className="flex items-center gap-3">
          <div className={`px-2.5 py-1 rounded text-xs font-medium ${
            status === 'ok' ? 'bg-success/15 text-success' :
            status === 'fail' ? 'bg-danger/15 text-danger' :
            status === 'checking' ? 'bg-info/15 text-info' :
            'bg-surface-raised text-text-dim'
          }`}>
            {status === 'checking' && <><Icon name="Loader2" size={11} className="inline animate-spin mr-1" /> Checking…</>}
            {status === 'ok' && <><Icon name="CheckCircle2" size={11} className="inline mr-1" /> LIVE</>}
            {status === 'fail' && <><Icon name="AlertCircle" size={11} className="inline mr-1" /> OFFLINE</>}
            {status === 'idle' && 'Idle'}
          </div>
          <ActionButton variant="secondary" size="sm" icon="RefreshCw" onClick={test}>Test Now</ActionButton>
          {lastChecked && <span className="text-meta text-text-dim">Last checked: {lastChecked.toLocaleTimeString()}</span>}
        </div>

        {info && (
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
            <div className="p-2 bg-surface-raised rounded border border-border">
              <div className="text-meta text-text-dim uppercase">Version</div>

                {info.pstoolsInstalled ? 'INSTALLED' : 'NOT FOUND'}
              </div>
            </div>
          </div>
        )}
        {info && (
          <div className="text-xs">
            <div className="text-meta text-text-dim uppercase mb-1">PsTools Path</div>

  const InventoriesManager = () => {
    const toast = useToast();
    const { appendAudit } = useApp();
    const [inventories, setInventories] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showCreate, setShowCreate] = useState(false);
    const [newInv, setNewInv] = useState({ name: '', description: '', color: 'blue' });

    const load = async () => {
      setLoading(true);
      try {
        const resp = await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories`);
        const json = await resp.json();
        if (json.success) setInventories(json.data);
      } catch (e) {
        toast.error('Failed to load inventories — backend not connected');
      }
      setLoading(false);
    };

    useEffect(() => { load(); }, []);

    const create = async () => {
      if (!newInv.name.trim()) { toast.warning('Name required'); return; }
      try {
        const resp = await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newInv)
        });
        const json = await resp.json();
        if (json.success) {
          toast.success(`Inventory "${newInv.name}" created`);
          setShowCreate(false);
          setNewInv({ name: '', description: '', color: 'blue' });
          load();
        } else {
          toast.error('Failed to create inventory', { detail: json.error });
        }
      } catch (e) { toast.error('Failed to create inventory', { detail: e.message }); }
    };

    const activate = async (id) => {
      try {
        await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories/${id}/activate`, { method: 'POST' });
        toast.success('Inventory activated');
        load();
      } catch (e) { toast.error('Failed to activate'); }
    };

    const remove = async (id, name) => {
      if (!confirm(`Delete inventory "${name}"? All hosts in it will be permanently removed.`)) return;
      try {
        const resp = await fetch(`${window.SUPPORTHUBLAN_API_URL}/api/inventories/${id}`, { method: 'DELETE' });
        const json = await resp.json();
        if (json.success) { toast.success('Inventory deleted'); load(); }
        else toast.error('Failed to delete', { detail: json.error });
      } catch (e) { toast.error('Failed to delete'); }
    };

    if (loading) return <div className="p-4 text-center text-text-dim text-xs">Loading…</div>;

    return (
      <SectionCard title="Inventory Management" description="Create and manage multiple named inventories. Each inventory appears as a tab in Computer Inventory.">
        <div className="space-y-2">
          {inventories.length === 0 ? (
            <div className="p-4 text-center text-text-dim text-xs">No inventories. Create one below.</div>
          ) : inventories.map(inv => (
            <div key={inv.id} className={`flex items-center justify-between p-3 rounded border ${inv.is_active ? 'border-primary bg-primary/5' : 'border-border bg-surface-raised'}`}>
              <div className="flex items-center gap-3">
                <span className={`w-2 h-2 rounded-full bg-${inv.color === 'blue' ? 'primary' : inv.color === 'green' ? 'success' : inv.color === 'red' ? 'danger' : 'warning'}`} />
                <div>
                  <div className="text-sm font-medium text-text">{inv.name} {inv.is_active === 1 && <span className="ml-2 px-1.5 py-0.5 text-[10px] bg-success/15 text-success rounded">ACTIVE</span>}</div>
                  <div className="text-meta text-text-dim">{inv.description || 'No description'}</div>
                </div>
              </div>
              <div className="flex items-center gap-1">
                {!inv.is_active && <ActionButton variant="ghost" size="xs" icon="Check" onClick={() => activate(inv.id)}>Activate</ActionButton>}
                <ActionButton variant="ghost" size="xs" icon="Trash2" onClick={() => remove(inv.id, inv.name)} />
              </div>
            </div>
          ))}
        </div>
        <div className="mt-3">
          {!showCreate ? (
            <ActionButton variant="primary" size="sm" icon="Plus" onClick={() => setShowCreate(true)}>New Inventory</ActionButton>
          ) : (
            <div className="p-3 border border-border rounded space-y-2">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                <FormField label="Name"><Input value={newInv.name} onChange={(e) => setNewInv(n => ({ ...n, name: e.target.value }))} placeholder="e.g. Lab PCs" /></FormField>
                <FormField label="Description"><Input value={newInv.description} onChange={(e) => setNewInv(n => ({ ...n, description: e.target.value }))} placeholder="Optional description" /></FormField>
                <FormField label="Color">
                  <Select value={newInv.color} onChange={(e) => setNewInv(n => ({ ...n, color: e.target.value }))}>
                    <option value="blue">Blue</option><option value="green">Green</option><option value="amber">Amber</option><option value="red">Red</option>
                  </Select>
                </FormField>
              </div>
              <div className="flex gap-2">
                <ActionButton variant="primary" size="sm" icon="Check" onClick={create}>Create</ActionButton>
                <ActionButton variant="ghost" size="sm" onClick={() => setShowCreate(false)}>Cancel</ActionButton>
              </div>
            </div>
          )}
        </div>
      </SectionCard>
    );

  const App = () => {
