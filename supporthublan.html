    ];

    return (
      <div className="space-y-3">
        <PageHeader
          breadcrumb={['supporthublan', 'Inventory']}
          title="Computer Inventory"
          subtitle={`${hosts.length} hosts · ${hosts.filter(h=>h.onlineStatus==='online').length} online`}
          actions={
            <>
              <ActionButton variant="secondary" icon="Download" onClick={() => {
                const csv = ['hostname,ipAddress,osName,patchState,onlineStatus,site,owner'].concat(hosts.map(h => [h.hostname, h.ipAddress, h.osName, h.patchState, h.onlineStatus, h.site, h.owner].join(','))).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'inventory-full.csv'; a.click();
                URL.revokeObjectURL(url);
                toast.success(`Exported ${hosts.length} hosts to CSV`);
              }}>Export</ActionButton>
              <ActionButton variant="primary" icon="Plus" onClick={() => setShowAddModal(true)}>Add Hosts</ActionButton>
            </>
          }
        />

        <TabGroup
          tabs={[
            { id: 'all', label: 'All Hosts', icon: 'Server', badge: hosts.length },
            { id: 'servers', label: 'Servers', icon: 'HardDrive', badge: hosts.filter(h => h.tags.includes('server')).length },
            { id: 'workstations', label: 'Workstations', icon: 'Monitor', badge: hosts.filter(h => h.tags.includes('workstation')).length },
            { id: 'offline', label: 'Offline', icon: 'CircleOff', badge: hosts.filter(h => h.onlineStatus === 'offline').length },
            { id: 'tags', label: 'Tags' },
            { id: 'groups', label: 'Groups' },
            { id: 'import', label: 'Import / Export' },
          ]}
          active={activeTab}
          onChange={setActiveTab}
        />

        {activeTab === 'tags' ? (
          <SectionCard title="Host Tags" description="Click a tag to filter the host list">
            <div className="flex flex-wrap gap-2">
              {HOST_TAGS.map(t => {
                const count = hosts.filter(h => h.tags.includes(t.name)).length;
                return (
                  <button key={t.id} onClick={() => { setSearch(t.name); setActiveTab('all'); toast.info(`Filtered by tag: ${t.name} (${count} hosts)`); }} className="flex items-center gap-2 p-2 bg-surface-raised rounded border border-border hover:border-primary/50 hover:bg-primary/5 transition-colors cursor-pointer">
                    <span className="w-3 h-3 rounded-sm" style={{ background: t.color }} />
                    <span className="text-xs text-text font-medium">{t.name}</span>
                    <Badge>{count}</Badge>
                  </button>
                );
              })}
            </div>
          </SectionCard>
        ) : activeTab === 'groups' ? (
          <SectionCard title="Host Groups" description="Logical groupings for batch operations">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {[
                { id: 'g-servers', name: 'All Servers', count: hosts.filter(h => h.tags.includes('server')).length },
                { id: 'g-workstations', name: 'All Workstations', count: hosts.filter(h => h.tags.includes('workstation')).length },
                { id: 'g-dc', name: 'Domain Controllers', count: hosts.filter(h => h.tags.includes('domain-controller')).length },
                { id: 'g-sql', name: 'SQL Servers', count: hosts.filter(h => h.tags.includes('sql')).length },
              ].map(g => (
                <div key={g.id} className="flex items-center gap-3 p-3 bg-surface-raised rounded border border-border">
                  <Icon name="Folder" size={16} className="text-primary" />
                  <div className="flex-1">
                    <div className="text-sm font-medium text-text">{g.name}</div>
                    <div className="text-[11px] text-text-dim">{g.count} hosts</div>
                  </div>
                  <IconButton icon="Settings" size="sm" title="Manage" />
                </div>
              ))}
            </div>
          </SectionCard>
        ) : activeTab === 'import' ? (
          <SectionCard title="Import / Export Hosts" description="Bulk import from CSV/TXT or export current inventory">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div className="p-4 border border-border rounded-lg bg-surface-raised">
                <Icon name="Upload" size={24} className="text-primary mb-2" />
                <h4 className="text-sm font-semibold text-text mb-1">Import Hosts</h4>
                <p className="text-xs text-text-dim mb-3">Upload a CSV or TXT file with one host per line. Required columns: hostname, ipAddress.</p>
                <ActionButton variant="primary" size="sm" icon="FileUp" onClick={() => { setShowAddModal(true); toast.info('Opening Add Hosts wizard — choose CSV method to paste your data.'); }}>Choose File</ActionButton>
              </div>
              <div className="p-4 border border-border rounded-lg bg-surface-raised">
                <Icon name="Download" size={24} className="text-success mb-2" />
                <h4 className="text-sm font-semibold text-text mb-1">Export Inventory</h4>
                <p className="text-xs text-text-dim mb-3">Download the full host inventory as CSV, encrypted .bps, or JSON.</p>
                <div className="flex gap-2 flex-wrap">
                  <ActionButton variant="secondary" size="sm" icon="FileText" onClick={() => {
                    const csv = ['hostname,ipAddress,osName,patchState,onlineStatus,site,owner'].concat(hosts.map(h => [h.hostname, h.ipAddress, h.osName, h.patchState, h.onlineStatus, h.site, h.owner].join(','))).join('\n');
                    const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'inventory.csv'; a.click(); URL.revokeObjectURL(url);
                    toast.success(`Exported ${hosts.length} hosts to CSV`);
                  }}>CSV</ActionButton>
                  <ActionButton variant="secondary" size="sm" icon="FileSpreadsheet" onClick={() => {
                    const csv = ['hostname,ipAddress,osName,patchState,onlineStatus,site,owner'].concat(hosts.map(h => [h.hostname, h.ipAddress, h.osName, h.patchState, h.onlineStatus, h.site, h.owner].join(','))).join('\n');
                    const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'inventory.xlsx'; a.click(); URL.revokeObjectURL(url);
                    toast.success(`Exported ${hosts.length} hosts to XLSX (CSV format)`);
                  }}>XLSX</ActionButton>
                  <ActionButton variant="secondary" size="sm" icon="Braces" onClick={() => {
                    const json = JSON.stringify(hosts, null, 2);
                    const blob = new Blob([json], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'inventory.json'; a.click(); URL.revokeObjectURL(url);
                    toast.success(`Exported ${hosts.length} hosts to JSON`);
                  }}>JSON</ActionButton>
                  <ActionButton variant="primary" size="sm" icon="Lock" onClick={() => setShowGridFileModal({ mode: 'export' })}>Encrypted .bps</ActionButton>
                </div>
              </div>
              <div className="p-4 border border-border rounded-lg bg-surface-raised">
                <Icon name="Upload" size={24} className="text-warning mb-2" />
                <h4 className="text-sm font-semibold text-text mb-1">Import Encrypted Grid (.bps)</h4>
                <p className="text-xs text-text-dim mb-3">Load a previously saved encrypted grid file. Password required for encrypted files.</p>
                <ActionButton variant="primary" size="sm" icon="Lock" onClick={() => setShowGridFileModal({ mode: 'import' })}>Import Grid File</ActionButton>
              </div>
            </div>
          </SectionCard>
        ) : (
          <>
            <FilterBar
              search={search}
              onSearchChange={setSearch}
              searchPlaceholder="Search by hostname, IP, FQDN, tag, site, owner…"
              filters={[
                { key: 'status', label: 'All Status', options: [{value:'online',label:'Online'},{value:'offline',label:'Offline'}] },
                { key: 'patchState', label: 'All Patch States', options: [{value:'compliant',label:'Compliant'},{value:'updates-available',label:'Updates Available'},{value:'critical',label:'Critical'},{value:'unknown',label:'Unknown'}] },
                { key: 'site', label: 'All Sites', options: SITES.map(s => ({value:s,label:s})) },
                { key: 'os', label: 'All OS', options: [{value:'Server 2022',label:'Windows Server 2022'},{value:'Server 2019',label:'Windows Server 2019'},{value:'11 Pro',label:'Windows 11 Pro'}] },
              ]}
              activeFilters={filters}
              onFilterChange={(k,v) => setFilters(f => ({...f, [k]: v}))}
              right={
                <div className="flex items-center gap-1">
                  <button onClick={() => setDensity(d => d === 'compact' ? 'default' : d === 'default' ? 'comfortable' : 'compact')} title="Toggle density" className="px-2 py-1.5 text-xs bg-surface-raised border border-border rounded text-text-dim hover:text-text">
                    <Icon name={density === 'compact' ? 'Rows3' : density === 'comfortable' ? 'Rows2' : 'Table'} size={13} />
                  </button>
                  <button onClick={() => setShowColumnChooser(s => !s)} title="Column chooser" className="px-2 py-1.5 text-xs bg-surface-raised border border-border rounded text-text-dim hover:text-text flex items-center gap-1">
                    <Icon name="Columns3" size={13} /> Columns
                  </button>
                </div>
              }
            />

            {showColumnChooser && (
              <div className="absolute right-4 z-30 w-56 p-2 bg-surface border border-border rounded-lg shadow-raised">
                <div className="text-meta text-text-dim uppercase px-1 pb-1">Toggle Columns</div>
                <div className="max-h-72 overflow-y-auto">
                  {allColumns.map(c => (
                    <label key={c.key} className="flex items-center gap-2 px-1 py-1 text-xs text-text hover:bg-surface-raised rounded">
                      <input type="checkbox" checked={!hiddenCols.has(c.key)} onChange={() => setHiddenCols(s => { const ns = new Set(s); if (ns.has(c.key)) ns.delete(c.key); else ns.add(c.key); return ns; })} className="accent-primary" />
                      {c.label}
                    </label>
                  ))}
                </div>
              </div>
            )}

            <BulkActionBar selectedCount={selectedIds.length} actions={bulkActions} onClear={() => setSelectedIds([])} />

            {/* BatchPatch-style Action Toolbar */}
            <ActionToolbar groups={[
              { label: 'Hosts', items: [
                { icon: 'Plus', label: 'Add', onClick: () => setShowAddModal(true) },
                { icon: 'ScanLine', label: 'Scan IP', onClick: () => { setShowAddModal(true); toast.info('Select "IP Range / Subnet Scan" in the wizard.'); } },
                { icon: 'RefreshCw', label: 'Refresh', onClick: () => { if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; } updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, lastSeen: new Date().toISOString() } : h)); toast.success(`Refreshed ${selectedIds.length} host(s)`); }, disabled: selectedIds.length === 0 },
              ]},
              { label: 'Updates', items: [
                { icon: 'Search', label: 'Check', onClick: () => { if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; } addJob({ id: 'job-' + Date.now(), name: `Scan — ${selectedIds.length} hosts`, targets: [...selectedIds], step: 'Scanning (1/3)', progress: 5, startedAt: new Date().toISOString(), status: 'running' }); toast.info(`Scanning ${selectedIds.length} hosts…`); }, disabled: selectedIds.length === 0 },
                { icon: 'ShieldCheck', label: 'Install', variant: 'success', onClick: () => { if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; } addJob({ id: 'job-' + Date.now(), name: `Install Updates — ${selectedIds.length} hosts`, targets: [...selectedIds], step: 'Installing (1/4)', progress: 5, startedAt: new Date().toISOString(), status: 'running' }); setTimeout(() => { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, patchState: 'compliant', pendingReboot: false } : h)); toast.success(`${selectedIds.length} host(s) now compliant`); }, 6000); toast.info(`Installing on ${selectedIds.length} hosts…`); }, disabled: selectedIds.length === 0 },
                { icon: 'EyeOff', label: 'Hide', onClick: () => { if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; } toast.success(`Hiding updates on ${selectedIds.length} host(s)`); }, disabled: selectedIds.length === 0 },
              ]},
              { label: 'PsTools', items: [
                { icon: 'Info', label: 'PsInfo', onClick: () => runPsToolBulk('psinfo', 'PsInfo'), disabled: selectedIds.length === 0 },
                { icon: 'Users', label: 'LoggedOn', onClick: () => runPsToolBulk('psloggedon', 'PsLoggedOn'), disabled: selectedIds.length === 0 },
                { icon: 'Activity', label: 'PsList', onClick: () => runPsToolBulk('pslist', 'PsList'), disabled: selectedIds.length === 0 },
                { icon: 'Server', label: 'PsService', onClick: () => runPsToolBulk('psservice', 'PsService'), disabled: selectedIds.length === 0 },
              ]},
              { label: 'Power', items: [
                { icon: 'Power', label: 'Reboot', variant: 'danger', onClick: () => { if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; } setConfirmReboot(true); }, disabled: selectedIds.length === 0 },
                { icon: 'Wifi', label: 'WoL', variant: 'warning', onClick: () => { const offline = hosts.filter(h => h.onlineStatus === 'offline' && h.macAddress); if (offline.length === 0) { toast.info('No offline hosts with MAC.'); return; } executePowerAction({ action: 'wol', targetIds: offline.map(h => h.id) }); toast.success(`WoL to ${offline.length} hosts`); } },
              ]},
              { label: 'Deploy', items: [
                { icon: 'Package', label: 'Deploy', onClick: () => { if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; } navigate('deployments'); toast.info(`${selectedIds.length} hosts selected — open Deployments`); }, disabled: selectedIds.length === 0 },
                { icon: 'Terminal', label: 'Script', onClick: () => { if (selectedIds.length === 0) { toast.warning('Select hosts first.'); return; } navigate('scripts'); }, disabled: selectedIds.length === 0 },
                { icon: 'Activity', label: 'Services', onClick: () => navigate('services') },
              ]},
              { label: 'Row Color', items: [
                { icon: 'Palette', label: 'None', onClick: () => { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, _rowColor: undefined } : h)); toast.info('Row color cleared.'); }, disabled: selectedIds.length === 0 },
                { icon: 'Circle', label: '', onClick: () => { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, _rowColor: '#4f83ff' } : h)); toast.info('Rows colored blue.'); }, disabled: selectedIds.length === 0 },
                { icon: 'Circle', label: '', onClick: () => { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, _rowColor: '#22c55e' } : h)); toast.info('Rows colored green.'); }, disabled: selectedIds.length === 0 },
                { icon: 'Circle', label: '', onClick: () => { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, _rowColor: '#ef4444' } : h)); toast.info('Rows colored red.'); }, disabled: selectedIds.length === 0 },
                { icon: 'Circle', label: '', onClick: () => { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, _rowColor: '#f59e0b' } : h)); toast.info('Rows colored orange.'); }, disabled: selectedIds.length === 0 },
                { icon: 'Circle', label: '', onClick: () => { updateHosts(prev => prev.map(h => selectedIds.includes(h.id) ? { ...h, _rowColor: '#a855f7' } : h)); toast.info('Rows colored purple.'); }, disabled: selectedIds.length === 0 },
              ]},
              { label: 'Data', items: [
                { icon: 'Download', label: 'Export', onClick: () => { const csv = ['hostname,ipAddress,osName,patchState,onlineStatus,site,owner'].concat(hosts.filter(h => selectedIds.length === 0 || selectedIds.includes(h.id)).map(h => [h.hostname, h.ipAddress, h.osName, h.patchState, h.onlineStatus, h.site, h.owner].join(','))).join('\n'); const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'hosts-export.csv'; a.click(); URL.revokeObjectURL(url); toast.success('Exported to CSV'); } },
                { icon: 'Lock', label: '.bps', onClick: () => setShowGridFileModal({ mode: 'export' }) },
              ]},
            ]} />

            <SectionCard bodyClassName="p-0">
              <DataTable
                columns={visibleColumns}
                rows={rows}
                selectedIds={selectedIds}
                onSelectionChange={setSelectedIds}
                onRowClick={(row) => openHost(hosts.find(h => h.id === row.id))}
                onContextMenu={(e, row) => {
                  e.preventDefault();
                  const h = hosts.find(x => x.id === row.id);
                  if (!h) return;
                  setContextMenu({
                    x: e.clientX, y: e.clientY,
                    items: [
                      { label: h.hostname },
                      { separator: true },
                      { icon: 'Info', text: 'View Details', onClick: () => openHost(h) },
                      { icon: 'RefreshCw', text: 'Refresh Host', onClick: () => { updateHosts(prev => prev.map(x => x.id === h.id ? { ...x, lastSeen: new Date().toISOString() } : x)); toast.success(`${h.hostname} refreshed.`); } },
                      { separator: true },
                      { icon: 'Search', text: 'Check for Updates', onClick: () => { addJob({ id: 'job-' + Date.now(), name: `Scan — ${h.hostname}`, targets: [h.id], step: 'Scanning (1/3)', progress: 5, startedAt: new Date().toISOString(), status: 'running' }); toast.info(`Scanning ${h.hostname}…`); } },
                      { icon: 'ShieldCheck', text: 'Install Updates', onClick: () => { addJob({ id: 'job-' + Date.now(), name: `Install — ${h.hostname}`, targets: [h.id], step: 'Installing (1/4)', progress: 5, startedAt: new Date().toISOString(), status: 'running' }); setTimeout(() => { updateHosts(prev => prev.map(x => x.id === h.id ? { ...x, patchState: 'compliant', pendingReboot: false } : x)); toast.success(`${h.hostname} now compliant`); }, 6000); toast.info(`Installing on ${h.hostname}…`); } },
                      { separator: true },
                      { icon: 'Power', text: 'Reboot', danger: true, onClick: () => { executePowerAction({ action: 'reboot', targetIds: [h.id] }); toast.success(`Rebooting ${h.hostname}…`); } },
                      { icon: 'PowerOff', text: 'Shutdown', danger: true, onClick: () => { executePowerAction({ action: 'shutdown', targetIds: [h.id] }); toast.warning(`Shutting down ${h.hostname}…`); } },
                      { separator: true },
                      { icon: 'Terminal', text: 'Run Script', onClick: () => navigate('scripts') },
                      { icon: 'Package', text: 'Deploy Software', onClick: () => navigate('deployments') },
                      { icon: remoteDesktopProtocol === 'VNC' ? 'Monitor' : 'MonitorSmartphone', text: `Connect (${remoteDesktopProtocol})`, onClick: () => launchRemoteDesktop(h) },
                      { separator: true },
                      { label: 'PsTools' },
                      { icon: 'Info', text: 'PsInfo — System Info', onClick: () => runPsToolOnHost('psinfo', h.hostname, h.id, { label: 'PsInfo' }) },
                      { icon: 'Users', text: 'PsLoggedOn — Who is logged on', onClick: () => runPsToolOnHost('psloggedon', h.hostname, h.id, { label: 'PsLoggedOn' }) },
                      { icon: 'Activity', text: 'PsList — Running Processes', onClick: () => runPsToolOnHost('pslist', h.hostname, h.id, { label: 'PsList' }) },
                      { icon: 'Server', text: 'PsService — Services', onClick: () => runPsToolOnHost('psservice', h.hostname, h.id, { label: 'PsService' }) },
                      { icon: 'FileText', text: 'PsFile — Open Files', onClick: () => runPsToolOnHost('psfile', h.hostname, h.id, { label: 'PsFile' }) },
                      { icon: 'Hash', text: 'PsGetSid — Get SID', onClick: () => runPsToolOnHost('psgetsid', h.hostname, h.id, { label: 'PsGetSid' }) },
                      { icon: 'Power', text: 'PsShutdown — Reboot', danger: true, onClick: () => { executePowerAction({ action: 'reboot', targetIds: [h.id] }); toast.success(`PsShutdown reboot sent to ${h.hostname}`); } },
                      { icon: 'RefreshCw', text: 'Check Pending Reboot + Reboot if Req', onClick: () => { if (h.pendingReboot) { executePowerAction({ action: 'reboot', targetIds: [h.id] }); toast.success(`${h.hostname} had pending reboot — rebooting now.`); } else { toast.info(`${h.hostname} does not have a pending reboot flag.`); } } },
                      { icon: 'MessageSquare', text: 'Send Message to User', onClick: () => { const msg = prompt('Enter message to display on remote screen:', 'IT Maintenance: Please save your work.'); if (msg) { addJob({ id: 'job-' + Date.now(), name: `Message — ${h.hostname}`, targets: [h.id], step: 'Sending (1/1)', progress: 50, startedAt: new Date().toISOString(), status: 'running' }); appendAudit({ action: 'pstools.message', actionCategory: 'Scripts', targetType: 'Host', targetIds: [h.id], parameters: { message: msg }, result: 'success' }); toast.success(`Message sent to ${h.hostname}`); } } },
                      { icon: 'FileText', text: 'Get Windows Update Log', onClick: () => { addJob({ id: 'job-' + Date.now(), name: `WU Log — ${h.hostname}`, targets: [h.id], step: 'Generating (1/1)', progress: 30, startedAt: new Date().toISOString(), status: 'running' }); toast.info(`Generating Windows Update log for ${h.hostname}…`); } },
                      { icon: 'Lock', text: 'Enable RDP Remotely', onClick: () => { addJob({ id: 'job-' + Date.now(), name: `Enable RDP — ${h.hostname}`, targets: [h.id], step: 'Enabling (1/1)', progress: 50, startedAt: new Date().toISOString(), status: 'running' }); appendAudit({ action: 'pstools.enable-rdp', actionCategory: 'Scripts', targetType: 'Host', targetIds: [h.id], parameters: {}, result: 'success' }); toast.success(`RDP enabled on ${h.hostname}`); } },
                    ],
                  });
                }}
                density={density}
                emptyMessage="No hosts match your filters."
                maxRows={15}
              />
            </SectionCard>
          </>
        )}

        {/* Add Hosts Modal (Wizard) */}
        <AddHostsModal open={showAddModal} onClose={() => setShowAddModal(false)} />

        {/* Encrypted Grid File Export/Import Modal */}
        <GridFileModal
          open={!!showGridFileModal}
          onClose={() => setShowGridFileModal(null)}
          mode={showGridFileModal?.mode || 'export'}
          hosts={hosts}
          onImport={(importedHosts) => { addHosts(importedHosts); appendAudit({ action: 'hosts.import-grid', actionCategory: 'Inventory', targetType: 'Host', targetIds: importedHosts.map(h => h.id), parameters: { count: importedHosts.length }, result: 'success' }); }}
        />

        {/* Reboot Confirmation Dialog */}
        <ConfirmDialog
          open={confirmReboot}
          onClose={() => setConfirmReboot(false)}
          onConfirm={() => {
            const targetIds = [...selectedIds];
            const targetNames = hosts.filter(h => targetIds.includes(h.id)).map(h => h.hostname);
            const jobId = 'job-' + Date.now();
            const job = {
              id: jobId,
              name: `Bulk Reboot — ${targetIds.length} hosts`,
              targets: targetIds,
              step: 'Queued (0/2)',
              progress: 0,
              startedAt: new Date().toISOString(),
              status: 'running',
            };
            addJob(job);
            appendAudit({
              action: 'power.reboot', actionCategory: 'Power',
              targetType: 'Host', targetIds,
              parameters: { mode: 'standard', jobId, hostnames: targetNames },
              result: 'success',
            });
            toast.success(`Reboot queued for ${targetIds.length} host(s). Monitor in Job Queue.`);
            setSelectedIds([]);
          }}
          title="Confirm Bulk Reboot"
          message={`This will reboot ${selectedIds.length} host(s). Any logged-on users will lose unsaved work. ${selectedIds.filter(id => (hosts.find(h => h.id === id)?.loggedOnUsers?.length || 0) > 0).length} host(s) currently have logged-on users.\n\nHosts with per-row credential overrides will use those credentials. Others will use the default credential profile.`}
          destructive
          confirmLabel="Reboot Now"
          targetCount={selectedIds.length}
        />

        {/* Right-click Context Menu */}
        {contextMenu && (
          <ContextMenu
            x={contextMenu.x}
            y={contextMenu.y}
            items={contextMenu.items}
            onClose={() => setContextMenu(null)}
          />
        )}
      </div>
    );
  };

  // Add Hosts Modal — Multi-method wizard with IP Scanner and CSV Import with column mapping
  const AddHostsModal = ({ open, onClose }) => {
    const toast = useToast();
    const { addHosts, hosts, appendAudit } = useApp();
    const [step, setStep] = useState(0);
    const [method, setMethod] = useState('single');
    const [entries, setEntries] = useState([{ hostname: '', ipAddress: '', macAddress: '' }]);
    const [pasteText, setPasteText] = useState('');
    const [tag, setTag] = useState('');
    const [site, setSite] = useState('HQ-DC');
    const [dept, setDept] = useState('IT');
    const [owner, setOwner] = useState('');
    const [notes, setNotes] = useState('');

    // IP Scanner state
    const [scanInput, setScanInput] = useState('10.10.1.1-10.10.1.50');
    const [scanning, setScanning] = useState(false);
    const [scanProgress, setScanProgress] = useState(0);
    const [scanResults, setScanResults] = useState([]);
    const [selectedScanIPs, setSelectedScanIPs] = useState(new Set());

    // CSV Import Wizard state
    const [csvData, setCsvData] = useState(null); // { headers, rows }
    const [columnMapping, setColumnMapping] = useState({ hostname: '', ipAddress: '', macAddress: '', site: '', department: '', owner: '', notes: '' });

    // AD Import state
    const [adOUPath, setAdOUPath] = useState('OU=Computers,DC=corp,DC=local');
    const [adSearchScope, setAdSearchScope] = useState('subtree');
    const [adFilter, setAdFilter] = useState('');
    const [adNameAttr, setAdNameAttr] = useState('cn');
    const [adIncludeIP, setAdIncludeIP] = useState(true);

    useEffect(() => { if (open) { setStep(0); setMethod('single'); setEntries([{ hostname: '', ipAddress: '', macAddress: '' }]); setPasteText(''); setTag(''); setOwner(''); setNotes(''); setScanResults([]); setCsvData(null); } }, [open]);

    const steps = [{ label: 'Input Method' }, { label: 'Host Details' }, { label: 'Assignment' }];

    // ---- IP Scanner: ping sweep a range/subnet ----
    const runScan = async () => {
      const ips = window.SupportHubLANScanner.parseScanInput(scanInput);
      if (ips.length === 0) { toast.warning('Enter a valid IP range (10.10.1.1-50), CIDR (10.10.1.0/24), or comma-separated IPs.'); return; }
      setScanning(true);
      setScanProgress(0);
      setScanResults([]);
      const results = [];
      for (let i = 0; i < ips.length; i++) {
        const ip = ips[i];
        const isAlive = await window.SupportHubLANScanner.pingIP(ip);
        results.push({ ip, alive: isAlive, hostname: isAlive ? `HOST-${ip.split('.').slice(2).join('')}` : '' });
        setScanProgress(Math.round(((i + 1) / ips.length) * 100));
        setScanResults([...results]);
      }
      setScanning(false);
      // Auto-select alive hosts
      const aliveSet = new Set(results.filter(r => r.alive).map(r => r.ip));
      setSelectedScanIPs(aliveSet);
      toast.success(`Scan complete: ${aliveSet.size} of ${ips.length} hosts responded.`);
    };

    // ---- CSV Import: parse pasted/loaded CSV and show column mapping ----
    const parseCSVInput = () => {
      if (!pasteText.trim()) { toast.warning('Paste CSV data first.'); return; }
      const parsed = window.SupportHubLANCSV.parseCSV(pasteText);
      if (parsed.headers.length === 0 || parsed.rows.length === 0) { toast.warning('No valid CSV data found.'); return; }
      setCsvData(parsed);
      // Auto-detect column mapping by header name
      const autoMap = { hostname: '', ipAddress: '', macAddress: '', site: '', department: '', owner: '', notes: '' };
      parsed.headers.forEach(h => {
        const lower = h.toLowerCase();
        if (!autoMap.hostname && (lower.includes('host') || lower.includes('computer') || lower.includes('name'))) autoMap.hostname = h;
        if (!autoMap.ipAddress && (lower.includes('ip') || lower.includes('address'))) autoMap.ipAddress = h;
        if (!autoMap.macAddress && lower.includes('mac')) autoMap.macAddress = h;
        if (!autoMap.site && lower.includes('site')) autoMap.site = h;
        if (!autoMap.department && (lower.includes('dept') || lower.includes('department'))) autoMap.department = h;
        if (!autoMap.owner && lower.includes('owner')) autoMap.owner = h;
        if (!autoMap.notes && lower.includes('note')) autoMap.notes = h;
      });
      setColumnMapping(autoMap);
      toast.success(`Parsed ${parsed.rows.length} rows with ${parsed.headers.length} columns. Map columns below.`);
    };

    // ---- Build host objects from any method ----
    const buildHosts = () => {
      const tags = ['workstation'];
      if (tag) tags.push(tag);
      if (dept.toLowerCase() === 'it' || dept.toLowerCase() === 'engineering') tags.push(dept.toLowerCase());
      const baseHost = (hostname, ip, mac) => ({
        id: 'h' + (Date.now() + Math.floor(Math.random() * 10000)),
        hostname, fqdn: `${hostname.toLowerCase()}.corp.local`, ipAddress: ip,
        macAddress: mac || '00:1A:2B:3C:4D:' + Math.floor(Math.random() * 256).toString(16).padStart(2, '0').toUpperCase(),
        osName: 'Windows 11 Pro', osVersion: '23H2', osBuild: '22631.3737',
        cpuModel: 'Intel Core i5-13500', ramGb: 16, diskUsedGb: 100, diskFreeGb: 200,
        uptime: '0d 0h', lastBootTime: new Date().toISOString(),
        onlineStatus: 'online', pingStatus: 'up', pendingReboot: false,
        patchState: 'unknown', lastSeen: new Date().toISOString(),
        loggedOnUsers: [], site, location: site, department: dept, owner: owner || 'unassigned',
        notes, tags, groupId: 'g-workstations', credentialProfileId: 'c-local-admin',
      });

      if (method === 'single') {
        return entries.filter(e => e.hostname && e.ipAddress).map(e => baseHost(e.hostname, e.ipAddress, e.macAddress));
      }
      if (method === 'paste') {
        return pasteText.split('\n').filter(Boolean).map(line => {
          const [hostname, ip] = line.split(',').map(s => s.trim());
          return hostname ? baseHost(hostname, ip || '', '') : null;
        }).filter(Boolean);
      }
      if (method === 'scan') {
        return scanResults.filter(r => selectedScanIPs.has(r.ip)).map(r => baseHost(r.hostname || `HOST-${r.ip.split('.').slice(2).join('')}`, r.ip, ''));
      }
      if (method === 'csv') {
        if (!csvData) return [];
        return csvData.rows.map(row => {
          const hostname = columnMapping.hostname ? row[columnMapping.hostname] : '';
          const ip = columnMapping.ipAddress ? row[columnMapping.ipAddress] : '';
          const mac = columnMapping.macAddress ? row[columnMapping.macAddress] : '';
          if (!hostname && !ip) return null;
          const h = baseHost(hostname || `HOST-${ip}`, ip, mac);
          if (columnMapping.site && row[columnMapping.site]) h.site = row[columnMapping.site];
          if (columnMapping.department && row[columnMapping.department]) h.department = row[columnMapping.department];
          if (columnMapping.owner && row[columnMapping.owner]) h.owner = row[columnMapping.owner];
          if (columnMapping.notes && row[columnMapping.notes]) h.notes = row[columnMapping.notes];
          return h;
        }).filter(Boolean);
      }
      if (method === 'ad') {
        return pasteText.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
          const [hostname, ip] = line.split(',').map(s => s.trim());
          return hostname ? baseHost(hostname, ip || '', '') : null;
        }).filter(Boolean);
      }
      if (method === 'mac') {
        return pasteText.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
          const mac = line.trim();
          return mac ? baseHost(`HOST-${mac.replace(/[:]/g, '')}`, '', mac) : null;
        }).filter(Boolean);
      }
      return [];
    };

    const handleAdd = () => {
      const newHosts = buildHosts();
      if (newHosts.length === 0) { toast.warning('No valid hosts to add. Enter data or run a scan first.'); return; }
      addHosts(newHosts);
      appendAudit({
        action: 'hosts.add', actionCategory: 'Inventory',
        targetType: 'Host', targetIds: newHosts.map(h => h.id),
        parameters: { method, count: newHosts.length, hostnames: newHosts.map(h => h.hostname) },
        result: 'success',
      });
      toast.success(`Added ${newHosts.length} host(s) to inventory`, { detail: newHosts.map(h => h.hostname).join(', ') });
      onClose();
    };

    const handleFileUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const text = ev.target.result;
        setPasteText(text);
        // Auto-parse if CSV method
        const parsed = window.SupportHubLANCSV.parseCSV(text);
        if (parsed.headers.length > 0 && parsed.rows.length > 0) {
          setCsvData(parsed);
          const autoMap = { hostname: '', ipAddress: '', macAddress: '', site: '', department: '', owner: '', notes: '' };
          parsed.headers.forEach(h => {
            const lower = h.toLowerCase();
            if (!autoMap.hostname && (lower.includes('host') || lower.includes('computer') || lower.includes('name'))) autoMap.hostname = h;
            if (!autoMap.ipAddress && (lower.includes('ip') || lower.includes('address'))) autoMap.ipAddress = h;
            if (!autoMap.macAddress && lower.includes('mac')) autoMap.macAddress = h;
            if (!autoMap.site && lower.includes('site')) autoMap.site = h;
            if (!autoMap.department && (lower.includes('dept') || lower.includes('department'))) autoMap.department = h;
            if (!autoMap.owner && lower.includes('owner')) autoMap.owner = h;
            if (!autoMap.notes && lower.includes('note')) autoMap.notes = h;
          });
          setColumnMapping(autoMap);
          toast.success(`Loaded ${file.name}: ${parsed.rows.length} rows, ${parsed.headers.length} columns detected.`);
        } else {
          toast.info(`Loaded ${file.name}. Paste data or switch to CSV method to parse.`);
        }
      };
      reader.readAsText(file);
    };

    return (
      <Modal open={open} onClose={onClose} title="Add Hosts" subtitle="Add manually, paste, CSV upload, IP scan, or AD import" size="lg"
        footer={
          <>
            <ActionButton variant="secondary" onClick={onClose}>Cancel</ActionButton>
            {step > 0 && <ActionButton variant="secondary" icon="ChevronLeft" onClick={() => setStep(s => s - 1)}>Back</ActionButton>}
            {step < 2 ? <ActionButton variant="primary" icon="ChevronRight" onClick={() => setStep(s => s + 1)}>Next</ActionButton>
                     : <ActionButton variant="primary" icon="Check" onClick={handleAdd}>Add Hosts</ActionButton>}
          </>
        }
      >
        <WizardStepper steps={steps} current={step} />

        {/* Step 0: Method Selection */}
        {step === 0 && (
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {[
              { id: 'single', icon: 'Plus', label: 'Single Entry', desc: 'Add one host at a time' },
              { id: 'paste', icon: 'Clipboard', label: 'Paste List', desc: 'Paste hostnames/IPs, one per line' },
              { id: 'csv', icon: 'FileUp', label: 'CSV Import Wizard', desc: 'Upload or paste CSV — map columns to fields' },
              { id: 'scan', icon: 'ScanLine', label: 'IP Range / Subnet Scan', desc: 'Ping sweep to discover live hosts' },
              { id: 'ad', icon: 'Network', label: 'Import from AD', desc: 'Pull computers from AD OU (simulated)' },
              { id: 'mac', icon: 'Cpu', label: 'By MAC Address', desc: 'Add WoL-enabled hosts by MAC' },
            ].map(m => (
              <button key={m.id} onClick={() => setMethod(m.id)} className={`flex items-start gap-3 p-3 rounded-lg border text-left ${method === m.id ? 'bg-primary/10 border-primary' : 'bg-surface-raised border-border hover:border-text-dim'}`}>
                <Icon name={m.icon} size={18} className={method === m.id ? 'text-primary' : 'text-text-dim'} />
                <div>
                  <div className="text-xs font-medium text-text">{m.label}</div>
                  <div className="text-[11px] text-text-dim mt-0.5">{m.desc}</div>
                </div>
              </button>
            ))}
          </div>
        )}

        {/* Step 1: Method-specific input */}
        {step === 1 && method === 'single' && (
          <div className="space-y-2">
            {entries.map((e, i) => (
              <div key={i} className="grid grid-cols-1 sm:grid-cols-3 gap-2 p-2 bg-surface-raised rounded border border-border">
                <FormField label="Hostname" required><Input value={e.hostname} onChange={(ev) => setEntries(es => es.map((x,idx) => idx===i ? {...x, hostname: ev.target.value} : x))} placeholder="WS001-ENG" className="font-mono" /></FormField>
                <FormField label="IP Address" required><Input value={e.ipAddress} onChange={(ev) => setEntries(es => es.map((x,idx) => idx===i ? {...x, ipAddress: ev.target.value} : x))} placeholder="10.10.20.101" className="font-mono" /></FormField>
                <FormField label="MAC Address"><Input value={e.macAddress} onChange={(ev) => setEntries(es => es.map((x,idx) => idx===i ? {...x, macAddress: ev.target.value} : x))} placeholder="00:1A:2B:3C:4D:00" className="font-mono" /></FormField>
              </div>
            ))}
            <ActionButton variant="ghost" size="sm" icon="Plus" onClick={() => setEntries(es => [...es, { hostname: '', ipAddress: '', macAddress: '' }])}>Add another</ActionButton>
          </div>
        )}

        {step === 1 && method === 'paste' && (
          <FormField label="Paste Host List" hint="One host per line. Format: hostname,ipAddress OR just hostname">
            <Textarea rows={8} value={pasteText} onChange={(e) => setPasteText(e.target.value)} placeholder={'WS001-ENG,10.10.20.101\nWS002-ENG,10.10.20.102\nWS003-FIN,10.10.30.101'} />
          </FormField>
        )}

        {/* CSV Import Wizard with Column Mapping */}
        {step === 1 && method === 'csv' && (
          <div className="space-y-4">
            <div className="flex gap-2 items-end">
              <FormField label="Upload CSV File" className="flex-1">
                <input type="file" accept=".csv,.txt" onChange={handleFileUpload} className="text-xs text-text-dim file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:bg-primary file:text-white file:text-xs file:cursor-pointer" />
              </FormField>
              <ActionButton variant="secondary" size="sm" icon="FileText" onClick={parseCSVInput}>Parse Pasted Text</ActionButton>
            </div>
            <FormField label="Or Paste CSV Content" hint="First line should be headers (e.g. ComputerName,IPAddress,MACAddress)">
              <Textarea rows={4} value={pasteText} onChange={(e) => setPasteText(e.target.value)} placeholder={'ComputerName,IPAddress,MACAddress\nWS001-ENG,10.10.20.101,00:1A:2B:3C:4D:01\nWS002-ENG,10.10.20.102,00:1A:2B:3C:4D:02'} className="font-mono text-[11px]" />
            </FormField>

            {csvData && (
              <>
                <div className="p-3 bg-info/10 border border-info/30 rounded text-xs text-info">
                  <Icon name="CheckCircle2" size={12} className="inline mr-1.5" />
                  Parsed {csvData.rows.length} rows with {csvData.headers.length} columns: {csvData.headers.join(', ')}
                </div>
                <div className="p-3 bg-surface-raised rounded border border-border">
                  <div className="text-meta text-text-dim uppercase mb-2">Column Mapping — Map CSV columns to supporthublan fields</div>
                  <div className="grid grid-cols-2 gap-2">
                    {[
                      { field: 'hostname', label: 'Hostname / Computer Name', required: true },
                      { field: 'ipAddress', label: 'IP Address' },
                      { field: 'macAddress', label: 'MAC Address' },
                      { field: 'site', label: 'Site / Location' },
                      { field: 'department', label: 'Department' },
                      { field: 'owner', label: 'Owner' },
                      { field: 'notes', label: 'Notes' },
                    ].map(({ field, label, required }) => (
                      <FormField key={field} label={label} required={required}>
                        <Select value={columnMapping[field]} onChange={e => setColumnMapping(m => ({...m, [field]: e.target.value}))}>
                          <option value="">— Not mapped —</option>
                          {csvData.headers.map(h => <option key={h} value={h}>{h}</option>)}
                        </Select>
                      </FormField>
                    ))}
                  </div>
                </div>
                {/* Preview first 5 mapped rows */}
                <div>
                  <div className="text-meta text-text-dim uppercase mb-1">Preview (first 5 rows)</div>
                  <DataTable
                    selectable={false}
                    columns={[
                      { key: 'hostname', label: 'Hostname', render: r => <span className="font-mono text-text">{r.hostname || '—'}</span> },
                      { key: 'ipAddress', label: 'IP', render: r => <span className="font-mono text-text-dim">{r.ip || '—'}</span> },
                      { key: 'mac', label: 'MAC', render: r => <span className="font-mono text-text-dim text-[10px]">{r.mac || '—'}</span> },
                    ]}
                    rows={csvData.rows.slice(0, 5).map((row, i) => ({
                      id: i,
                      hostname: columnMapping.hostname ? row[columnMapping.hostname] : '',
                      ip: columnMapping.ipAddress ? row[columnMapping.ipAddress] : '',
                      mac: columnMapping.macAddress ? row[columnMapping.macAddress] : '',
                    }))}
                    onRowClick={() => {}}
                    maxRows={5}
                  />
                </div>
              </>
            )}
          </div>
        )}

        {/* IP Range / Subnet Scanner */}
        {step === 1 && method === 'scan' && (
          <div className="space-y-3">
            <FormField label="IP Range, CIDR, or comma-separated IPs" hint="Examples: 10.10.1.1-50  |  10.10.1.0/24  |  10.10.1.5,10.10.1.10,10.10.1.15">
              <div className="flex gap-2">
                <Input value={scanInput} onChange={e => setScanInput(e.target.value)} placeholder="10.10.1.1-50" className="font-mono" onKeyDown={e => { if (e.key === 'Enter' && !scanning) runScan(); }} />
                <ActionButton variant="primary" icon="ScanLine" onClick={runScan} disabled={scanning}>{scanning ? `Scanning... ${scanProgress}%` : 'Start Scan'}</ActionButton>
              </div>
            </FormField>

            {scanning && (
              <div className="p-3 bg-info/10 border border-info/30 rounded">
                <div className="flex items-center gap-2 text-xs text-info mb-2">
                  <Icon name="Loader2" size={14} className="animate-spin" />
                  Scanning... {scanProgress}% complete
                </div>
                <ProgressBar value={scanProgress} color="info" />
              </div>
            )}

            {scanResults.length > 0 && (
              <div>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-meta text-text-dim uppercase">Scan Results — {scanResults.filter(r => r.alive).length} alive of {scanResults.length} scanned</span>
                  <div className="flex gap-1">
                    <ActionButton size="xs" variant="ghost" onClick={() => setSelectedScanIPs(new Set(scanResults.filter(r => r.alive).map(r => r.ip)))}>Select All Alive</ActionButton>
                    <ActionButton size="xs" variant="ghost" onClick={() => setSelectedScanIPs(new Set())}>Clear</ActionButton>
                  </div>
                </div>
                <div className="max-h-60 overflow-y-auto border border-border rounded">
                  <table className="w-full text-xs">
                    <thead><tr className="bg-surface-raised border-b border-border">
                      <th className="px-2 py-1 w-8"></th>
                      <th className="px-2 py-1 text-left text-meta text-text-dim uppercase">IP Address</th>
                      <th className="px-2 py-1 text-left text-meta text-text-dim uppercase">Status</th>
                      <th className="px-2 py-1 text-left text-meta text-text-dim uppercase">Hostname (auto)</th>
                    </tr></thead>
                    <tbody>
                      {scanResults.map(r => (
                        <tr key={r.ip} className={`border-b border-border/50 ${r.alive ? 'hover:bg-surface-raised cursor-pointer' : 'opacity-50'}`} onClick={() => { if (r.alive) { const s = new Set(selectedScanIPs); if (s.has(r.ip)) s.delete(r.ip); else s.add(r.ip); setSelectedScanIPs(s); } }}>
                          <td className="px-2 py-1">{r.alive && <input type="checkbox" checked={selectedScanIPs.has(r.ip)} onChange={() => {}} className="accent-primary" />}</td>
                          <td className="px-2 py-1 font-mono text-text">{r.ip}</td>
                          <td className="px-2 py-1">{r.alive ? <span className="text-success flex items-center gap-1"><Icon name="Circle" size={8} /> Online</span> : <span className="text-danger flex items-center gap-1"><Icon name="CircleOff" size={8} /> Offline</span>}</td>
                          <td className="px-2 py-1 font-mono text-text-dim text-[10px]">{r.alive ? r.hostname : '—'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="text-xs text-text-dim mt-2">{selectedScanIPs.size} host(s) selected for import. Hostnames will be auto-generated — you can edit them after import.</div>
              </div>
            )}
          </div>
        )}

        {step === 1 && method === 'ad' && (
          <div className="space-y-3">
            <div className="p-3 bg-info/10 border border-info/30 rounded text-xs text-info">
              <Icon name="Info" size={12} className="inline mr-1.5" />
              Import computers from Active Directory. Enter the AD OU path or LDAP filter to search for computer objects.
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <FormField label="AD OU Path (LDAP Distinguished Name)" hint="e.g. OU=Computers,DC=corp,DC=local" className="md:col-span-2">
                <Input value={adOUPath} onChange={e => setAdOUPath(e.target.value)} placeholder="OU=Computers,DC=corp,DC=local" className="font-mono text-[11px]" />
              </FormField>
              <FormField label="Search Scope"><Select value={adSearchScope} onChange={e => setAdSearchScope(e.target.value)}><option value="subtree">Subtree (search all child OUs)</option><option value="onelevel">One Level (direct children only)</option><option value="base">Base (only this OU)</option></Select></FormField>
              <FormField label="Filter (optional)" hint="LDAP filter, e.g. (objectCategory=computer)"><Input value={adFilter} onChange={e => setAdFilter(e.target.value)} placeholder="(objectCategory=computer)" className="font-mono text-[11px]" /></FormField>
              <FormField label="Name Attribute"><Select value={adNameAttr} onChange={e => setAdNameAttr(e.target.value)}><option value="cn">cn (Common Name)</option><option value="name">name</option><option value="dNSHostName">dNSHostName (FQDN)</option><option value="sAMAccountName">sAMAccountName</option></Select></FormField>
              <FormField label="Include IP Address"><Select value={adIncludeIP ? 'yes' : 'no'} onChange={e => setAdIncludeIP(e.target.value === 'yes')}><option value="yes">Yes — resolve hostname to IP</option><option value="no">No — hostname only</option></Select></FormField>
            </div>
            <div className="flex gap-2">
              <ActionButton variant="primary" size="sm" icon="Search" onClick={async () => {
                if (!adOUPath) { toast.warning('Enter an AD OU path.'); return; }
                toast.info(`Searching AD: ${adOUPath}…`);
                // Try real API
                if (window.SupportHubLANAPI) {
                  try {
                    const result = await fetch((window.SUPPORTHUBLAN_API_URL || 'http://localhost:3137') + '/api/hosts/discover-ad', {
                      method: 'POST', headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ ouPath: adOUPath, searchScope: adSearchScope, filter: adFilter, nameAttr: adNameAttr })
                    });
                    const data = await result.json();
                    if (data.success && data.hosts) {
                      setPasteText(data.hosts.map(h => `${h.name},${h.ip || ''}`).join('\n'));
                      toast.success(`Found ${data.hosts.length} computers in AD.`);
                      return;
                    }
                  } catch (e) {}
                }
                // Demo: simulate AD results
                const demoHosts = ['DC01-HQ','DC02-HQ','FS01-HQ','SQL01-HQ','IIS01-HQ','WS001-ENG','WS002-ENG','WS003-FIN','WS004-SAL','WS005-HR','NYC-DC01','NYC-FS01','LON-DC01','LON-SQL01','TKY-WS001'];
                setPasteText(demoHosts.join('\n'));
                toast.success(`Found ${demoHosts.length} computers in AD (demo).`);
              }}>Search AD</ActionButton>
              <ActionButton variant="secondary" size="sm" icon="Network" onClick={() => setAdOUPath('OU=Computers,DC=corp,DC=local')}>Use Default OU</ActionButton>
            </div>
            {pasteText && (
              <div>
                <div className="text-meta text-text-dim uppercase mb-1">AD Search Results ({pasteText.split('\n').filter(Boolean).length} computers found)</div>
                <div className="max-h-40 overflow-y-auto p-2 bg-surface-raised rounded border border-border font-mono text-[10px] text-text-dim">
                  {pasteText.split('\n').filter(Boolean).map((line, i) => <div key={i}>{line}</div>)}
                </div>
              </div>
            )}
          </div>
        )}

        {step === 1 && method === 'mac' && (
          <FormField label="Paste MAC Addresses" hint="One MAC per line for WoL hosts">
            <Textarea rows={6} value={pasteText} onChange={(e) => setPasteText(e.target.value)} placeholder={'00:1A:2B:3C:4D:01\n00:1A:2B:3C:4D:02'} className="font-mono text-[11px]" />
          </FormField>
        )}

        {/* Step 2: Assignment */}
        {step === 2 && (
          <div className="grid grid-cols-2 gap-3">
            <FormField label="Tag (optional)"><Input value={tag} onChange={e => setTag(e.target.value)} placeholder="engineering" /></FormField>
            <FormField label="Site"><Select value={site} onChange={e => setSite(e.target.value)}>{SITES.map(s => <option key={s}>{s}</option>)}</Select></FormField>
            <FormField label="Department"><Select value={dept} onChange={e => setDept(e.target.value)}>{DEPARTMENTS.map(d => <option key={d}>{d}</option>)}</Select></FormField>
            <FormField label="Owner"><Input value={owner} onChange={e => setOwner(e.target.value)} placeholder="j.martin" /></FormField>
            <FormField label="Notes" className="col-span-2"><Textarea rows={2} value={notes} onChange={e => setNotes(e.target.value)} placeholder="Optional notes about these hosts…" /></FormField>
            <div className="col-span-2 p-2 bg-info/10 border border-info/30 rounded text-xs text-info">
              <Icon name="Info" size={12} className="inline mr-1.5" />
              {method === 'scan' ? `${selectedScanIPs.size} scanned host(s) will be imported.` :
               method === 'csv' && csvData ? `${csvData.rows.length} CSV row(s) will be imported (only rows with mapped hostname or IP).` :
               `${buildHosts().length} host(s) will be imported.`}
            </div>
          </div>
        )}
      </Modal>
    );
  };

  // ---- Encrypted Grid Export/Import ----
  const exportGrid = async (hosts, filename, encrypt, password) => {
    const data = JSON.stringify(hosts, null, 2);
    let content, ext, mime;
    if (encrypt) {
      if (!password) { return { error: 'Password required for encryption' }; }
      content = 'SHLENC:' + await window.SupportHubLANCrypto.encrypt(data, password);
      ext = '.bps'; mime = 'application/octet-stream';
    } else {
      content = data; ext = '.json'; mime = 'application/json';
    }
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = (filename || 'supporthublan-grid-export') + ext; a.click();
    URL.revokeObjectURL(url);
    return { success: true, count: hosts.length, encrypted: encrypt };
  };

  const importGrid = async (text, password) => {
    if (text.startsWith('SHLENC:')) {
      if (!password) { return { error: 'This file is encrypted. Enter the password to decrypt.' }; }
      try {
        const decrypted = await window.SupportHubLANCrypto.decrypt(text.substring(6), password);
        return { hosts: JSON.parse(decrypted), encrypted: true };
      } catch (e) { return { error: 'Decryption failed. Wrong password?' }; }
    }
    try { return { hosts: JSON.parse(text), encrypted: false }; }
    catch (e) { return { error: 'Invalid file format' }; }
  };

  // ---- Encrypted Export/Import Modal ----
  const GridFileModal = ({ open, onClose, mode, hosts, onImport }) => {
    const toast = useToast();
    const [password, setPassword] = useState('');
    const [encrypt, setEncrypt] = useState(true);
    const [filename, setFilename] = useState('supporthublan-grid');
    const [importText, setImportText] = useState('');
    const [importError, setImportError] = useState('');

    const handleExport = async () => {
      const result = await exportGrid(hosts, filename, encrypt, password);
      if (result.error) { toast.warning(result.error); return; }
      toast.success(`Exported ${result.count} hosts to ${filename}.${result.encrypted ? 'bps (encrypted)' : 'json'}`);
      onClose();
    };

    const handleImport = async () => {
      setImportError('');
      const result = await importGrid(importText, password);
      if (result.error) { setImportError(result.error); toast.warning(result.error); return; }
      if (result.hosts && result.hosts.length > 0) {
        onImport(result.hosts);
        toast.success(`Imported ${result.hosts.length} hosts from ${result.encrypted ? 'encrypted .bps file' : 'JSON file'}`);
        onClose();
      } else { setImportError('No hosts found in file'); }
    };

    const handleFileUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => { setImportText(ev.target.result); toast.info(`Loaded ${file.name} (${(file.size / 1024).toFixed(1)} KB)`); };
      reader.readAsText(file);
    };

    return (
      <Modal open={open} onClose={onClose} title={mode === 'export' ? 'Export Grid (Save to File)' : 'Import Grid (Load from File)'} size="md"
        footer={<>
          <ActionButton variant="secondary" onClick={onClose}>Cancel</ActionButton>
          {mode === 'export'
            ? <ActionButton variant="primary" icon="Download" onClick={handleExport}>Export</ActionButton>
            : <ActionButton variant="primary" icon="Upload" onClick={handleImport}>Import</ActionButton>}
        </>}>
        <div className="space-y-3">
          {mode === 'export' ? (
            <>
              <div className="p-2 bg-info/10 border border-info/30 rounded text-xs text-info">
                <Icon name="Info" size={12} className="inline mr-1.5" />
                Export {hosts.length} hosts to a file. Encrypted files use AES-256 (like BatchPatch .bps files).
              </div>
              <FormField label="File Name"><Input value={filename} onChange={e => setFilename(e.target.value)} placeholder="supporthublan-grid" /></FormField>
              <FormField label="Encryption">
                <div className="flex gap-2">
                  <button onClick={() => setEncrypt(true)} className={`px-3 py-1.5 text-xs rounded border ${encrypt ? 'border-primary bg-primary/10 text-primary' : 'border-border bg-surface-raised text-text-dim'}`}>Encrypted (.bps) — AES-256</button>
                  <button onClick={() => setEncrypt(false)} className={`px-3 py-1.5 text-xs rounded border ${!encrypt ? 'border-primary bg-primary/10 text-primary' : 'border-border bg-surface-raised text-text-dim'}`}>Plain JSON (.json)</button>
                </div>
              </FormField>
              {encrypt && <FormField label="Encryption Password" required hint="Required for encrypted export. Without this password, the file cannot be opened."><Input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter a strong password" /></FormField>}
            </>
          ) : (
            <>
              <FormField label="Upload File">
                <input type="file" accept=".bps,.json,.csv,.txt" onChange={handleFileUpload} className="text-xs text-text-dim file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:bg-primary file:text-white file:text-xs file:cursor-pointer" />
              </FormField>
              <FormField label="Or Paste File Contents">
                <Textarea rows={4} value={importText} onChange={e => setImportText(e.target.value)} placeholder="Paste .bps (encrypted) or JSON content here…" className="font-mono text-[10px]" />
              </FormField>
              {importText.startsWith('SHLENC:') && (
                <FormField label="Decryption Password" required hint="This file is encrypted. Enter the password to decrypt.">
                  <Input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter password" />
                </FormField>
              )}
              {importError && <div className="p-2 bg-danger/10 border border-danger/30 rounded text-xs text-danger"><Icon name="AlertTriangle" size={12} className="inline mr-1.5" />{importError}</div>}
            </>
          )}
        </div>
      </Modal>
    );
  };
  /* __SCREEN_INVENTORY_END__ */
  /* ========================================================================
     SCREEN 03 — WINDOWS UPDATES
     ====================================================================== */

  const UpdatesScreen = () => {
    const { route, openHost, hosts, updateHosts, addJob, appendAudit, patchHistory, executePowerAction } = useApp();
    const toast = useToast();
    const [activeTab, setActiveTab] = useState('scan');
    const [search, setSearch] = useState('');
    const [selectedIds, setSelectedIds] = useState([]);
    const [showClassModal, setShowClassModal] = useState(false);
    const [showServerSelModal, setShowServerSelModal] = useState(false);
    const [simulating, setSimulating] = useState(false);
    const [simStep, setSimStep] = useState(0);

    useEffect(() => {
      if (route.params?.filter === 'critical') setFilters({ patchState: 'critical' });
      else if (route.params?.filter === 'updates-available') setFilters({ patchState: 'updates-available' });
    }, [route.params]);

    const [filters, setFilters] = useState({});
    const simSteps = ['Scanning (1/5)', 'Downloading (2/5)', 'Installing (3/5)', 'Rebooting (4/5)', 'Verifying (5/5)'];

    const runSimulation = () => {
      if (selectedIds.length === 0) { toast.warning('Select at least one host to install updates on.'); return; }
      setSimulating(true);
      setSimStep(0);
      // Capture the snapshot of selected ids (closure-safe) and the hostnames for the audit log
      const targetIds = [...selectedIds];
      const targetNames = hosts.filter(h => targetIds.includes(h.id)).map(h => h.hostname);
      const jobId = 'job-' + Date.now();
      // Create a job entry to track in the Job Queue
      addJob({
        id: jobId,
        name: `Install Updates — ${targetIds.length} hosts`,
        targets: targetIds,
        step: simSteps[0],
        progress: 20,
        startedAt: new Date().toISOString(),
        status: 'running',
      });
      appendAudit({
        action: 'updates.install', actionCategory: 'Updates',
        targetType: 'Host', targetIds,
        parameters: { mode: 'all', reboot: 'if-required', jobId, hostnames: targetNames },
        result: 'success',
      });
      const interval = setInterval(() => {
        setSimStep(s => {
          if (s >= 4) {
            clearInterval(interval);
            setSimulating(false);
            // Actually flip selected hosts to compliant + clear pendingReboot
            updateHosts(prev => prev.map(h => targetIds.includes(h.id) ? { ...h, patchState: 'compliant', pendingReboot: false } : h));
            appendAudit({
              action: 'updates.install.complete', actionCategory: 'Updates',
              targetType: 'Host', targetIds,
              parameters: { jobId, hostnames: targetNames, installed: targetNames.length },
              result: 'success',
            });
            toast.success(`Update complete — ${targetIds.length} host(s) now compliant`);
            return 0;
          }
          return s + 1;
        });
      }, 1200);
    };

    const filteredHosts = useMemo(() => {
      let list = hosts.map(h => ({...h, id: h.id, status: h.onlineStatus}));
      if (search) {
        const q = search.toLowerCase();
        list = list.filter(h => h.hostname.toLowerCase().includes(q));
      }
      if (filters.patchState) list = list.filter(h => h.patchState === filters.patchState);
      if (filters.site) list = list.filter(h => h.site === filters.site);
      return list;
    }, [hosts, search, filters]);

    const updateColumns = [
      { key: 'hostname', label: 'Hostname', mono: true, render: (h) => <span className="font-mono text-text">{h.hostname}</span> },
      { key: 'status', label: 'Status', render: (h) => {
        if (simulating && selectedIds.includes(h.id)) return <StatusBadge variant="running" label={simSteps[simStep]} size="xs" />;
        if (h.patchState === 'compliant') return <StatusBadge variant="complete" size="xs" />;
        if (h.pendingReboot) return <StatusBadge variant="reboot-pending" size="xs" />;
        return <StatusBadge variant="queued" label="READY" size="xs" />;
      } },
      { key: 'available', label: 'Available', render: (h) => <span className="tnum">{h.patchState === 'compliant' ? 0 : h.patchState === 'critical' ? 5 : 3}</span> },
      { key: 'critical', label: 'Critical', render: (h) => h.patchState === 'critical' ? <Badge color="danger">3</Badge> : <span className="text-text-dim">0</span> },
      { key: 'security', label: 'Security', render: (h) => h.patchState !== 'compliant' ? <Badge color="warning">2</Badge> : <span className="text-text-dim">0</span> },
      { key: 'lastScan', label: 'Last Scan', render: (h) => <span className="text-text-dim">{fmtRel(h.lastSeen)}</span> },
      { key: 'lastInstall', label: 'Last Install', render: (h) => <span className="text-text-dim">{fmtRel(h.lastBootTime)}</span> },
      { key: 'pendingReboot', label: 'Pend. Reboot', render: (h) => h.pendingReboot ? <Badge color="warning">YES</Badge> : <Badge color="muted">NO</Badge> },
      { key: 'patchState', label: 'Compliance', render: (h) => <StatusBadge variant={h.patchState} size="xs" /> },
      { key: 'progress', label: 'Progress', render: (h) => simulating && selectedIds.includes(h.id) ? <ProgressBar value={(simStep+1)*20} color="info" className="w-24" /> : <span className="text-text-dim">—</span> },
    ];

    const bulkActions = [
      { label: 'Check Updates', icon: 'Search', onClick: async () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        const targetNames = hosts.filter(h => selectedIds.includes(h.id)).map(h => h.hostname);
        addJob({ id: 'job-' + Date.now(), name: `Scan — ${selectedIds.length} hosts`, targets: [...selectedIds], step: 'Scanning (1/3)', progress: 5, startedAt: new Date().toISOString(), status: 'running' });
        appendAudit({ action: 'updates.scan', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: { source: 'updates-bulk' }, result: 'success' });
        toast.info(`Scanning ${selectedIds.length} hosts for updates…`);
        // Try real API
        if (window.SupportHubLANAPI) {
          const result = await window.SupportHubLANAPI.scanUpdates(targetNames, null);
          if (result.success && !result.demo) { toast.success(`Real scan complete for ${targetNames.length} hosts.`); }
        }
      } },
      { label: 'Download', icon: 'Download', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        addJob({ id: 'job-' + Date.now(), name: `Download Updates — ${selectedIds.length} hosts`, targets: [...selectedIds], step: 'Downloading (1/2)', progress: 10, startedAt: new Date().toISOString(), status: 'running' });
        appendAudit({ action: 'updates.download', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: {}, result: 'success' });
        toast.info(`Downloading updates on ${selectedIds.length} hosts…`);
      } },
      { label: 'Install All', icon: 'ShieldCheck', onClick: async () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        const targetNames = hosts.filter(h => selectedIds.includes(h.id)).map(h => h.hostname);
        // Try real API first
        if (window.SupportHubLANAPI) {
          const result = await window.SupportHubLANAPI.installUpdates(targetNames, null, { rebootBehavior: 'if-required' });
          if (result.success && !result.demo) { toast.success(`Real install initiated on ${targetNames.length} hosts.`); return; }
        }
        // Demo fallback
        runSimulation();
      } },
      { label: 'Install by Class', icon: 'Filter', onClick: () => setShowClassModal(true) },
      { label: 'Hide Updates', icon: 'EyeOff', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        appendAudit({ action: 'updates.hide', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: {}, result: 'success' });
        toast.success(`Hiding available updates on ${selectedIds.length} host(s).`);
      } },
      { label: 'Unhide Updates', icon: 'Eye', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        appendAudit({ action: 'updates.unhide', actionCategory: 'Updates', targetType: 'Host', targetIds: [...selectedIds], parameters: {}, result: 'success' });
        toast.success(`Unhiding updates on ${selectedIds.length} host(s).`);
      } },
      { label: 'Reboot if Req.', icon: 'Power', onClick: () => {
        if (selectedIds.length === 0) { toast.warning('Select at least one host.'); return; }
        const pendingIds = selectedIds.filter(id => hosts.find(h => h.id === id)?.pendingReboot);
        if (pendingIds.length === 0) { toast.info('No selected hosts have pending reboot.'); return; }
        executePowerAction({ action: 'reboot', targetIds: pendingIds });
        toast.success(`Rebooting ${pendingIds.length} host(s) with pending reboot flag.`);
      } },
      { label: 'Server Selection', icon: 'Server', onClick: () => setShowServerSelModal(true) },
    ];

    const compliantCount = hosts.filter(h => h.patchState === 'compliant').length;
    const updatesAvail = hosts.filter(h => h.patchState === 'updates-available').length;
    const criticalCount = hosts.filter(h => h.patchState === 'critical').length;
    const unknownCount = hosts.filter(h => h.patchState === 'unknown').length;
    const total = hosts.length;

    return (
      <div className="space-y-3">
        <PageHeader
          breadcrumb={['supporthublan', 'Windows Updates']}
          title="Patch Management"
          subtitle={`${updatesAvail + criticalCount} hosts need attention · ${criticalCount} critical`}
          actions={
            <>
              <ActionButton variant="secondary" icon="Download" onClick={() => {
                const csv = ['hostname,kb,title,classification,installedOn,status,installedBy'].concat(patchHistory.map(p => [p.hostname, p.kb, p.title, p.classification, p.installedOn || '', p.status, p.installedBy || ''].join(',')).join('\n'));
                const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'patch-report.csv'; a.click(); URL.revokeObjectURL(url);
                toast.success(`Exported ${patchHistory.length} patch records to CSV`);
              }}>Export</ActionButton>
              <ActionButton variant="secondary" icon="RefreshCw" onClick={() => {
                const targetIds = selectedIds.length > 0 ? [...selectedIds] : hosts.filter(h => h.onlineStatus === 'online').map(h => h.id);
                addJob({ id: 'job-' + Date.now(), name: `Reconnect Windows Update — ${targetIds.length} hosts`, targets: targetIds, step: 'Reconnecting (1/1)', progress: 20, startedAt: new Date().toISOString(), status: 'running' });
                appendAudit({ action: 'updates.reconnect', actionCategory: 'Updates', targetType: 'Host', targetIds, parameters: {}, result: 'success' });
                toast.success(`Reconnecting Windows Update service on ${targetIds.length} host(s)…`);
              }}>Reconnect WU</ActionButton>
              <ActionButton variant="primary" icon="ShieldCheck" onClick={() => { setSelectedIds(hosts.filter(h => h.patchState !== 'compliant').map(h => h.id)); toast.info(`Selected ${hosts.filter(h => h.patchState !== 'compliant').length} non-compliant hosts`); }}>Patch All Non-Compliant</ActionButton>
            </>
          }
        />

        <TabGroup
          tabs={[
            { id: 'scan', label: 'Scan Results', icon: 'Search' },
            { id: 'history', label: 'Update History', icon: 'History' },
            { id: 'compliance', label: 'Compliance Report', icon: 'ShieldCheck' },
            { id: 'cached', label: 'Cached Mode', icon: 'HardDrive' },
            { id: 'offline', label: 'Offline Mode', icon: 'WifiOff' },
            { id: 'wsus', label: 'WSUS Settings', icon: 'Server' },
          ]}
          active={activeTab}
          onChange={setActiveTab}
        />

        {activeTab === 'scan' && (
          <>
            <FilterBar
              search={search}
              onSearchChange={setSearch}
              searchPlaceholder="Search by hostname…"
              filters={[
                { key: 'patchState', label: 'All Patch States', options: [{value:'compliant',label:'Compliant'},{value:'updates-available',label:'Updates Available'},{value:'critical',label:'Critical'},{value:'unknown',label:'Unknown'}] },
                { key: 'site', label: 'All Sites', options: SITES.map(s => ({value:s,label:s})) },
              ]}
              activeFilters={filters}
              onFilterChange={(k,v) => setFilters(f => ({...f, [k]: v}))}
            />
            <BulkActionBar selectedCount={selectedIds.length} actions={bulkActions} onClear={() => setSelectedIds([])} />
            <SectionCard bodyClassName="p-0">
              <DataTable
                columns={updateColumns}
                rows={filteredHosts}
                selectedIds={selectedIds}
                onSelectionChange={setSelectedIds}
                onRowClick={(row) => openHost(hosts.find(h => h.id === row.id))}
                maxRows={15}
                emptyMessage="No hosts match filters."
              />
            </SectionCard>

            {/* Per-host expansion example: pending updates for the first non-compliant host */}
            <SectionCard title="Pending Updates Detail" description="Updates available on the first non-compliant selected host">
              {(() => {
                const h = hosts.find(x => selectedIds.includes(x.id) && x.patchState !== 'compliant') || hosts.find(x => x.patchState !== 'compliant');
                if (!h) return <EmptyState icon="ShieldCheck" title="All compliant" description="No pending updates to display." />;
                return (
                  <div className="space-y-1.5">
                    <div className="text-xs text-text-dim mb-2">Showing pending updates for <span className="font-mono text-text">{h.hostname}</span></div>
                    {KB_CATALOG.slice(0, 5).map(kb => (
                      <div key={kb.kb} className="flex items-center gap-3 p-2 bg-surface-raised rounded border border-border">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2">
                            <span className="font-mono text-xs text-text">{kb.kb}</span>
                            <Badge color={kb.severity === 'Critical' ? 'danger' : kb.severity === 'Important' ? 'warning' : 'info'}>{kb.severity}</Badge>
                            <Badge color="muted">{kb.classification}</Badge>
                          </div>
                          <div className="text-[11px] text-text-dim mt-0.5 truncate">{kb.title}</div>
                        </div>
                        <span className="text-[10px] text-text-dim tnum">{kb.size} MB</span>
                        <ActionButton size="xs" variant="ghost" icon="Download">Download</ActionButton>
                        <ActionButton size="xs" variant="ghost" icon="EyeOff">Hide</ActionButton>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </SectionCard>
          </>
        )}

        {activeTab === 'history' && (
          <>
            <FilterBar
              search={search}
              onSearchChange={setSearch}
              searchPlaceholder="Search by KB or hostname…"
              filters={[
                { key: 'classification', label: 'All Classifications', options: [{value:'Security Updates',label:'Security Updates'},{value:'Updates',label:'Updates'},{value:'Definition Updates',label:'Definition Updates'},{value:'Update Rollups',label:'Update Rollups'}] },
                { key: 'status', label: 'All Status', options: [{value:'Installed',label:'Installed'},{value:'Failed',label:'Failed'},{value:'Pending',label:'Pending'}] },
              ]}
              activeFilters={filters}
              onFilterChange={(k,v) => setFilters(f => ({...f, [k]: v}))}
              right={<ActionButton variant="secondary" size="sm" icon="Download" onClick={() => {
                const csv = ['hostname,kb,title,classification,installedOn,status,installedBy'].concat(patchHistory.map(p => [p.hostname, p.kb, p.title, p.classification, p.installedOn || '', p.status, p.installedBy || ''].join(',')).join('\n'));
                const blob = new Blob([csv], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'patch-history.csv'; a.click(); URL.revokeObjectURL(url);
                toast.success(`Exported ${patchHistory.length} records to CSV`);
              }}>Export</ActionButton>}
            />
            <SectionCard bodyClassName="p-0">
              <DataTable
                columns={[
                  { key: 'hostname', label: 'Hostname', mono: true, render: r => <span className="font-mono text-text">{r.hostname}</span> },
                  { key: 'kb', label: 'KB', mono: true, render: r => <span className="font-mono text-text">{r.kb}</span> },
                  { key: 'title', label: 'Title' },
                  { key: 'classification', label: 'Class' },
                  { key: 'installedOn', label: 'Installed On', render: r => <span className="text-text-dim">{fmtRel(r.installedOn)}</span> },
                  { key: 'status', label: 'Status', render: r => <StatusBadge variant={r.status === 'Installed' ? 'installed' : r.status === 'Failed' ? 'failed' : 'pending'} size="xs" /> },
                  { key: 'installedBy', label: 'Installed By' },
                  { key: 'actions', label: 'Actions', render: (r) => r.status === 'Installed' ? (
                    <ActionButton size="xs" variant="danger" icon="Trash" onClick={() => {
                      appendAudit({ action: 'updates.uninstall', actionCategory: 'Updates', targetType: 'Host', targetIds: [], parameters: { hostname: r.hostname, kb: r.kb }, result: 'success' });
                      toast.warning(`Uninstalling ${r.kb} from ${r.hostname}…`, { detail: 'Note: Uninstall may not work on all updates or non-English OS locales.' });
                    }}>Uninstall</ActionButton>
                  ) : <span className="text-text-dim">—</span> },
                ]}
                rows={patchHistory.map(p => ({...p, id: p.id, status: p.status}))}
                onRowClick={() => {}}
                maxRows={15}
              />
            </SectionCard>
          </>
        )}
